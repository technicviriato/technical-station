- type: entity
  id: AbductorGizmo
  parent: [BaseItem, BaseMajorContraband]
  name: gizmo
  description: A device that inserts a nano tracker, which can be used to target a teleportation beam. Or used to brainwash people with a secondary mode.
  components:
  - type: Sprite
    sprite: _Shitmed/Objects/Misc/gizmo.rsi
    state: icon
  - type: Item
    sprite: _Shitmed/Objects/Misc/gizmo.rsi
  - type: RestrictInteractionByUserTag
    contains:
    - AbductorScientist
    messages:
    - abductors-gizmo-restricted-1
    - abductors-gizmo-restricted-2
  - type: RestrictMeleeByUserTag
    contains:
    - AbductorScientist
    messages:
    - abductors-gizmo-restricted-1
    - abductors-gizmo-restricted-2
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 0.5
    damage:
      types:
        Shock: 0
    angle: 60
    animation: WeaponArcThrust
  - type: AbductorGizmo
  - type: GuideHelp
    guides:
    - Abductors
