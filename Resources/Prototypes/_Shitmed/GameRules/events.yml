- type: entity
  parent: BaseGameRule
  id: LoneAbductorSpawn
  components:
  - type: GhostroleAlert
  - type: StationEvent
    earliestStart: 15
    reoccurrenceDelay: 70
    weight: 1
    minimumPlayers: 20 # They're nigh impossible to catch even with a full sec team
    duration: null
  - type: RuleGrids
  - type: LoadMapRule
    gridPath: /Maps/_Trauma/Shuttles/abductor_shuttle.yml
  - type: AntagObjectives
    objectives:
    - AbductObjective
  - type: AbductorRule
  - type: AntagLoadProfileRule
    speciesHardOverride: Abductor
  - type: AntagSelection
    agentName: abductor-round-end-agent-name
    definitions:
    - spawnerPrototype: LoneAbductorSpawner
      min: 1
      max: 1
      pickPlayer: false
      startingGear: LoneAbductorGear
      prefRoles:
        - LoneAbductorAntag
      briefing:
        text: abductor-role-greeting
        color: Green
        sound: /Audio/_Shitmed/Misc/abductor.ogg
      components:
      - type: Abductor
      - type: ActionGrant
        actions:
        - ActionReturnToShip
      - type: GhostRole
        name: abductor-lone-ghost-role-name
        description: abductor-lone-ghost-role-desc
        rules: abductors-ghost-role-rules
        mindRoles:
        - MindRoleGhostRoleSoloAntagonist
        raffle:
          settings: default
      - type: GhostTakeoverAvailable
      - type: NpcFactionMember
        factions:
        - SimpleHostile
      - type: RandomMetadata
        nameSegments:
        - AbductorScientistPrefix
        - AbductorNames
        nameFormat: name-format-standard
      - type: Tag
        tags:
        - Abductor
        - AbductorScientist
        - CanPilot
        - FootstepSound
        - DoorBumpOpener
      - type: AbductorScientist
      - type: SurgeryIgnoreClothing
      - type: Sanitized
      - type: SurgerySpeedModifier
        speedModifier: 1.5
      mindRoles:
      - MindRoleLoneAbductor

- type: entity
  parent: BaseGameRule
  id: AbductorVictim
  components:
  - type: AbductorVictimRule
  - type: AntagSelection
    definitions:
    - mindRoles:
      - MindRoleAbductorVictim
      briefing:
        text: abductor-victim-role-greeting
        color: Red
        sound: /Audio/_Shitmed/Misc/abducted.ogg
  - type: AntagRandomObjectives
    maxDifficulty: 1
    sets:
    - maxPicks: 1
      groups: AbductorVictimObjectiveGroups

- type: entity
  parent: LoneAbductorSpawn
  id: DuoAbductorSpawn
  components:
  - type: GhostroleAlert
  - type: StationEvent
    minimumPlayers: 20
    earliestStart: 45
    weight: 3
  - type: AntagSelection
    definitions:
    - spawnerPrototype: AbductorScientistSpawner
      min: 1
      max: 1
      pickPlayer: false
      startingGear: AbductorScientistGear
      prefRoles:
        - AbductorScientistAntag
      briefing:
        text: abductor-role-greeting
        color: Green
        sound: /Audio/_Shitmed/Misc/abductor.ogg
      components:
      - type: Abductor
      - type: ActionGrant
        actions:
        - ActionReturnToShip
      - type: GhostRole
        name: abductor-scientist-ghost-role-name
        description: abductor-scientist-ghost-role-desc
        rules: abductors-ghost-role-rules
        mindRoles:
        - MindRoleGhostRoleTeamAntagonist
        raffle:
          settings: default
      - type: GhostTakeoverAvailable
      - type: NpcFactionMember
        factions:
        - SimpleHostile
      - type: RandomMetadata
        nameSegments:
        - AbductorScientistPrefix
        - AbductorNames
        nameFormat: name-format-standard
      - type: Tag
        tags:
        - Abductor
        - AbductorScientist
        - CanPilot
        - FootstepSound
        - DoorBumpOpener
      - type: AbductorScientist
      - type: SurgeryIgnoreClothing
      - type: Sanitized
      - type: SurgerySpeedModifier
        speedModifier: 1.5
      mindRoles:
      - MindRoleAbductorScientist
    - spawnerPrototype: AbductorAgentSpawner
      min: 1
      max: 1
      pickPlayer: false
      startingGear: AbductorAgentGear
      prefRoles:
        - AbductorAgentAntag
      briefing:
        text: abductor-role-greeting
        color: Green
        sound: /Audio/_Shitmed/Misc/abductor.ogg
      components:
