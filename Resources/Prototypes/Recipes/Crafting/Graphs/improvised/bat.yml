- type: constructionGraph
  id: WoodenBat
  start: start
  graph:
    - node: start
      edges:
        - to: incompleteBat
          steps:
          - material: WoodPlank
            amount: 5
            doAfter: 4

    - node: incompleteBat
      entity: IncompleteBaseBallBat
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: MaterialWoodPlank1
              amount: 5
            - !type:DeleteEntity {}
          steps:
          - tool: Prying
            doAfter: 1
        - to: bat
          completed:
          - !type:AdminLog
            message: "Construction"
            impact: High
          steps:
          - tool: Slicing
            doAfter: 4

    - node: bat
      entity: BaseBallBat
      # <Trauma>
      edges:
        - to: barbedwire
          steps:
          - material: BarbedWire
            amount: 3
            doAfter: 5

        - to: nail
          steps:
          - tag: Nail
            name: construction-graph-tag-nail
            icon:
              sprite: _Goobstation/Objects/Specific/Engineering/nail.rsi
              state: icon
          - tool: Hammering
            doAfter: 0.5
          - tag: Nail
            name: construction-graph-tag-nail
            icon:
              sprite: _Goobstation/Objects/Specific/Engineering/nail.rsi
              state: icon
          - tool: Hammering
            doAfter: 0.5
          - tag: Nail
            name: construction-graph-tag-nail
            icon:
              sprite: _Goobstation/Objects/Specific/Engineering/nail.rsi
              state: icon
          - tool: Hammering
            doAfter: 0.5
          - tag: Nail
            name: construction-graph-tag-nail
            icon:
              sprite: _Goobstation/Objects/Specific/Engineering/nail.rsi
              state: icon
          - tool: Hammering
            doAfter: 0.5
          - tag: Nail
            name: construction-graph-tag-nail
            icon:
              sprite: _Goobstation/Objects/Specific/Engineering/nail.rsi
              state: icon
          - tool: Hammering
            doAfter: 0.5

    - node: barbedwire
      entity: BaseBallBatBarb

    - node: nail
      entity: BaseBallBatNail
      # </Trauma>
