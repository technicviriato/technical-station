# All masses for calculations should be based on the density*volume of the lathe recipe, not the recycled material yield.

- type: entity
  abstract: true
  parent: BaseItem
  id: BaseReactorPart
  components:
  - type: ReactorPart
  - type: Sprite
    sprite: _FarHorizons/Structures/Power/Generation/FissionGenerator/reactor_parts.rsi
    layers:
    - state: default_rod
      map: ["enum.NuclearPropertiesVisuals.Layer"]
  - type: Item
    size: Huge
  - type: MultiHandedItem
  - type: Tag
    tags:
    - ReactorPart
  - type: GuideHelp
    guides:
    - NuclearReactor
    - Power

## Fuel Rods ##

- type: entity
  abstract: true
  parent: [ BaseReactorPart, BaseEngineeringContraband ]
  id: BaseReactorFuelRod
  name: fuel rod
  description: A fuel rod for a nuclear reactor.
  components:
  - type: ReactorPart
    iconStateInserted: "fuel"
    iconStateCap: "fuel_cap"
    neutronCrossSection: -1 # starts with control rods fully inserted
    thermalCrossSection: 10
    # every rod has 3.95 kg of steel @ 420 J/kgK
    # add the fissile material's capacity to this
    thermalMass: 1659
  - type: ReactorFuelRod
  - type: ReactorControlRod # control rods are built in to the fuel rod assembly
  - type: Edible # Blame Abby for making them edible
    transferAmount: null
    delay: 30
    forceFeedDelay: 60
  - type: FlavorProfile
    flavors:
    - metal
    - electrons
  - type: BadFood
  - type: Solution
    id: food
    solution:
      maxVol: 1000
      canReact: false
      reagents:
      - ReagentId: Uranium
        Quantity: 800
      - ReagentId: Radium
        Quantity: 200
  - type: SentienceTarget
    flavorKind: station-event-random-sentience-flavor-inanimate
    weight: 0.2

- type: entity
  parent: [ BaseReactorFuelRod, BaseNuclearPropertiesCerenkite ]
  id: CerenkiteReactorFuelRod
  name: cerenkite fuel rod # These are your basic, semi-harmless fuel rods
  components:
  - type: ReactorPart
    thermalMass: 2320 # assuming its the same as uranium, funny made up material

- type: entity
  parent: [ BaseReactorFuelRod, BaseNuclearPropertiesUranium ]
  id: UraniumReactorFuelRod
  name: uranium fuel rod
  components:
  - type: ReactorPart
    # 5.7 kg of uranium @ 116 J/kgK -> +661 J/K
    thermalMass: 2320

- type: entity
  parent: [ BaseReactorFuelRod, BaseNuclearPropertiesPlutonium ]
  id: PlutoniumReactorFuelRod
  name: plutonium fuel rod
  components:
  - type: ReactorPart
    # 5.96 kg of plutonium @ 146 J/kgK -> +869 J/K
    thermalMass: 2528
  - type: SentienceTarget
    weight: 2

- type: entity
  parent: [ BaseReactorFuelRod, BaseNuclearPropertiesBananium ]
  id: BananiumReactorFuelRod
  name: bananium fuel rod
  description: A honk rod for a nuclear reactor.
  components:
  - type: ReactorPart
    # half uranium half biomass (assumed 2kJ/kgK and 1.5kg/L)
    # 2.85 kg of uranium -> 330 J/K
    # 0.23 kg of biomass -> 450 J/K
    thermalMass: 2439

- type: entity
  parent: [ BaseReactorFuelRod, BaseNuclearPropertiesPlasma ]
  id: PlasmaReactorFuelRod
  name: plasma fuel rod
  components:
  - type: ReactorPart
    # assume plasma is 1.4kJ/kgK and 3kg/L
    # 0.45 kg of plasma -> 630 J/K
    thermalMass: 2289

- type: entity
  parent: [ BaseReactorFuelRod, BaseNuclearPropertiesUraniumGlass ]
  id: UraniumGlassReactorFuelRod
  name: uranium glass fuel rod
  components:
  - type: ReactorPart
    # half uranium half silica glass (750J/kgK and 2.2kg/L)
    # 2.85 kg of uranium -> 330 J/K
    # 0.33 kg of glass -> 248 J/K
    thermalMass: 2237

## Reflectors ##

- type: entity
  abstract: true
  parent: BaseReactorPart
  id: BaseReactorReflector
  name: neutron reflector
  description: A neutron reflector assembly for a nuclear reactor.
  components:
  - type: ReactorPart
    iconStateInserted: reflector
    iconStateCap: reflector_cap
    # 4 kg of steel
    thermalMass: 1680
  - type: PhysicalComposition
    materialComposition:
      Steel: 250

- type: entity
  parent: [ BaseReactorReflector, BaseNuclearPropertiesBohrum ]
  id: BohrumReactorReflector
  name: bohrum neutron reflector # what the crew starts with
  components:
  - type: ReactorPart
    neutronCrossSection: 0.2 # decent
    reflectChance: 0.8
    # 6 kg of steel -> 2520 J/K
    # 0.75 kg of plasma -> 1040 J/K
    thermalMass: 5250
  - type: PhysicalComposition
    materialComposition:
      Steel: 500
      Plasteel: 250

- type: entity
  parent: [ BaseReactorReflector, BaseNuclearPropertiesSteel ]
  id: SteelReactorReflector
  name: steel neutron reflector
  components:
  - type: ReactorPart
    neutronCrossSection: 0.3 # meh
    reflectChance: 0.65
    # 8 kg of steel -> 3360 J/K
    thermalMass: 5040
  - type: PhysicalComposition
    materialComposition:
      Steel: 750

- type: entity
  parent: [ BaseReactorReflector, BaseNuclearPropertiesGold ]
  id: GoldReactorReflector
  name: gold neutron reflector
  components:
  - type: ReactorPart
    neutronCrossSection: 0.6 # not great
    reflectChance: 0.4
    # 19 kg of gold -> 2488 J/K
    thermalMass: 4168
  - type: PhysicalComposition
    materialComposition:
      Steel: 250
      Gold: 500

- type: entity
  parent: [ BaseReactorReflector, BaseNuclearPropertiesSilver ]
  id: SilverReactorReflector
  name: silver neutron reflector
  components:
  - type: ReactorPart
    neutronCrossSection: 0.7 # bad
    reflectChance: 0.2
    # 10.5 kg of silver @ 235 J/kgK -> 2468 J/K
    thermalMass: 4148
  - type: PhysicalComposition
    materialComposition:
      Steel: 250
      Gold: 500

- type: entity
  parent: [ BaseReactorReflector, BaseNuclearPropertiesGraphite ]
  id: GraphiteReactorReflector
  name: graphite neutron reflector
  components:
  - type: ReactorPart
    neutronCrossSection: 0.007 # the best
    reflectChance: 0.997
    # 2.1 kg of graphite @ 710 J/kgK -> 1491 J/K
    thermalMass: 3171
  - type: PhysicalComposition
    materialComposition:
      Steel: 250
      Coal: 500 # gem

