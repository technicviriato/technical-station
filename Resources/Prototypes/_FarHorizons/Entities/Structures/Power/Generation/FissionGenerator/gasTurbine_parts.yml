    sprite: _FarHorizons/Structures/Power/Generation/FissionGenerator/turbine_parts.rsi
    state: turbine_blade
  - type: Item
    size: Huge
  - type: MultiHandedItem
  - type: GuideHelp
    guides:
    - NuclearReactor
    - Power

