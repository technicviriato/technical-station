- type: entity
  abstract: true
  parent: [ BaseStructure, BaseNuclearPropertiesSteel ]
  id: BaseNuclearReactor
  name: nuclear reactor
  description: A nuclear reactor vessel, with slots for fuel rods and other components. Hey wait, didn't one of these explode once?
  components:
  - type: Sprite
    sprite: _FarHorizons/Structures/Power/Generation/FissionGenerator/nuclear_reactor.rsi
    layers:
    - state: reactor
      map: [ "enum.ReactorVisualLayers.Base" ]
    - state: reactor_status_active
      shader: unshaded
      visible: false
      map: [ "enum.ReactorVisualLayers.Status" ]
    - state: reactor_gas_input_lights
      shader: unshaded
      visible: false
      map: [ "enum.ReactorVisualLayers.Input" ]
    - state: reactor_gas_output_lights
      shader: unshaded
      visible: false
      map: [ "enum.ReactorVisualLayers.Output" ]
    - state: reactor_lights_warning
      shader: unshaded
      visible: false
      map: [ "enum.ReactorVisualLayers.Lights" ]
    - state: reactor_fire
      visible: false
      map: [ "enum.ReactorVisualLayers.Smoke" ]
    - state: reactor_smoke
      visible: false
      map: [ "enum.ReactorVisualLayers.Fire" ]
  - type: GenericVisualizer
    visuals:
      enum.ReactorVisuals.Melted:
        enum.ReactorVisualLayers.Base:
          True: { state: reactorbroken }
          False: { state: reactor }
      enum.ReactorVisuals.Status:
        enum.ReactorVisualLayers.Status:
          Off: { visible: false}
          Active: { state: reactor_status_active, visible: true }
          Overheat: { state: reactor_status_overheat, visible: true }
          Meltdown: { state: reactor_status_meltdown, visible: true }
      enum.ReactorVisuals.Input:
        enum.ReactorVisualLayers.Input:
          True: { visible: true }
          False: { visible: false }
      enum.ReactorVisuals.Output:
        enum.ReactorVisualLayers.Output:
          True: { visible: true }
          False: { visible: false }
      enum.ReactorVisuals.Lights:
        enum.ReactorVisualLayers.Lights:
          LightsOff: { visible: false }
          LightsWarning: { state: reactor_lights_warning, visible: true }
          LightsMeltdown: { state: reactor_lights_meltdown, visible: true }
      enum.ReactorVisuals.Smoke:
        enum.ReactorVisualLayers.Smoke:
          True: { visible: true }
          False: { visible: false }
      enum.ReactorVisuals.Fire:
        enum.ReactorVisualLayers.Fire:
          True: { visible: true }
          False: { visible: false }
  - type: Appearance
  - type: InteractionOutline
  - type: Rotatable
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-2.5,-2.5,2.5,2"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
        - HighImpassable
  - type: Damageable
    damageModifierSet: StructuralReactorCasing
  - type: Injurable
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1000
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          NuclearReactorMelted:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: Anchorable
    delay: 10
  - type: AtmosDevice
  - type: AtmosMonitoringConsoleDevice # TODO: this doesn't work?
    navMapBlip: Thermoregulator
  - type: RadiationSource
    intensity: 0
  - type: RadiationBlockingContainer
    resistance: 100 # rods inside dont directly irradiate anything
  - type: ContainerContainer
    containers:
      reactor_parts: !type:Container
      part_slot: !type:ContainerSlot
  - type: ItemSlots
    slots:
      part_slot:
        whitelist:
          components:
          - ReactorPart
  - type: NuclearReactor
  - type: NuclearMachine
    arrowPrototype: ReactorFlowArrow
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: BasicDevice
  - type: WirelessNetworkConnection
    range: 200
  - type: DeviceLinkSource
    range: 50
    ports:
    - NuclearReactorDataSender
    - ControlRodsAvg
    - CasingTemperature
    - ReactorThermalPower
  - type: DeviceLinkSink
    ports:
    - ControlRodInsertion
  - type: ActivatableUI
    key: enum.NuclearReactorUiKey.Key
  - type: ActivatableUIRequiresAnchor
  - type: UserInterface
    interfaces:
      enum.NuclearReactorUiKey.Key:
        type: NuclearReactorBUI
  - type: GuideHelp
    guides:
    - NuclearReactor
    - Power

# Crew nuclear reactors
- type: entity
  parent: BaseNuclearReactor
  id: NuclearReactorCrew
  components:
  - type: AccessReader # You got a permit for that meltdown?
    access: [["Engineering"]]
  - type: Lock
    unlockOnClick: false
  - type: WarpPoint
    location: Nuclear Reactor
    blacklist:
      tags:
      - GhostOnlyWarp

- type: entity
  parent: NuclearReactorCrew
  id: NuclearReactorEmpty
  suffix: Empty
  components:
  - type: NuclearReactor
    prefab: Empty

- type: entity
  parent: NuclearReactorCrew
  id: NuclearReactorRandom
  suffix: Random
  components:
  - type: NuclearReactor
    prefab: null

- type: entity
  parent: NuclearReactorCrew
  id: NuclearReactorMeltdown
  suffix: Meltdown
  components:
  - type: NuclearReactor
    prefab: 7x7Meltdown

- type: entity
  parent: [ BaseStructure, BaseNuclearPropertiesSteel ]
  id: NuclearReactorMelted # This is more of a decoration than anything else
  suffix: Melted
  name: nuclear reactor
  description: A broken nuclear reactor vessel. It glows with heat and radiation.
  components:
  - type: Sprite
    sprite: _FarHorizons/Structures/Power/Generation/FissionGenerator/nuclear_reactor.rsi
    layers:
    - state: reactorbroken
  - type: Rotatable
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-2.5,-2.5,2.5,2"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
        - HighImpassable
  - type: RadiationSource
    intensity: 7
  - type: InteractionOutline
  - type: PointLight
    energy: 0.1
    falloff: 2
    radius: 3.5
    color: "#FFAAAAFF"

