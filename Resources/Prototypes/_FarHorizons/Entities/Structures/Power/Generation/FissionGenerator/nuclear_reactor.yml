# Nuclear debris resultant from a meltdown
- type: entity
  parent: BaseItem
  id: NuclearDebrisChunk
  name: nuclear debris
  description: You do not see the graphite on the floor. You're in shock. Report to medical.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _FarHorizons/Structures/Power/Generation/FissionGenerator/nuclear_debris.rsi
    layers:
    - state: graphite_damaged_0
      map: [ "base" ]
  - type: Item
    size: Huge
  - type: RandomSprite
    available:
    - base:
        graphite_damaged_0: ""
        graphite_damaged_0_mirrored: ""
        graphite_damaged_1: ""
        graphite_damaged_1_mirrored: ""
        graphite_damaged_2: ""
        graphite_damaged_2_mirrored: ""
        graphite_damaged_3: ""
        graphite_damaged_3_mirrored: ""
        graphite_damaged_4: ""
        graphite_damaged_4_mirrored: ""
  - type: RadiationSource
    intensity: 1.6

# Arrows to indicate flow for nuclear reactors and turbines
- type: entity
  id: ReactorFlowArrow
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: Markers/teg_arrow.rsi
    color: "#FFFFFFBB"
    layers:
    - state: arrow
      rotation: 90
      offset: 3, 1
    - state: arrow
      rotation: 90
      offset: -3, -1
  - type: TimedDespawn
    lifetime: 2
  - type: Tag
    tags:
    - HideContextMenu

- type: entity
  parent: ReactorFlowArrow
  id: ReactorSmallFlowArrow
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    layers:
    - state: arrow
      rotation: 0
      offset: -1, 2
    - state: arrow
      rotation: 180
      offset: 1, 2

# Pipes the reactor uses to connect to the pipe network
- type: entity
  id: NuclearMachineGasPipe
  categories: [ HideSpawnMenu ]
  components:
  - type: Transform
    anchored: true
  - type: Anchorable
  - type: NodeContainer
    nodes:
      pipe: !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: South
        volume: 1000
        pipeLayer: 0
      pipe1: !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: South
        volume: 1000
        pipeLayer: 1
      pipe2: !type:PipeNode
        nodeGroupID: Pipe
        pipeDirection: South
        volume: 1000
        pipeLayer: 2
  - type: GasPipeManifold
    inlets:
    - pipe1
    - pipe2
    outlets:
    - pipe
  - type: PipeRestrictOverlap
  - type: Tag
    tags:
    - HideContextMenu

- type: entity
  id: ReactorAlarmEntity
  categories: [ HideSpawnMenu ]
  components:
  - type: AmbientSound
    volume: -3
    range: 15
    enabled: false
    sound:
      path: /Audio/_FarHorizons/Machines/reactor_alarm_1.ogg
