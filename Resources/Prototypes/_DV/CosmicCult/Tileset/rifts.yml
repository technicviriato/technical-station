- type: entity
  id: CosmicMalignRift
  name: malign rift
  description: A malign light pours forth from within.
  placement:
    mode: SnapgridCenter
  components:
  - type: InteractionOutline
  - type: Sprite
    sprite: _DV/CosmicCult/Tileset/malignrift.rsi
    drawdepth: Mobs
    snapCardinals: true
    offset: 0,0.27
    layers:
      - state: rift-unshaded
        shader: unshaded
  - type: Clickable
  - type: PointLight
    radius: 1.5
    energy: 1.6
    castShadows: false
    color: "#42a4ae"
  - type: CosmicCultExamine
    cultistText: cosmic-examine-text-forthecult
  - type: CosmicMalignRift
  - type: CosmicCorrupting
    corruptionMaxTicks: 5
    corruptionSpeed: 12
    corruptionChance: 1
    corruptionReduction: 0.1

- type: entity
  id: CosmicMalignRiftDebug
  parent: CosmicMalignRift
  suffix: Debug
  components:
  - type: CosmicMalignRift # Very fast, for easier testing
    bibleTime: 1
    chaplainTime: 1
    absorbTime: 1
    entropyGranted: 0
