- type: entity
  categories: [ HideSpawnMenu ]
  abstract: true
  id: CosmicPolymorphEnt
  name: "Unknown" # The question marks crash regex gg
  description: Trapped in a lapse between here and there.
  components:
  - type: Sprite
    sprite: _DV/CosmicCult/Effects/ability_lapsepolymorph.rsi
    layers:
      - state: humanoid
        shader: unshaded
    drawdepth: SmallMobs
    noRot: true
  - type: PointLight
    radius: 1.25
    energy: 12
    color: "#42a4ae"
    castShadows: false
  - type: CosmicLapse
  - type: CosmicCultExamine
    cultistText: cosmic-examine-text-abilitylapse
  - type: LightBehaviour
    behaviours:
     - !type:FadeBehaviour
       interpolate: Linear
       minDuration: 1.75
       maxDuration: 1.75
       startValue: 0.5
       endValue: 12
       property: Energy
       enabled: true
       isLooped: true
       reverseWhenFinished: true
  - type: Speech
    enabled: False
  - type: Transform
  - type: Visibility
    layer: 32 #monument vis layer

- type: entity
  categories: [ HideSpawnMenu ]
  parent: CosmicPolymorphEnt
  id: CosmicPolymorphEntHuman

- type: entity
  categories: [ HideSpawnMenu ]
