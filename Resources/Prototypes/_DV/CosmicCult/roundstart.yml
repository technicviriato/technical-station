- type: entity
  parent: BaseGameRule
  id: CosmicCult
  components:
  - type: CosmicCultRule
  - type: LoadMapRule
    mapPath: /Maps/_DV/Nonstations/cosmicvoid.yml
  - type: GameRule
    minPlayers: 20
  - type: AntagObjectives
    objectives:
    - CosmicFinalityObjective
    - CosmicMonumentObjective
    - CosmicEntropyObjective
  - type: AntagSelection
    antags:
    - !type:LinearAntagCount
      proto: CosmicCultist
      range:
        min: 3
        max: 8
      playerRatio: 7
  - type: AntagPlayerEffects
    effects:
    - !type:GrantSkills
      skills:
        MeleeKnowledge: 60 # They like, only have melee weapons
