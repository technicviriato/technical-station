- type: entity
  parent: [ BaseItem, BaseMajorContraband ]
  id: BatteredBreachingHammer
  name: battered breaching hammer
  description: A lighter, more battered, and rusted version of the breaching hammer.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Weapons/Melee/breaching_hammer.rsi # TODO: get rusted sprite
    state: icon
  - type: MeleeWeapon
    attackRate: 0.75
    range: 1.70
    heavyStaminaCost: 15
    damage:
      types:
        Blunt: 5
        Structural: 10
    soundHit:
      path: /Audio/_Trauma/Weapons/Melee/breaching_hammer/club.ogg
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 10
        Structural: 15
  - type: Item
    size: Large
  - type: Tool
    qualities:
    - Prying
    useSound: /Audio/Items/crowbar.ogg
  - type: ToolTileCompatible
  - type: Prying
    speedModifier: 0.8
    pryPowered: true
    useSound: /Audio/Items/jaws_pry.ogg
  - type: UseDelay
    delay: 1
  - type: Clothing
    sprite: _Trauma/Objects/Weapons/Melee/breaching_hammer.rsi
    quickEquip: false
    slots:
    - Back
