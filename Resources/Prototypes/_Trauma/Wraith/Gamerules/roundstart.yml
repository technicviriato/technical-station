- type: entity
  parent: BaseGameRule
  id: WraithRoundstart
  components:
  - type: GameRule
    minPlayers: 35
  - type: AntagSpawner
    prototype: MobWraithMidround
  - type: AntagRandomSpawn
  - type: AntagSelection
    selectionTime: PrePlayerSpawn
    agentName: wraith-round-end-agent-name
    definitions:
    - prefRoles: [ WraithRoundstart ]
      spawnerPrototype: SpawnPointGhostWraithRoundstart
      min: 1
      max: 1
      pickPlayer: true
      mindRoles:
      - MindRoleGhostRoleSoloAntagonist
      briefing:
        text: wraith-role-greeting
        sound: /Audio/_Goobstation/Wraith/Ambience/Void_Calls.ogg
      components:
      - type: RandomMetadata
        nameSegments:
        - NamesWraith
        - NamesWraithTitle
        nameFormat: name-format-wraith
      - type: Banishment # revive on death, resets WP
        lives: 0
        popup: wraith-banishment
