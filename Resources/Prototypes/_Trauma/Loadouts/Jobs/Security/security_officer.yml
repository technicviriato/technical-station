- type: loadoutEffectGroup
  id: VeteranOfficer
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:DepartmentTimeRequirement
      department: Security
      time: 360000 # 100 hrs

- type: loadout
  id: SergeantUniform
  effects:
  - !type:GroupLoadoutEffect
    proto: VeteranOfficer
  equipment:
    jumpsuit: ClothingUniformSergeantUniform

- type: loadout
  id: SergeantSkirt
  effects:
  - !type:GroupLoadoutEffect
    proto: VeteranOfficer
  equipment:
    jumpsuit: ClothingUniformSergeantSkirt

- type: loadout
  id: SergeantBeret
  effects:
  - !type:GroupLoadoutEffect
    proto: VeteranOfficer
  equipment:
    head: ClothingHeadHatBeretSergeant
