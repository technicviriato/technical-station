- type: entity
  parent: [ SimpleMobBase, MobCombat, StripableInventoryBase ]
  id: MobBunnySea
  name: sea bunny
  description: A cute, fluffy, sea bunny.
  components:
  - type: VentCrawler
  - type: GhostRole
    prob: 0.5
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    name: ghost-role-information-sea-bunny-name
    description: ghost-role-information-sea-bunny-description
    rules: ghost-role-information-nonantagonist-rules
  - type: GhostTakeoverAvailable
  - type: Speech
    speechVerb: SmallMob
    speechSounds: Squeak
    allowedEmotes: ['Squeak']
  - type: Sprite
    drawdepth: SmallMobs
    sprite: _Trauma/Mobs/Animals/bunny.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: sea_bunny
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.2
        density: 12
        mask:
        - SmallMobMask
        layer:
        - SmallMobLayer
  - type: MobState
  - type: Deathgasp
  - type: MobStateActions
    actions:
      Critical:
      - ActionCritSuccumb
      - ActionCritFakeDeath
      - ActionCritLastWords
  - type: MobThresholds
    thresholds:
      0: Alive
      40: Critical
      60: Dead
  - type: MovementSpeedModifier
    baseWalkSpeed : 2.5
    baseSprintSpeed : 4
  - type: Inventory
    speciesId: hamster
    templateId: hamster
  - type: DamageStateVisuals
    states:
      Alive:
        Base: sea_bunny
      Critical:
        Base: sea_bunny_dead
      Dead:
        Base: sea_bunny_dead
  - type: Edible
  - type: FlavorProfile
    flavors:
    - meaty
  - type: Hunger
    baseDecayRate: 0.3
  - type: Extractable
    grindableSolutionName: food
  - type: Solution
    id: food
    solution:
      reagents:
      - ReagentId: Nutriment
        Quantity: 10
      - ReagentId: Blood
        Quantity: 55
      - ReagentId: Fat
        Quantity: 5
  - type: Butcherable
    spawned:
    - id: FoodMeat
      amount: 1
  - type: LanguageSpeaker
    speaks:
    - Mouse
    understands:
    - Mouse
    - TauCetiBasic
  - type: Tag
    tags:
    - VimPilot
    - ChefPilot
    - Trash
    - Hamster
    - Meat
  - type: Respirator
    damage:
      types:
        Asphyxiation: 0.25
    damageRecovery:
      types:
        Asphyxiation: -0.25
  - type: Barotrauma
    damage:
      types:
        Blunt: 0.1
  - type: CombatMode
  - type: MeleeWeapon
    soundHit:
        path: /Audio/Effects/bite.ogg
    angle: 0
    animation: WeaponArcBite
    damage:
      types:
        Piercing: 2
  - type: NpcFactionMember
    factions:
    - Passive
  - type: NPCRetaliation
  - type: FactionException
  - type: HTN
    rootTask:
      task: RuminantCompound
  - type: InteractionPopup
    successChance: 0.4
    interactSuccessString: petting-success-generic
    interactFailureString: petting-failure-generic
    interactSuccessSpawn: EffectHearts
    interactSuccessSound:
      path: /Audio/Animals/fox_squeak.ogg
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Blood
        Quantity: 60
  - type: MobPrice
    price: 60
  - type: NonSpreaderZombie
  - type: FireVisuals
    sprite: Mobs/Effects/onfire.rsi
    normalState: Mouse_burning
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTypeTrigger
        damageType: Blunt
        damage: 120
      behaviors:
      - !type:GibBehavior
        recursive: false

