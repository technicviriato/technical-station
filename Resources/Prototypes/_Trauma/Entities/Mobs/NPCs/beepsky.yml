- type: entity
  parent:
  - MobSiliconBase
  - ShowSecurityIcons
  - StripableInventoryBase
  id: MobSecuritron
  name: securitron
  description: Tiders hate this one simple trick!
  components:
  - type: Sprite
    sprite: _Trauma/Mobs/Silicon/Bots/beepsky.rsi
    state: secbot
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 50
        mask:
        - MobMask
        layer:
        - MobLayer
  # - type: TileMovement
  - type: HTN
    rootTask:
      task: SecbotCompound
    blackboard:
      TargetFoundSound: !type:SoundCollectionSpecifier
        collection: BeepskyTargetFound
      TargetArrestedSound: !type:SoundCollectionSpecifier
        collection: BeepskyTargetArrested
  - type: CombatMode
  - type: MeleeWeapon
    hidden: true
    animation: WeaponArcThrust
    damage:
      types:
        Blunt: 1
  - type: Stunbaton
    energyPerUse: 50
  - type: StaminaDamageOnHit
    damage: 25
    overtime: 40
    lightAttackDamageMultiplier: 5
    lightAttackOvertimeDamageMultiplier: 0
    sound: /Audio/Weapons/egloves.ogg
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: BatterySelfRecharger
    autoRechargeRate: 40
  - type: DoAfter
  - type: Construction
    graph: SecBot
    node: bot
  - type: SentienceTarget
    flavorKind: station-event-random-sentience-flavor-mechanical
  - type: Anchorable
  - type: InteractionPopup
    interactSuccessString: petting-success-secbot
    interactFailureString: petting-failure-secbot
    interactSuccessSound:
      path: /Audio/Ambience/Objects/periodic_beep.ogg
  - type: Inventory
    templateId: medibot
  - type: IntrinsicRadioTransmitter
    channels:
    - Security
  - type: PatrolSlave
  - type: ActiveRadio
    channels:
    - Common
    - Security
  - type: Access
    tags:
    - HeadOfSecurity
    - Command
    - Brig
    - Security
    - Armory
    - Maintenance
    - External
    - Detective
    - Cryogenics
    - GenpopEnter
    - GenpopLeave
  - type: CuffSpawner
  - type: MovementSpeedModifier
    baseSprintSpeed: 3

- type: entity
  parent: MobSecuritron
  id: MobBeepsky
  name: Officer Beepsky
  description: It's Commander Beep O'sky! Officially the superior officer of all bots on station, Beepsky remains as humble and dedicated to the law as the day he was first fabricated.
