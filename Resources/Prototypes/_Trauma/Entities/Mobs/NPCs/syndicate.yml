- type: entity
  parent: [ MobMouse, MobCombat ]
  id: MobNukieMouse
  name: nuclear operative mouse
  description: A Nuclear Operative... MOUSE?!
  suffix: syndicate
  components:
  - type: GhostRole
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    name: ghost-role-information-nukie-mouse-name
    description: ghost-role-information-nukie-mouse-description
  - type: GhostTakeoverAvailable
  - type: RandomMetadata
    nameFormat: name-format-nukie-operator
    nameSegments: [ NamesMouseDeathCommando ]
  - type: NpcFactionMember
    factions:
    - Syndicate
  - type: Speech
    speechVerb: SmallMob
    speechSounds: Squeak
  - type: LanguageSpeaker
    speaks:
    - Mouse
    understands:
    - Mouse
    - TauCetiBasic
  - type: PointLight
    radius: 1.5
    energy: 2.3
    offset: 0, -1
    color: green
  - type: Sprite
    drawdepth: SmallMobs
    sprite: _Trauma/Mobs/Animals/Syndicate/nukiemouse.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base", "movement" ]
      state: mouse
  - type: SpriteMovement
    movementLayers:
      movement:
        state: mouse-moving
    noMovementLayers:
      movement:
        state: mouse
  - type: DamageStateVisuals
    states:
      Alive:
        Base: mouse
      Critical:
        Base: dead
      Dead:
        Base: splat
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 4.9
  - type: Respirator
    minSaturation: 5.0
  - type: TemperatureDamage
    heatDamageThreshold: 423
    coldDamageThreshold: 0
  - type: PressureImmunity
  - type: Insulated
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Effects/bite.ogg
    angle: 0
    animation: WeaponArcBite
    damage:
      types:
        Slash: 5
        Piercing: 5
        Structural: 15
  - type: MobPrice
    price: 250
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - Syndicate
  - type: ActiveRadio
    channels:
    - Syndicate
  - type: Tag
    tags:
    - VimPilot
    - Trash
    - Mouse
    - Meat
    - FootstepSound
    - Radio
  - type: InteractionPopup
    successChance: 0.6
    interactSuccessString: petting-success-nukie-mouse
    interactFailureString: petting-failure-nukie-mouse
    interactSuccessSpawn: EffectHearts
    interactSuccessSound:
      path: /Audio/Animals/mouse_squeak.ogg
  - type: Damageable
    damageModifierSet: NukieSpider

- type: entity
  parent: MobGiantSpiderAngry
  id: MobNukieSpider
  name: nuclear operative tarantula
  description: A spider? A NUKIE SPIDER?!
  suffix: syndicate
  components:
  - type: GhostRole
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    name: ghost-role-information-nukie-spider-name
    description: ghost-role-information-nukie-spider-description
    rules: ghost-role-information-nukie-spider-rules
    mindRoles:
    - MindRoleGhostRoleTeamAntagonist
  - type: GhostTakeoverAvailable
  - type: RandomMetadata
    nameFormat: name-format-nukie-operator
    nameSegments: [ NamesNukieSpider ]
  - type: NpcFactionMember
    factions:
    - Syndicate
  - type: LanguageSpeaker
    speaks:
    - Xeno
    understands:
    - Xeno
    - TauCetiBasic
  - type: PointLight
    radius: 3
    energy: 2.3
    offset: 0, -2
    color: green
  - type: Sprite
    drawdepth: Mobs
    sprite: _Trauma/Mobs/Animals/Syndicate/nukiespider.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base", "movement" ]
      state: syndicate-spider
  - type: SpriteMovement
    movementLayers:
      movement:
        state: syndicate-spider-moving
    noMovementLayers:
      movement:
        state: syndicate-spider
  - type: MobThresholds
    thresholds:
      0: Alive
      90: Critical
      150: Dead
  - type: DamageStateVisuals
    states:
      Alive:
        Base: syndicate-spider
      Critical:
        Base: syndicate-spider-dead
      Dead:
        Base: syndicate-spider-dead
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 4.9
  - type: Respirator
    minSaturation: 5.0
  - type: TemperatureDamage
    heatDamageThreshold: 423
    coldDamageThreshold: 0
  - type: PressureImmunity
  - type: Insulated
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Effects/bite.ogg
    angle: 0
    animation: WeaponArcBite
    damage:
      types:
        Slash: 4
        Piercing: 4
        Structural: 25
  - type: SolutionManager
    solutions:
    - SolutionVenomSpiderNukie
  - type: MeleeChemicalInjector
    transferAmount: 0.5
    solution: melee
  - type: MobPrice
    price: 250
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - Syndicate
  - type: ActiveRadio
    channels:
    - Syndicate
  - type: Access
    tags:
    - NuclearOperative
    - SyndicateAgent
  - type: Tag
    tags:
    - FootstepSound
    - DoorBumpOpener
    - Radio
  - type: Damageable
    damageModifierSet: NukieSpider

- type: entity
  parent: [ SolutionWeapon, SolutionTiny ]
  id: SolutionVenomSpiderNukie
  categories: [ HideSpawnMenu ]
  components:
  - type: Solution
    solution:
      reagents:
      - ReagentId: Lexorin
        Quantity: 30
  - type: SolutionRegeneration
    generated:
      reagents:
      - ReagentId: Lexorin
        Quantity: 1

- type: entity
  parent: BaseMobCarp
  id: MobNukieCarp
  name: nuclear operative carp
  description: A bloodred carp trained in carp-to-carp combat.
  suffix: syndicate
  components:
  - type: RandomMetadata
    nameFormat: name-format-nukie-operator
    nameSegments: [ NamesNukieCarp ]
  - type: Sprite
    drawdepth: Mobs
    sprite: _Trauma/Mobs/Animals/Syndicate/nukiecarp.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: alive
    - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
      state: mouth
      shader: unshaded
  - type: NpcFactionMember
    factions:
    - Syndicate
  - type: Access
    tags:
    - NuclearOperative
    - SyndicateAgent
  - type: Tag
    tags:
    - Carp
    - DoorBumpOpener
  - type: ExplosionResistance
    damageCoefficient: 0.2
  - type: Insulated
  - type: SolutionManager
    solutions:
    - SolutionVenomSyndicarp
  - type: MeleeChemicalInjector
    solution: melee
    transferAmount: 1
  - type: Damageable
    damageModifierSet: NukieSpider

- type: entity
  parent: [ SolutionWeapon, SolutionTiny ]
  id: SolutionVenomSyndicarp
  categories: [ HideSpawnMenu ]
  components:
  - type: Solution
    solution:
      reagents:
      - ReagentId: CarpoToxin
        Quantity: 30
  - type: SolutionRegeneration
    generated:
      reagents:
      - ReagentId: CarpoToxin
        Quantity: 1
