- type: entity
  name: Ratma
  parent: [ MobSpaceBasic, MobCombat ]
  id: MobRatma
  description: It came from the maintenence tunnels.
  components:
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
    blackboard:
      NavPry: !type:Bool
        true
      NavSmash: !type:Bool
        true
  - type: NpcFactionMember
    factions:
      - SimpleHostile
  - type: MovementSpeedModifier
    baseWalkSpeed: 2
    baseSprintSpeed: 3
  - type: Sprite
    sprite: _Trauma/Mobs/Monsters/ratma.rsi
    layers:
      - map: [ "enum.DamageStateVisualLayers.Base" ]
        state: alive
  - type: DamageStateVisuals
    states:
      Alive:
        Base: alive
      Dead:
        Base: dead
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepThud
  - type: Physics
    bodyType: KinematicController
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.40
        density: 100
        mask:
          - MobMask
        layer:
          - MobLayer
  - type: MobThresholds
    thresholds:
      0: Alive
      200: Dead
  - type: PassiveDamage
    allowedStates:
      - Alive
    damage:
      types:
        Heat: -3
        Blunt: -1
        Slash: -1
        Piercing: -1
  - type: Butcherable
    spawned:
      - id: FoodMeatRat
        amount: 10
  - type: MeleeWeapon
    range: 2.5
    soundHit:
      path: /Audio/Weapons/Xeno/alien_claw_flesh3.ogg
    damage:
      types:
        Piercing: 20
        Slash: 10
    altDisarm: false
    canWideSwing: true
  - type: StaticPrice
    price: 3000
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: AdvancedMutationToxin
        Quantity: 300
    bleedReductionAmount: 30
  - type: VentCrawler
  - type: Prying
    speedModifier: 15
    pryPowered: true
    useSound: /Audio/Machines/airlock_creaking.ogg
  - type: LanguageSpeaker
    speaks:
    - TauCetiBasic
    understands:
    - TauCetiBasic
  - type: ThermalVision
  - type: Stamina
    baseCritThreshold: 9999
  - type: FlashImmunity
  - type: Puller
    needsHands: false
  - type: GhostRole
    name: ghost-role-ratma-name
    description: ghost-role-ratma-desc
    rules: ghost-role-information-antagonist-rules
    raffle:
      settings: default
  - type: JumpAbility
    action: ActionRatmaJump
    jumpDistance: 0.5
    jumpSound:
      path: /Audio/Effects/demon_attack1.ogg
      params:
        variation: 0.15
  - type: PointLight
    radius: 0
    energy: 0
    color: "#4faffb"
  - type: NoSlip

- type: entity
  name: breadling
  id: MobBreadLing
  parent: [EdibleBase, SimpleMobBase, MobCombat]
  description: Be kind to him, he is not long for this world.
  components:
  - type: FlavorProfile
    flavors:
    - bread
  - type: SliceableFood
    slice: FoodBreadPlainSlice
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 25
        reagents:
        - ReagentId: Nutriment
          Quantity: 25
  - type: Sprite
    noRot: true
    drawdepth: Mobs
    sprite: _Trauma/Mobs/Monsters/breadling.rsi
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: alive
  - type: MobThresholds
    thresholds:
      0: alive
      15: dead
  - type: DamageStateVisuals
    states:
      Alive:
        Base: alive
      Dead:
        Base: dead
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 50
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: RotationVisuals
    defaultRotation: 0
    horizontalRotation: 0
  - type: Item
    size: Small
  - type: GhostRole
    prob: 1
    name: ghost-role-information-breadling-namee
    allowMovement: true
    description: ghost-role-information-BreadLing-desc
    rules: ghost-role-information-nonantagonist-rules
    raffle:
      settings: short
  - type: GhostTakeoverAvailable
  - type: MovementSpeedModifier
    baseWalkSpeed : 2
    baseSprintSpeed : 5
  - type: Tag
    tags:
    - VimPilot
    - DoorBumpOpener
    - Bread
  - type: CanEscapeInventory
    baseResistTime: 2
  - type: Puller
    needsHands: false
  - type: Examiner
  - type: DoAfter
  - type: CombatMode
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 1
  - type: Extractable
    grindableSolutionName: food
  - type: Reactive
    groups:
      Flammable: [ Touch ]
      Extinguish: [ Touch ]
    reactions:
    - reagents: [ Water ]
      methods: [ Touch ]
      effects:
      - !type:HealthChange
        damage:
          types:
            Caustic: 5
      - !type:PopupMessage
        type: Local
        messages: [ "breadling-hurt-by-water-popup" ]
        probability: 0.25
        visualType: Large
  - type: Perishable
    rotAfter: 900
    molsPerSecondPerUnitMass: 0
  - type: RotInto
    entity: FoodRot
    stage: 1
  - type: Damageable
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Flour
        Quantity: 5
  - type: InputMover
  - type: MobMover
  - type: NpcFactionMember
    factions:
    - Passive
  - type: LanguageSpeaker
    speaks:
    - TauCetiBasic
    understands:
    - TauCetiBasic
  - type: Physics
    bodyType: KinematicController

