# Minor

- type: entity
  parent: MarkerBase
  id: RandomMinorSummoningRune
  name: random minor demon rune
  categories: [HideSpawnMenu]
  components:
  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - id: RandomMinorSummoningRuneHostile
        weight: .25
      - id: RandomMinorSummoningRuneTame
        weight: .75

