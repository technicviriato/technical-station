- type: entity
  name: toolbox mimic loot spawner
  id: SpawnLootToolboxMimic
  parent: MarkerBase
  components:
  - type: RandomChanceSpawner
    toSpawn:
      # materials
      SheetSteel1: 1
      # tools
      Crowbar: 0.5
      Wrench: 0.5
      Wirecutter: 0.5
      Screwdriver: 0.5
      Multitool: 0.5
      Welder: 0.5
      # Gloves
      ClothingHandsGlovesColorYellow: 1
      # Bonus
      AnomalyCoreFleshInert: 0.5
      OrganBloodsuckerHeart: 0.5

