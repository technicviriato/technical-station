# base area prototype
# this is like markerbase without marker, clickable and interaction outline to not make mapping very annoying
- type: entity
  abstract: true
  save: false # areas use custom serialization in MapAreaSystem
  id: BaseArea
  suffix: Area # to avoid adding area to every entity name
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
    noRot: true
    gridTraversal: false # waste of processing
  - type: Sprite
    noRot: true
    drawdepth: Overdoors
    sprite: _Trauma/Markers/Areas/station.rsi
    state: error
  - type: PlacementReplacement
    key: areas
  - type: Area

- type: entity
  abstract: true
  parent: BaseArea
  id: BaseAreaStation
  components:
  - type: Sprite
    state: station
  - type: StationArea
