# Effects spawned when certain things happen
# that only appear to viewcone users when out of vision.
# TODO these would probably look better as actual animations modulating alpha
# instead of like. rsi animations
# also i kinda wanted like, a "sound wave propagatey" sprite to underlay the actual effecta, and i thought tg had those too, but i guess not
# idk i dont want to sprite i t.

- type: entity
  id: BaseViewconeEffect
  abstract: true
  categories: [ HideSpawnMenu ]
  components:
  - type: ViewconeOccludable
    inverted: true
    overrideBaseAlpha: true
    useMemory: false # this is the memory
  - type: Sprite
    sprite: _Trauma/Effects/viewcone_effects.rsi
    drawdepth: Effects
    color: '#FFFFFF00' # 0 alpha by default, will get overriden by setalpha overlay
    loop: false
  - type: Transform
    anchored: true
  - type: TimedDespawn
    lifetime: 3.0
  - type: Tag
    tags:
    - HideContextMenu

- type: entity
  categories: [ HideSpawnMenu ]
  id: ViewconeMemory
  name: memory
  description: You remember this being here very recently.
  components:
  - type: Sprite
    # copied when it's spawned
    sprite: error.rsi
    state: error

- type: entity
  parent: BaseViewconeEffect
  id: ViewconeEffectFootstep
  components:
  - type: Sprite
    state: footstep

- type: entity
  parent: BaseViewconeEffect
  id: ViewconeEffectAttack
  components:
  - type: Sprite
    state: attack

# TODO UNUSED
- type: entity
  parent: BaseViewconeEffect
  id: ViewconeEffectForcefield
  components:
  - type: Sprite
    state: forcefield

- type: entity
  parent: BaseViewconeEffect
  id: ViewconeEffectTalk
  components:
  - type: Sprite
    state: talk
