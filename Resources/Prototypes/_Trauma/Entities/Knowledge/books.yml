- type: entity
  parent: BookSkillbook
  id: BookStrength
  name: HOW TO GET JACKED MONTHY OH HELL YEAH
  suffix: strength
  description: You feel yourself throwing your back out just looking at this.
  components:
  - type: Sprite
    layers:
    - state: strength
  - type: KnowledgeGrantOnUse
    skills:
      StrengthKnowledge: 10
      AthleticsKnowledge: 10
      ToughnessKnowledge: 10
    experience:
      StrengthKnowledge: 3
      AthleticsKnowledge: 3
      ToughnessKnowledge: 3
    doAfter: 2

