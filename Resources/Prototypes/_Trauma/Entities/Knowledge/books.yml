  name: Principles of Engineering in Space - 17th Edition
  suffix: fabrication
  description: Used to guarantee you a bright future. Now it guarantees you wage slavery.
  components:
  - type: Sprite
    layers:
    - state: fabrication
  - type: KnowledgeGrantOnUse
    skills:
      FabricationKnowledge: 25
    experience:
      FabricationKnowledge: 4
    doAfter: 2

# Carving

- type: entity
  parent: BookSkillbook
  id: BookSurvival
  name: BSA handbook
  suffix: survival
  description: Has a plethora of knowledge on plants you will never see and animals that died out long ago. At least it teaches you how to carve.
  components:
  - type: Sprite
    layers:
    - state: fabrication
  - type: KnowledgeGrantOnUse
    skills:
      CarvingKnowledge: 10
    experience:
      CarvingKnowledge: 3
    doAfter: 2

- type: entity
  parent: BookSkillbook
