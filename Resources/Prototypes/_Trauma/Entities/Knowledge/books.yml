- type: cargoProduct
  id: RandomSkillbooks
  icon:
    sprite: Objects/Misc/books.rsi
    state: book_icon
  product: CrateRandomSkillbooks
  cost: 2000
  category: cargoproduct-category-name-service
  group: market

- type: entity
  parent: CrateGenericSteel
  id: CrateRandomSkillbooks
  name: skillbooks crate
  description: Contains skillbooks.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: RandomSkillbook

- type: entityTable
  id: RandomSkillbook
  table: !type:GroupSelector
    children:
    - id: BookJanitor
    - id: BookFabrication
    - id: BookSurvival
    - id: BookMaterials
    - id: BookDoors
    - id: BookAirlocks
    - id: BookToys
    - id: BookBananium
    - id: BookBots
    - id: BookFurniture
    - id: BookInfrastructure
    - id: BookElectronics
    - id: BookWalls
    - id: BookWindows
    - id: BookSmokeables

- type: entity
  parent: BaseItem
  id: BookSkillbook
  abstract: true
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Misc/skillbooks.rsi
    layers:
    - state: base
  - type: StaticPrice
    price: 20
  - type: KnowledgeGrantOnUse
    singleUse: false # crew books are for sharing
    instant: false
  - type: Tag
    tags:
    - Book
  - type: Item
    size: Small

# Debug

- type: entity
  parent: [BookSkillbook, BaseMagicalContraband]
  id: BookDebug
  name: The Hitchikers Guide to the Galaxy
  suffix: debug
  description: Teaches you everything.
  components:
  - type: Sprite
    layers:
    - state: melee
  - type: KnowledgeGrantOnUse
    grantEverything: true
    instant: true

# TODO: These should just give you an xp gain buff rather than make you stronger bruh
- type: entity
  parent: BookSkillbook
  id: BookSchematic
  name: blueprint
  abstract: true
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Misc/schematics.rsi

# Melee

- type: entity
  parent: [BookSkillbook, BaseRevMinorContraband]
  id: BookMeleePrintedRev
  name: ГОЙДА! Д
  suffix: melee
  description: It contains cyrillic instructions about melee combat and some of the weapons used.
  components:
  - type: Sprite
    layers:
    - state: melee
  - type: KnowledgeGrantOnUse
    skills:
      MeleeKnowledge: 35
      WeaponsKnowledge: 35
    experience:
      MeleeKnowledge: 15
      WeaponsKnowledge: 15
    doAfter: 2

# Shooting

- type: entity
  parent: [BookSkillbook, BaseRevMinorContraband]
  id: BookShootingPrintedRev
  name: ГОЙДА! Б
  suffix: shooting
  description: It contains cyrillic instructions about firearms and their manufacturing.
  components:
  - type: Sprite
    layers:
    - state: shooting
  - type: KnowledgeGrantOnUse
    skills:
      ShootingKnowledge: 35
      WeaponsKnowledge: 35
    experience:
      ShootingKnowledge: 5
      WeaponsKnowledge: 4
    doAfter: 2

# Magic

- type: entity
  parent: BookSkillbook
  id: BookJanitor
  name: WHY I LOVE SOAP AND WHY YOU SHOULD TOO
  suffix: janitor
  description: Voxes supposedly love this one, its mostly useless rambling.
  components:
  - type: Sprite
    layers:
    - state: janitor
  - type: KnowledgeGrantOnUse
    skills:
      ThrowingKnowledge: 25
      JanitorKnowledge: 25
    experience:
      ThrowingKnowledge: 3
      JanitorKnowledge: 3
    doAfter: 2

# Fabrication

- type: entity
  parent: BookSkillbook
