- type: cargoProduct
  id: RandomSkillbooks
  icon:
    sprite: Objects/Misc/books.rsi
    state: book_icon
  product: CrateRandomSkillbooks
  cost: 2000
  category: cargoproduct-category-name-service
  group: market

- type: entity
  parent: CrateGenericSteel
  id: CrateRandomSkillbooks
  name: skillbooks crate
  description: Contains skillbooks.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: RandomSkillbook

- type: entityTable
  id: RandomSkillbook
  table: !type:GroupSelector
    children:
    - id: BookStrength
    - id: BookMelee
    - id: BookShooting
    - id: BookSurgery
    - id: BookMagicalLiteracy
    - id: BookLiteracy
    - id: BookJanitor
    - id: BookLanguageTauCeti
    - id: BookFabrication
    - id: BookSurvival
    - id: BookMaterials
    - id: BookDoors
    - id: BookAirlocks
    - id: BookToys
    - id: BookBananium
    - id: BookBots
    - id: BookFurniture
    - id: BookInfrastructure
    - id: BookElectronics
    - id: BookWalls
    - id: BookWindows
    - id: BookSmokeables

- type: entity
  parent: BaseItem
  id: BookSkillbook
  abstract: true
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Misc/skillbooks.rsi
    layers:
    - state: base
  - type: StaticPrice
    price: 20
  - type: KnowledgeGrantOnUse
    singleUse: false # crew books are for sharing
    instant: false
  - type: Tag
    tags:
    - Book
  - type: Item
    size: Small

# Debug

- type: entity
  parent: [BookSkillbook, BaseMagicalContraband]
  id: BookDebug
  name: The Hitchikers Guide to the Galaxy
  suffix: debug
  description: Teaches you everything.
  components:
  - type: Sprite
    layers:
    - state: melee
  - type: KnowledgeGrantOnUse
    grantEverything: true
    instant: true

