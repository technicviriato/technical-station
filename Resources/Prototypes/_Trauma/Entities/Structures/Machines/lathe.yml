  id: RevTelesphere
  name: telesphere
  description: An experimental device, it can be used to remotely steal materials from passing trade ships using plasma. Additionally; it can be used as a material silo for the revolution.
  components:
  - type: Sprite
    sprite: _Trauma/Structures/Machines/telesphere.rsi
  - type: Lathe
    producingSound:
      path: /Audio/_Trauma/Revs/telesphere.ogg
    runningState: telesphere
    staticPacks:
    - RevTelesphereStatic
  - type: Construction
    node: telesphere
  - type: PointLight
    enabled: true
    color: "#ffffff"
    radius: 1.5
    energy: 5.0
  - type: WirelessNetworkConnection
    range: 1000
  - type: DeviceLinkSource
    range: 1000
    ports:
    - MaterialSilo
  - type: MaterialStorage
    ignoreColor: true
  - type: Silo

