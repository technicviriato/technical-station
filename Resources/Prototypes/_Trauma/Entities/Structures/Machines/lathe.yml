    - state: chains
      map: [ "chains" ]
    - state: station
      map: ["station"]
  - type: Construction
    graph: PowerArmorStand
    node: start
  - type: Strap
    buckleOnInteractHand: false
    addBuckleverb: false
    buckleOffset: "0, 0.2"
