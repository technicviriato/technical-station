- type: entity
  abstract: true
  parent: [BaseStructure, BaseMagicalContraband]
  id: BaseSummoningRune
  components:
  - type: Clickable
  - type: IgnoresFingerprints
  - type: Damageable
  - type: Injurable
    damageContainer: Inorganic
  - type: Fixtures
    fixtures: # TODO: why the fuck is this here?
      rune:
        shape:
          !type:PhysShapeCircle
          radius: 1.5
        hard: false
        mask:
         - ItemMask
        layer:
         - SlipLayer
  - type: Physics
    canCollide: false

- type: entity
  abstract: true
  parent: [BaseStructure, DrinkBase, BaseMagicalContraband]
  id: BaseCarvedRune
  components:
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/_Goobstation/Heretic/runebreak.ogg
  - type: InteractionOutline
  - type: Physics
    canCollide: false
# Enchanting

- type: entity
  parent: BaseCarvedRune
  id: EnchantingRuneCarved
  name: unfinished rune
  description: An unfinished rune, needs blood.
  components:
  - type: Sprite
    sprite: _Trauma/Structures/Runes/enchanting.rsi
    state: carved
    snapCardinals: true
  - type: Construction
    graph: EnchantingRune
    node: carved

- type: entity
  parent: BaseSummoningRune
  id: EnchantingRune
  name: enchantment rune
  description: A rune used for enchanting items.
  components:
  - type: PlaceableSurface
  - type: EnchantingTable
  - type: Sprite
    sprite: _Trauma/Structures/Runes/enchanting.rsi
    state: icon
    snapCardinals: true
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 30
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/_Goobstation/Heretic/runebreak.ogg
  - type: Construction
    graph: EnchantingRune
    node: finish

