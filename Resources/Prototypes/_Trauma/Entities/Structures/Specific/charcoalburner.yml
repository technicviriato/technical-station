# TODO: dont use a fucking lathe, use crowbar to toggle charcoal / ash
- type: entity
  parent: BaseMachine
  id: CharcoalOven
  name: charcoal oven
  description: Turns wood into either charcoal or ash.
  components:
  - type: Sprite
    sprite: _Trauma/Structures/Forging/charcoalburner.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
  - type: MaterialStorage
    whitelist:
      tags:
      - Sheet
      - RawMaterial
  - type: Lathe
    idleState: icon
    runningState: burning
    staticPacks:
    - CharcoalBurnerStatic
    producingSound:
      path: /Audio/_Trauma/Revs/foundryaudio.ogg
      params:
        volume: -6
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger: !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 3
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: Appearance
  - type: ActivatableUI
    key: enum.LatheUiKey.Key
  - type: UserInterface
    interfaces:
      enum.LatheUiKey.Key:
        type: LatheBoundUserInterface
      enum.ResearchClientUiKey.Key:
        type: ResearchClientBoundUserInterface
  - type: AutomationSlots
    slots:
    - !type:AutomatedMaterialStorage
      input: AutomationSlotMaterials
      output: null
  - type: Animateable
  - type: Construction
    graph: CharcoalOven
    node: finish
