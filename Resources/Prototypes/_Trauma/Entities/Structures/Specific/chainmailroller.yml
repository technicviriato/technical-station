- type: entity
  parent: BaseMachine
  id: ChainmailRoller
  name: chainmail roller
  description: This device automatically rolls wire into chainmail.
  components:
  - type: Sprite
    sprite: _Trauma/Structures/Forging/chainmailroller.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
  - type: MaterialStorage
  - type: Lathe
    idleState: icon
    runningState: roller
    staticPacks:
    - CharcoalBurnerStatic # FIXME: what fucking pack is this meant to have
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger: !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 3
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: Appearance
  - type: ActivatableUI
    key: enum.LatheUiKey.Key
  - type: UserInterface
    interfaces:
      enum.LatheUiKey.Key:
        type: LatheBoundUserInterface
      enum.ResearchClientUiKey.Key:
        type: ResearchClientBoundUserInterface
  - type: AutomationSlots
    slots:
    - !type:AutomatedMaterialStorage
      input: AutomationSlotMaterials
      output: null
  - type: Animateable
