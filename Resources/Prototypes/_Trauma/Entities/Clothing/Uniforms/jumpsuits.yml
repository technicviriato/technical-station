- type: entity
  parent: [ ClothingUniformJumpsuitMercenary, BaseRevMajorContraband ]
  id: ClothingUniformJumpsuitMilitaryTurtleneckRev
  name: military jumpsuit
  description: A sturdy and protective jumpsuit.
  components:
  - type: Sprite
    sprite: _NF/Clothing/Uniforms/Jumpsuit/military.rsi
    layers:
    - state: icon-base-bottom
      color: "#3e3e48"
    - state: icon-base-top-turtleneck
      color: "#b5b56e"
    - state: icon-belt
      color: "#3e3e48"
    - state: icon-belt-buckle
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-base-bottom
        color: "#3e3e48"
      - state: inhand-left-base-top-turtleneck
        color: "#b5b56e"
      - state: inhand-left-belt
        color: "#3e3e48"
      - state: inhand-left-belt-buckle
      right:
      - state: inhand-right-base-bottom
        color: "#3e3e48"
      - state: inhand-right-base-top-turtleneck
        color: "#b5b56e"
      - state: inhand-right-belt
        color: "#3e3e48"
      - state: inhand-right-belt-buckle
  - type: Clothing
    sprite: _NF/Clothing/Uniforms/Jumpsuit/military.rsi
    clothingVisuals:
      jumpsuit:
      - state: equipped-base-bottom
        color: "#3e3e48"
      - state: equipped-base-top-turtleneck-alt
        color: "#b5b56e"
      - state: equipped-belt
        color: "#3e3e48"
      - state: equipped-belt-buckle
  - type: Armor
    coverage:
    - Torso
    - Arm
    - Hand
    - Leg
    - Foot
    modifiers:
      coefficients:
        Blunt: 0.85
        Heat: 0.85

- type: entity
  parent: [ ClothingUniformBase, ClothingUniformFoldableBase ]
  id: ClothingUniformJumpsuitOliveDrabs
  name: olive drabs
  description: Standard-issue military uniform in a plain olive pattern. Lacks a good camo index.
  components:
  - type: Sprite
    sprite: _Trauma/Clothing/Uniforms/Jumpsuit/olivedrabs.rsi
  - type: Clothing
    sprite: _Trauma/Clothing/Uniforms/Jumpsuit/olivedrabs.rsi
  - type: FoldableClothing
    foldedEquippedPrefix: naked

- type: entity
  parent: [ ClothingUniformBase, ClothingUniformFoldableBase ]
  id: ClothingUniformJumpsuitTigerStripes
  name: tiger stripes
  description: A military uniform used in special covert operations. Boons a good camo index.
  components:
  - type: Sprite
    sprite: _Trauma/Clothing/Uniforms/Jumpsuit/tigerStripes.rsi
  - type: Clothing
    sprite: _Trauma/Clothing/Uniforms/Jumpsuit/tigerStripes.rsi
  - type: FoldableClothing
    foldedEquippedPrefix: naked

