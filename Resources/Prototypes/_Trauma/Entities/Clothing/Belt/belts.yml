- type: entity
  parent: [ ClothingBeltStorageBase, BaseRevMajorContraband ]
  id: ClothingBeltRevWebbing
  name: chest rig
  description: Ideal for storing everything from ammo to weapons and combat essentials.
  components:
  - type: Sprite
    sprite: Clothing/Belt/mercwebbing.rsi
  - type: Clothing
    sprite: Clothing/Belt/mercwebbing.rsi

- type: entity
  parent: [ClothingBeltStorageBase, BaseSyndicateContraband]
  id: ClothingBeltKnifeRig
  name: throwing knife rig
  description: A specialised bandolier meant to hold throwing knives.
  components:
  - type: Sprite
    sprite: _Trauma/Clothing/Belt/throwingkniferig.rsi
  - type: Clothing
    sprite: _Trauma/Clothing/Belt/throwingkniferig.rsi
  - type: StaticPrice
    price: 500
  - type: Storage
    grid:
    - 0,0,7,1
    quickInsert: true
    whitelist:
      tags:
      - ThrowingKnife
  - type: EntityTableContainerFill
    containers:
      storagebase:
        id: ThrowingKnife
        amount: 8

- type: entity
  id: BaseSheathCounterAttackWeak
  abstract: true
  components:
  - type: SheathCounterattack
    extraDamageMultiplier: 1.5
    extraWoundSeverityMultipliers:
      Slash: 2
    extraArmorPenetration: 0.5
  - type: GuideHelp
    guides:
    - CounterAttack

- type: entity
  parent: BaseSheathCounterAttackWeak
  id: BaseSheathCounterAttackMedium
  abstract: true
  components:
  - type: SheathCounterattack
    blockEffectTime: 10

- type: entity
  parent: BaseSheathCounterAttackWeak
  id: BaseSheathCounterAttackStrong
  abstract: true
  components:
  - type: SheathCounterattack
    blockEffectTime: 5
    extraDamageMultiplier: 1.8
    extraWoundSeverityMultipliers:
      Slash: 3

- type: entity
  parent: [ClothingBeltBase, ClothingSlotBase, BaseSheathCounterAttackWeak, BaseSecurityContraband]
  id: ClothingBeltSheathKatana
  name: katana sheath
  description: A sheath designed to hold an officer's blade.
  components:
  - type: Sprite
    sprite: _Trauma/Clothing/Belt/sec_katana_sheath.rsi
    state: sheath
  - type: Clothing
    sprite: _Trauma/Clothing/Belt/sec_katana_sheath.rsi
  - type: Item
    size: Ginormous
  - type: ItemSlots
    smartEquip: true
    slots:
      item:
        name: Katana
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb
        insertSound: /Audio/Items/sheath.ogg
        ejectSound: /Audio/Items/unsheath.ogg
        whitelist:
          tags:
          - Katana
  - type: ItemMapper
    mapLayers:
      sheath-katana:
        whitelist:
          tags:
          - Katana
  - type: Appearance

- type: entity
  id: ClothingBeltSheathKatanaFilled
  parent: ClothingBeltSheathKatana
  suffix: Filled
  components:
  - type: ContainerFill
    containers:
      item:
      - SecurityKatana

- type: entity
  parent: [BaseMajorContraband, BaseSheathCounterAttackStrong, ClothingBeltSheathKatana]
  id: ClothingBeltSheathKatanaNinja
  name: energy katana sheath
  description: A high tech katana sheath that allows for quick blade movements.
  components:
  - type: Sprite
    sprite: _Trauma/Clothing/Belt/ninja_katana_sheath.rsi
  - type: Clothing
    sprite: _Trauma/Clothing/Belt/ninja_katana_sheath.rsi
  - type: EnergyKatanaSheath

- type: entity
  id: ClothingBeltSheathKatanaNinjaFilled
  parent: ClothingBeltSheathKatanaNinja
  suffix: Filled
  components:
  - type: ContainerFill
    containers:
      item:
      - EnergyKatana

- type: entity
