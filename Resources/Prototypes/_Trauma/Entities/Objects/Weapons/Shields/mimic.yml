- type: entity
  name: flesh shield
  parent: BaseShield
  id: ShieldMimic
  description: A large fleshy closet door, could be used as a shield...
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Weapons/Melee/fleshshield.rsi
    state: icon
  - type: Item
    sprite: _Trauma/Objects/Weapons/Melee/fleshshield.rsi
    size: Ginormous
  - type: Blocking
    passiveBlockFraction: .3
    activeBlockFraction: .6
    passiveBlockModifier:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9
        Heat: 0.9
    activeBlockModifier:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.8
        Heat: 0.8
      flatReductions:
        Blunt: 1
        Slash: 1
        Piercing: 1
        Heat: 1
  - type: Destructible
    thresholds: [] # indestructible
  - type: Unremoveable
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/Effects/gib2.ogg
      params:
        volume: -7
  - type: Parry
    soundOnParry:
      path: /Audio/Weapons/pierce.ogg
  - type: HeldSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 10
  - type: StaminaDamageOnHit
    damage: 15
  - type: MeleeThrowOnHit
    distance: 1
