- type: entity
  abstract: true
  parent: [ BaseItem, BaseRevMajorContraband ]
  id: BaseRevMeleeWeapon
  components:
  - type: MeleeWeapon
    wideAnimationRotation: -135
  - type: DisarmMalus
    malus: 0.225
  - type: Appearance
  - type: StaticPrice
    price: 80
  - type: Construction
    deconstructionTarget: null
    node: finished

- type: entity
  abstract: true
  parent: BaseRevMeleeWeapon
  id: BaseRevForgedWeapon
  components:
  - type: Execution
    doAfterDuration: 1.0

- type: entity
  parent: [ BaseRevForgedWeapon, SolutionDart ]
  id: RevMace
  name: forged mace
  description: A robust mace, stuns enemies. Knocks the air out of targets and makes them struggle to speak.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Revs/mace.rsi
    state: icon
  - type: MeleeWeapon
    animationRotation: -45
    damage:
      types:
        Blunt: 6
    soundHit:
      collection: MetalThud
    bluntStaminaDamageFactor: 6
  - type: Item
    shape:
    - 0,0,2,0
    storedRotation: 45
  - type: Construction
    graph: RevMace
  - type: MeleeThrowOnHit
    distance: 0.3
    speed: 1
  - type: SolutionRegeneration
    generated:
      reagents:
      - ReagentId: MuteToxin
        Quantity: 1
  - type: MeleeChemicalInjector
    transferAmount: 0.1
    solution: melee

- type: entity
  parent: [BaseRevForgedWeapon, KnifeDurabilitySharpenOnly]
  id: RevSword
  name: forged sword
  description: A two handed sword, deals heavy damage.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Revs/sword.rsi
    state: icon
  - type: MeleeWeapon
    animationRotation: -90
    damage:
      types:
        Slash: 8
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Item
    size: Huge
    shape:
    - 0,0,7,0
    storedRotation: 45
  - type: IncreaseDamageOnWield
    damage:
      types:
        Slash: 12
  - type: Wieldable
  - type: Tag
    tags:
    - Knife
  - type: Sharp
  - type: Utensil
    types:
    - Knife
  - type: Tool
    qualities:
      - Slicing
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/knife_pickup.ogg
      params:
        volume: -8
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_Goobstation/Items/handling/knife_drop.ogg
      params:
        volume: -8
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Items/handling/knife_drop.ogg
      params:
        volume: -8
  - type: Construction
    graph: RevSword
  - type: Parry
    parryExhaustionCost: 0.25
    parryMinSkill: 40
    soundOnParry:
      path: /Audio/_Goobstation/Heretic/parry.ogg
      params:
        variation: 0.2
        volume: -11

- type: entity
  parent: BaseRevForgedWeapon
  id: RevPitchfork
  name: forged pitchfork
  description: A large pitchfork, can be thrown and has extended melee range.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Revs/pitchfork.rsi
    state: icon
  - type: MeleeWeapon
    animationRotation: -130
    canWideSwing: false
    range: 2.2
    attackRate: 0.8
    damage:
      types:
        Piercing: 8
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Item
    size: Huge
    shape:
    - 0,0,8,0
    storedRotation: 45
  - type: EmbeddableProjectile
  - type: ThrowingAngle
    angle: 225
  - type: IncreaseDamageOnWield
    damage:
      types:
        Piercing: 16
  - type: Wieldable
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 30
  - type: Construction
    graph: RevPitchfork

- type: entity
  parent: [BaseRevForgedWeapon, KnifeDurabilitySharpenOnly]
  id: RevKnife
  name: forged knife
  description: A small forged knife. It is concealable, can be tipped with poison and is usable with a shield.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Revs/knife.rsi
    layers:
    - state: icon
    - state: icon1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/knife_pickup.ogg
      params:
        volume: -8
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_Goobstation/Items/handling/knife_drop.ogg
      params:
        volume: -8
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Items/handling/knife_drop.ogg
      params:
        volume: -8
  - type: MeleeWeapon
    animationRotation: -45
    canWideSwing: false
    damage:
      types:
        Slash: 12
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Item
    size: Small
    storedRotation: -45
  - type: Tag
    tags:
    - Knife
  - type: Sharp
  - type: Utensil
    types:
    - Knife
  - type: Tool
    qualities:
      - Slicing
  - type: EmbeddableProjectile
    sound: /Audio/Weapons/bladeslice.ogg
  - type: DamageOtherOnHit
    damage:
      types:
        Slash: 5
  - type: ThrowingAngle
    angle: 225
  - type: Solution
    id: melee
    solution:
      maxVol: 5
  - type: MeleeChemicalInjector
    transferAmount: 5
    solution: melee
  - type: RefillableSolution
    solution: melee
  - type: InjectableSolution
    solution: melee
  - type: SolutionInjectOnEmbed
    transferAmount: 5
    solution: melee
  - type: SolutionTransfer
    maxTransferAmount: 5
  - type: UseDelay
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    fillBaseName: icon
    inHandsFillBaseName: -fill-
    inHandsMaxFillLevels: 1
  - type: Construction
    graph: RevKnife

- type: entity
  parent: BaseRevMeleeWeapon
  id: RevTorch
  name: combat torch
  description: A refined torch mounted with a steel head. Lights enemies on fire when hit.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Revs/torch.rsi
    state: icon
  - type: MeleeWeapon
    animationRotation: -135
    damage:
      types:
        Heat: 4
    soundHit:
      path: /Audio/Weapons/Guns/Hits/energy_meat1.ogg
  - type: PointLight
    enabled: true
    color: "#E25822"
    radius: 4.0
    energy: 5.0
  - type: Item
    size: Ginormous
  - type: IgnitionSource
    temperature: 700
  - type: AlwaysHot
  - type: IgniteOnMeleeHit
    fireStacks: 1
  - type: Construction
    graph: RevTorch

- type: entity
  parent: [ BaseItem, BaseRevMinorContraband ]
  name: caltrops
  id: Caltrops
  description: A weapon designed to be laid on the floor as a trap, can be thrown for a quick trap anchored in place.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Revs/caltrops.rsi
    state: icon
  - type: Anchorable
  - type: Item
    size: Tiny
  - type: CollisionWake
    enabled: false
  - type: Fixtures
    fixtures:
      slips:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        hard: false
        layer:
        - LowImpassable
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        density: 30
        mask:
        - ItemMask
  - type: StepTrigger
    intersectRatio: 0.2
    triggerGroups:
      types:
      - Caltrop
  - type: Slippery
    slipSound:
      path: /Audio/Weapons/bladeslice.ogg
    slipData:
      launchForwardsMultiplier: 0
  - type: TriggerOnStepTrigger
  - type: DamageOnTrigger
    targetPart: Feet
    targetUser: true
    damage:
      types:
        Piercing: 15
  - type: EmbeddableProjectile
  - type: ThrowingAngle
    angle: 180
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 10

- type: entity
  parent: BaseRevForgedWeapon
  id: RevMaul
  name: forged maul
  description: A robust maul, designed to hit through armor. Definitely not a non-lethal option.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Revs/maul.rsi
    state: icon
  - type: MeleeWeapon
    attackRate: 0.625
    animationRotation: -45
    heavyStaminaCost: 25
    range: 1.70
    damage:
      types:
        Blunt: 20
        Structural: 20
      armorPenetration: 0.75
    bluntStaminaDamageFactor: 1.5
    soundHit:
      path: /Audio/_Trauma/Weapons/Melee/breaching_hammer/club.ogg
  - type: Item
    sprite: _Trauma/Objects/Revs/maul_inhands_64x.rsi
    size: Ginormous
  - type: Construction
    graph: RevMaul
  - type: MeleeThrowOnHit
    distance: 0.3
    speed: 1
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 5
        Structural: 20
  - type: Wieldable

- type: entity
  parent: BaseRevForgedWeapon
  id: RevKunai
  name: forged kunai
  description: A shovel often thrown by weebs, capable of a lot if you know what you're doing. The red handle wards off demons.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Revs/kunai.rsi
    layers:
    - state: icon
    - state: icon1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
  - type: Item
    size: Small
    storedRotation: -45
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/knife_pickup.ogg
      params:
        volume: -8
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_Goobstation/Items/handling/knife_drop.ogg
      params:
        volume: -8
  - type: Tag
    tags:
    - CombatKnife
    - Knife
    - ThrowingKnife
  - type: Shovel # it's a shovel
  - type: ToolTileCompatible
  - type: Sharp
  - type: Utensil
    types:
    - Knife
  - type: Tool
    qualities:
    - Slicing
  - type: Prying
  - type: UseDelay
    delay: 1
  - type: Construction
    graph: RevKunai
  - type: MeleeWeapon
    animationRotation: -130
    canWideSwing: false
    damage:
      types:
        Piercing: 10
        Structural: 15
        Holy: 1
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: EmbeddableProjectile
    sound: /Audio/Weapons/star_hit.ogg
    offset: -0.15,0.0
    removalTime: 0.5 # its a shovel, despite penning armor it doesnt go that deep
  - type: ThrowingAngle
    angle: 225
  - type: LandAtCursor
  - type: DamageOtherOnHit
    increaseOnly: true
    damage:
      types:
        Piercing: 15 # 7 to crit
        Structural: 15
  - type: Solution
    id: melee
    solution:
      maxVol: 3
  - type: MeleeChemicalInjector
    transferAmount: 3
    solution: melee
  - type: RefillableSolution
    solution: melee
  - type: InjectableSolution
    solution: melee
  - type: SolutionInjectOnEmbed
    transferAmount: 3
    solution: melee
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    fillBaseName: icon
    inHandsFillBaseName: -fill-
    inHandsMaxFillLevels: 1
