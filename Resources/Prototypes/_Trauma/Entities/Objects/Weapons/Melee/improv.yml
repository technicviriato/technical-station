  - type: Item
    size: Large
    shape:
    - 0,0,0,2
    storedRotation: -45

- type: entity
  parent: [ BaseItem, BaseMinorContraband, WoodDurabilityWeak ]
  id: NailBoardWeapon
  name: nail board
  description: A nasty weapon that also works as a trap.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Weapons/Melee/nailboard.rsi
    state: finished
  - type: MeleeWeapon
    animationRotation: -135
    heavyStaminaCost: 15
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 10
        Piercing: 3
    soundHit:
      collection: MetalThud
  - type: Item
    size: Large
    shape:
    - 0,0,0,2
    storedRotation: -45
  - type: PhysicalComposition
    materialComposition:
      Wood: 100
      Steel: 50
  - type: Tag
    tags:
    - BaseballBat
    - Recyclable
  - type: UndetectableContraband
  - type: SpawnAfterInteract
    prototype: NailBoardTrap
    doAfter: 0.5
    removeOnInteract: true
  - type: Construction
    graph: NailBoard
    node: finish

- type: entity
  parent: [ BaseItem, BaseRevMinorContraband ]
  id: NailBoardTrap
  name: nail board
  description: A nasty trap, probbaly gonna give your foot an infection.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Weapons/Melee/nailboard.rsi
    state: floor
  - type: Transform
    anchored: true
  - type: Anchorable
    flags:
    - Anchorable
  - type: Physics
    bodyType: Static
  - type: CollisionWake
    enabled: false
  - type: Fixtures
    fixtures:
      slips:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        hard: false
        layer:
        - LowImpassable
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        density: 30
        mask:
        - ItemMask
  - type: StepTrigger
    intersectRatio: 0.2
  - type: Slippery
    slipSound:
      path: /Audio/Weapons/bladeslice.ogg
    slipData:
      launchForwardsMultiplier: 0
  - type: TriggerOnStepTrigger
  - type: DamageUserOnTrigger
    damage:
      types:
        Piercing: 15
  - type: Damageable
    damageModifierSet: Wood
  - type: Injurable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank:
            min: 1
            max: 1
          Nail:
            min: 1
            max: 5
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  parent: [ BaseItem, BaseMinorContraband, SpearDurabilityWeak ]
  id: SpearPipebomb
  name: pipe bomb spear
  description: Risky, but deadly.
  components:
  - type: ThrowableBlocked
  - type: UndetectableContraband
  - type: CosmicTransmutable
    transmuteTo: SpearCosmicCult
  - type: DamageOnHit
    damage:
      types:
        Blunt: 1
  - type: EmbeddableProjectile
    removalTime: 1
    offset: -0.15,0.0
  - type: ThrowingAngle
    angle: 225
  - type: LandAtCursor
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PolygonShape
          vertices:
            - -0.08,-0.06
            - -0.06,-0.08
            - 0.40,0.30
            - 0.30,0.40
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: Sharp
  - type: Sprite
    sprite: _Trauma/Objects/Weapons/Melee/spear_pipebomb.rsi
    layers:
    - state: base
      map: ["enum.TriggerVisualLayers.Base"]
  - type: MeleeWeapon
    canWideSwing: false
    range: 2.2
    attackRate: 0.6
    animationRotation: -135
    wideAnimationRotation: -135
    damage:
      types:
        Piercing: 10
    angle: 0
    animation: WeaponArcThrust
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 15
  - type: Item
    size: Large
    shape:
    - 0,0,8,0
    storedRotation: 45
  - type: UseDelay
  - type: Appearance
  - type: TimerTrigger
    delay: 5
    examinable: false
    initialBeepDelay: 0
    beepSound: /Audio/Effects/lightburn.ogg
  - type: RandomTimerTrigger
    min: 3
    max: 5
  - type: ExplodeOnTrigger
    keysIn:
    - timer
  - type: Explosive
    explosionType: Default
    totalIntensity: 50
    intensitySlope: 5
    maxIntensity: 6
    canCreateVacuum: false
  - type: TimerTriggerVisuals
  - type: GenericVisualizer
    visuals:
      enum.Trigger.TriggerVisuals.VisualState:
        enum.ConstructionVisuals.Layer:
          Primed: { state: active }
          Unprimed: { state: icon }
  - type: AnimationPlayer
  - type: Tag
    tags:
    - Grenade
    - HandGrenade
    - Spear
  - type: TriggerOnEmbed
  - type: ToggleComponentsOnTrigger
    components:
      - type: PointLight
        radius: 3
        energy: 15
        color: "#b85425"
  - type: Construction
    graph: PipebombSpear
    node: finish

- type: entity
  parent: SpearPipebomb
  id: SpearIED
  name: fire bomb spear
  description: Risky, but deadly.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Weapons/Melee/spear_IED.rsi
    layers:
    - state: base
      map: ["enum.TriggerVisualLayers.Base"]
  - type: SpawnOnTrigger
    keysIn:
    - timer
    proto: MolotovFire
  - type: Explosive
    explosionType: FireBomb
    totalIntensity: 25
    intensitySlope: 5
    maxIntensity: 3
    canCreateVacuum: false
  - type: Construction
    graph: IEDSpear
    node: finish

