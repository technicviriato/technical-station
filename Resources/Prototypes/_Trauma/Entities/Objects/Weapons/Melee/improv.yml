- type: entity
  parent: BaseBallBat
  id: BaseBallBatBarb
  name: barbwire baseball bat
  description: A robust baseball bat with barbed wire.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Weapons/Melee/bat_barbwire.rsi
    state: icon
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 10
        Slash: 2
        Structural: 5
  - type: Construction
    graph: WoodenBat
    node: barbedwire
  - type: PhysicalComposition
    materialComposition:
      Wood: 250
      Steel: 50
  - type: Tag
    tags:
    - BaseballBat
    - Recyclable
  - type: Solution
    id: melee
    solution:
      maxVol: 5
  - type: SolutionRegeneration
    generated:
      reagents:
      - ReagentId: Glennium
        Quantity: 5
  - type: MeleeChemicalInjector
    transferAmount: 5
    solution: melee
  - type: Item
    storedSprite:
      state: storage
      sprite: _Trauma/Objects/Weapons/Melee/bat_barbwire.rsi

