- type: entity
  parent: [BaseSword, BaseSecurityContraband]
  id: SecurityKatana
  name: officer's katana
  description: An elegant weapon, its monomolecular edge is capable of cutting through flesh and bone with ease.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Weapons/Melee/sec_katana.rsi
  - type: MeleeWeapon
    animationRotation: -95
    wideAnimationRotation: -135
    damage:
      types:
        Slash: 17
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Item
    storedRotation: -45
    shape:
    - 0,0,0,3
  - type: Tag
    tags:
    - Katana

