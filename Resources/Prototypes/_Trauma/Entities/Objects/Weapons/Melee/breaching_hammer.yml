- type: entity
  parent: [BaseItem, BaseSecurityContraband]
  id: SecBreachingHammer
  name: breaching hammer
  description: A large, heavy hammer with a long handle, used for breaking stones or other heavy material such as the skulls of violent criminals, also perfect for forcing your way through airlocks.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Weapons/Melee/breaching_hammer.rsi
    state: icon
  - type: MeleeWeapon
    attackRate: 0.5
    range: 1.70
    heavyStaminaCost: 25
    damage:
      types:
        Blunt: 5
        Structural: 25
    soundHit:
      path: /Audio/_Trauma/Weapons/Melee/breaching_hammer/club.ogg
  - type: Wieldable
  - type: HeldSpeedModifier
    walkModifier: 0.6
    sprintModifier: 0.6
  - type: ClothingSpeedModifier
    walkModifier: 0.6
    sprintModifier: 0.6
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 5
        Structural: 35
  - type: Item
    size: Ginormous
  - type: Tool
    qualities:
    - Prying
    useSound: /Audio/Items/crowbar.ogg
  - type: ToolTileCompatible
  - type: Prying
    speedModifier: 0.8
    pryPowered: true
    useSound: /Audio/Items/jaws_pry.ogg
  - type: UseDelay
    delay: 1
  - type: Clothing
    sprite: _Trauma/Objects/Weapons/Melee/breaching_hammer.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
