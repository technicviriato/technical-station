- type: entity
  name: mandate
  parent: [BaseItem, BaseGrandTheftContraband]
  id: Mandate
  description: A massive, ancient greatsword. Its weight alone is enough to crush most opposition. Those who wield it are slowed by its immense mass.
  components:
    - type: Sprite
      sprite: _Trauma/Objects/Weapons/Melee/mandate.back.icon.rsi
      layers:
        - state: mandate_off
        - state: mandate_on
          visible: false
          shader: unshaded
          map: [ "blade" ]
    - type: Item
      size: Ginormous
      sprite: _Trauma/Objects/Weapons/Melee/mandate.rsi
      inhandVisuals:
        left:
          - state: executionersswordunwieldedleft
        right:
          - state: executionersswordunwieldedright
      wieldedInhandVisuals:
        left:
          - state: executionersswordwieldedleftinactive
        right:
          - state: executionersswordwieldedrightinaactive
      storedSprite:
        state: executionersswordback
        sprite: _Trauma/Objects/Weapons/Melee/mandate.back.icon.rsi
    - type: Clothing
      sprite: _Trauma/Objects/Weapons/Melee/mandate.back.icon.rsi
      slots:
        - Back
      clothingVisuals:
        back:
        - state: executionersswordback
    - type: Battery
      maxCharge: 1000
      startingCharge: 1000
    - type: BatterySelfRecharger
      autoRechargeRate: 33.3
      autoRechargePauseTime: 0
    - type: ItemToggle
      needsPower: true
      onUse: false
      onActivate: false
      soundActivate:
        path: /Audio/Weapons/ebladeon.ogg
      soundDeactivate:
        path: /Audio/Weapons/ebladeoff.ogg
    - type: ItemToggleActiveSound
      activeSound:
        path: /Audio/Weapons/ebladehum.ogg
    - type: ItemToggleMeleeWeapon
      activatedDamage:
        types:
          Slash: 25
          Heat: 10
        woundSeverityMultipliers:
          Slash: 2.5
      activatedSoundOnHit:
        path: /Audio/Weapons/eblade1.ogg
        params:
          variation: 0.250
      activatedSoundOnSwing:
        path: /Audio/Weapons/eblademiss.ogg
        params:
          variation: 0.125
    - type: ComponentToggler
      components:
        - type: Sharp
        - type: DisarmMalus
          malus: 0.8
        - type: Execution
          doAfterDuration: 4.0
    - type: ToggleableVisuals
      spriteLayer: blade
      inhandVisuals:
        left:
        - state: executionersswordwieldedleftactive
        right:
        - state: executionersswordwieldedrightactive
    - type: ItemTogglePointLight
    - type: PointLight
      enabled: false
      radius: 2
      energy: 2
      color: white
      netsync: false
    - type: Appearance
    - type: MeleeWeapon
      wideAnimationRotation: -135
      attackRate: 0.6
      heavyStaminaCost: 40
      angle: 80
      damage:
        types:
          Blunt: 8
      soundHit:
        path: /Audio/Weapons/bladeslice.ogg
    - type: UseDelay
      delay: 1.5
    - type: Wieldable
      wieldSound: null
    - type: HeldSpeedModifier
      walkModifier: 0.7
      sprintModifier: 0.7
    - type: Parry
      maxParries: 3
      maxReflects: 0
      parryMinSkill: 40
      soundOnParry:
        path: /Audio/_Goobstation/Heretic/parry.ogg
        params:
          variation: 0.2
          volume: -11
    - type: StaticPrice
      price: 3000
    - type: Tag
      tags:
        - HighRiskItem