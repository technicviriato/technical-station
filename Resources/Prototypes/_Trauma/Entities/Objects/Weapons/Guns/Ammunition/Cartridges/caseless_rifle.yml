- type: entity
  parent: BaseCartridgeCaselessRifle
  id: CartridgeCaselessRifleTranquilizer
  name: cartridge (.25 caseless tranq)
  description: A small caliber utilizing caseless technology, omitting conventional brass casing in favor of hardened propellant. A reservoir injects a mix of sedative and mute toxin into the target for true silent takedowns.
  components:
  - type: Sprite
    layers:
    - state: base
      map: [ "enum.AmmoVisualLayers.Base" ]
    - state: tip
      map: [ "enum.AmmoVisualLayers.Tip" ]
      color: "#49cece"
  - type: CartridgeAmmo
    proto: BulletCaselessRifleTranquilizer
  - type: ChemicalAmmo
  - type: Solution
    id: ammo
    solution:
      reagents:
      - ReagentId: Nocturine
        Quantity: 2
      - ReagentId: MuteToxin
        Quantity: 1
  - type: SolutionTransfer
    maxTransferAmount: 3.5

- type: entity
  parent: BaseCartridgeCaselessRifle
  id: CartridgeCaselessRiflePoison
  name: cartridge (.25 caseless toxin)
  description: A small caliber utilizing caseless technology, omitting conventional brass casing in favor of hardened propellant. A toxic payload is installed to kill the target over time.
  components:
  - type: Sprite
    layers:
    - state: base
      map: [ "enum.AmmoVisualLayers.Base" ]
    - state: tip
      map: [ "enum.AmmoVisualLayers.Tip" ]
      color: "#5f959c"
  - type: CartridgeAmmo
    proto: BulletCaselessRiflePoison
  - type: ChemicalAmmo
  - type: Solution
    id: ammo
    solution:
      reagents:
      - ReagentId: Lexorin
        Quantity: 1
  - type: SolutionTransfer
    maxTransferAmount: 1.5
