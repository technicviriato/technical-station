- type: entity
  parent: BaseItem
  id: BaseWeaponGaussgun
  abstract: true
  components:
  - type: Item
    size: Ginormous
    shape:
    - 0,0,8,1
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: HeldSpeedModifier
  - type: StaticPrice
    price: 1500
  - type: EmitSoundOnPickup
    sound:
      collection: SnipersPickUp
  - type: EmitSoundOnDrop
    sound:
      collection: SnipersDrop
  - type: EmitSoundOnLand
    sound:
      collection: SnipersDrop
  - type: AmmoCounter
  - type: Gun
    minAngle: 30
    maxAngle: 40
    fireRate: 1
    angleIncrease: 3
    angleDecay: 16
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/_Trauma/Weapons/Guns/railgun/railgunshot.ogg
    defaultDirection: 1, 0
  - type: MultiMagazineAmmoProvider
    slots:
      gun_magazine: null # Use ammo provied by gun magazine
      gun_magazine_cell: 0.34 # Don't use battery projectiles, multiply fire cost by 0.34 (45 shots for high-cap cell)
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineGaussgun
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_magazine_cell:
        ejectOnInteract: false
        name: power-cell-slot-component-slot-name-default
        whitelist:
          tags:
          - PowerCell
          - PowerCellSmall
        blacklist:
          tags:
          - PotatoBattery
        whitelistFailPopup: gun-magazine-whitelist-fail
  - type: PowerCellSlot
    cellSlotId: gun_magazine_cell
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_magazine_cell: !type:ContainerSlot
  - type: Appearance

- type: entity
  parent: [ BaseWeaponGaussgun, BaseSecurityContraband ]
  id: WeaponGaussgun
  name: gauss rifle
  description: Requires both a battery and ammunition to operate, a cheaper alternative to ballistic firearms.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Weapons/Guns/Gaussguns/gaussgun.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    size: Large
    sprite: _Trauma/Objects/Weapons/Guns/Gaussguns/gaussgun_inhands_64x.rsi
  - type: Clothing
    sprite: _Trauma/Objects/Weapons/Guns/Gaussguns/gaussgun_back.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Gun
    fireRate: 1
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -20
    maxAngle: -30

- type: entity
  parent: [ WeaponGaussgun, BaseMajorContraband ]
  id: WeaponGaussgunImprov
  name: gauss rifle
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Weapons/Guns/Gaussguns/improv_gaussgun.rsi
  - type: Item
    sprite: _Trauma/Objects/Weapons/Guns/Gaussguns/improv_gaussgun_inhands_64x.rsi
  - type: Clothing
    sprite: _Trauma/Objects/Weapons/Guns/Gaussguns/improv_gaussgun_back.rsi
  - type: Gun
    minAngle: 40
    maxAngle: 50
    fireRate: 1
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -20
    maxAngle: -30
  - type: Construction
    graph: GaussRifleGraph
    node: finish

- type: entity
  parent: [ WeaponGaussgun, BaseMajorContraband ]
  id: WeaponGaussgunPistol
  name: gauss pistol
  description: A much ligher alternative to the Gaussgun, but far more innacurate and only semiautomatic.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Weapons/Guns/Gaussguns/gausspistol.rsi
  - type: Item
    sprite: _Trauma/Objects/Weapons/Guns/Gaussguns/gausspistol.rsi
    size: Small
    shape:
    - 0,0,0,0
    - 0,1,1,1
  - type: Clothing
    sprite: _Trauma/Objects/Weapons/Guns/Gaussguns/gausspistol.rsi
  - type: Gun
    minAngle: 10
    maxAngle: 20
    fireRate: 1
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: Construction
    graph: GaussPistolGraph
    node: finish

