- type: entity
  parent: [ ProjectileGrenadeBase, BaseRevMajorContraband, TimerGrenadeBase ]
  id: GrenadeShrapnelRev
  name: improvised shrapnel bomb
  description: Releases a deadly spray of shrapnel that causes severe bleeding.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Bombs/ied.rsi
    layers:
    - state: base
      map: ["enum.TriggerVisualLayers.Base"]
    - state: fuel
    - state: wires
  - type: ProjectileGrenade
    fillPrototype: PelletClusterLethalWeak
    capacity: 30
  - type: TimerTrigger
    delay: 5
    examinable: false
    initialBeepDelay: 0
    beepSound:
      path: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
      params:
        volume: 1
  - type: Item
    sprite: Objects/Weapons/Bombs/ied.rsi
  - type: EmitSoundOnTrigger
    sound:
      path: "/Audio/Weapons/Guns/Gunshots/batrifle.ogg"
  - type: StaticPrice
    price: 1500
  - type: Appearance
  - type: AnimationPlayer
  - type: TimerTriggerVisuals
    unprimedSprite: base
  - type: Construction
    deconstructionTarget: null
    graph: RevIED
    node: IED

- type: entity
  parent: GrenadeShrapnel
  id: GrenadeShrapnelFoam
  name: foam dart grenade
  suffix: Shrapnel
  description: Releases a bothersome spray of foam darts that cause severe welching.
  components:
  - type: Sprite
    sprite: Objects/Fun/Foam/foam_grenade.rsi
