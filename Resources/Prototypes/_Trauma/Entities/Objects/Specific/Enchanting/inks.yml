- type: entity
  abstract: true
  parent: [BaseItem, BaseMagicalContraband]
  id: BaseInk
  description: A vial of magical ink, can be used on a scroll to prepare an encantment or curse.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Enchanting/inks.rsi
  - type: Item
    size: Tiny
    sprite: _Trauma/Objects/Enchanting/inks.rsi
  - type: EnchantAdder
    desc: A scroll embued with an enchantment. Could do any number of things.
    whitelist:
      tags:
      - EnchantingScroll
    blacklist:
      components:
      - Enchanter # no doomstacking 20 enchants on 1 scroll
  - type: GuideHelp
    guides:
    - Enchanting

- type: entity
  parent: BaseItem
  id: MagicInkRandom
  name: random magic ink
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Enchanting/inks.rsi
    state: nocimat
  - type: TimedDespawn
    lifetime: 0.01
  - type: SpawnOnDespawn
    prototype: RandomInkSpawner
  - type: Construction
    graph: RandomInk
    node: finish

