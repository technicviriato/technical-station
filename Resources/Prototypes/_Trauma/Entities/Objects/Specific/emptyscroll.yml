- type: entity
  parent: [ Paper, BaseMagicalContraband ]
  id: EmptyScroll
  name: empty scroll
  description: Who would keep such a useless thing, it doesn't even have anything written on it!
  suffix: DO NOT MAP
  categories: [ DoNotMap ]
  components:
  - type: Sprite
    layers:
    - state: icon
      sprite: _Trauma/Objects/Specific/empty_scroll.rsi
    - state: paper_words
      map: ["enum.PaperVisualLayers.Writing"]
      visible: false
    - state: paper_stamp-generic
      map: ["enum.PaperVisualLayers.Stamp"]
      visible: false
  - type: Item
    size: Small
  - type: EmptyScroll

- type: entity
  parent: Paper
  id: ScrollFullRandom
  name: old scroll
  description: A scroll that has been partially filled in.
  components:
  - type: Sprite
    layers:
    - state: icon
      sprite: _Trauma/Objects/Specific/empty_scroll.rsi
    - sprite: _Goobstation/Wizard/Objects/scroll.rsi
      state: scroll
      map: ["enum.PaperVisualLayers.Writing"]
    - state: paper_stamp-generic
      map: ["enum.PaperVisualLayers.Stamp"]
      visible: false
  - type: Item
    size: Small
  - type: RandomScroll
