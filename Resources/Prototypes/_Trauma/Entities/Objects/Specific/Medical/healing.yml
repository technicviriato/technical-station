# keep entry weight in RandomSafePillTable synced with number of items here
- type: entityTable
  id: RandomSafePillTrauma
  table: !type:GroupSelector
    children:
    - id: PillTramadol
    - id: PillOxycodone
    - id: PillIbuprofen

# keep entry weight in RandomSafeSyringeTable synced with number of items here
- type: entityTable
  id: RandomSafeSyringeTrauma
  table: !type:GroupSelector
    children:
    - id: SyringeTramadol
    - id: SyringeOxycodone
    - id: SyringeIbuprofen

- type: entity
  parent: PillCanister
  id: PillCanisterSpaceDrugs
  suffix: Space Mirage 15u, 15
  components:
  - type: Label
    currentLabel: space mirage 15u
  - type: EntityTableContainerFill
    containers:
      storagebase:
        id: PillSpaceDrugs
        amount: 15
