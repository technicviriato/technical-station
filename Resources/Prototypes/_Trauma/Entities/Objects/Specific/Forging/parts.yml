# Cement
- type: entity
  parent: [ReagentPacketBase, ItemHeftyBase]
  id: ReagentContainerCement
  name: cement bag
  description: A bag of cement, mix it with water to prepare it.
  components:
  - type: Appearance
  - type: Item
    size: Huge
  - type: MultiHandedItem
  - type: GenericVisualizer
    visuals:
      enum.OpenableVisuals.Opened:
        enum.OpenableVisuals.Layer:
          True: {state: "bag_open"} # open
          False: {state: "bag_closed"} # closed
  - type: Sprite
    sprite: _Trauma/Objects/Specific/forging.rsi
    layers:
    - state: bag_closed
      map: ["enum.OpenableVisuals.Layer"]
  - type: Solution
    solution:
      reagents:
      - ReagentId: Cement
        Quantity: 200

- type: entity
  parent: BaseItem
  id: WetCement
  name: wet cement
  description: Fresh cement, needs to be molded into bricks.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Materials/materials.rsi
    state: cement
  - type: Item
    sprite: _Trauma/Objects/Materials/materials.rsi
    size: Small
    inhandVisuals:
      left:
      - state: brick-inhand-left
      right:
      - state: brick-inhand-right
  - type: Tag
    tags:
    - Cement

- type: entity
  parent: BaseItem
  id: WetBrick
  name: wet brick
  description: A newly made wet brick, leave it out to dry for a while.
  components:
  - type: Damageable
  - type: Injurable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 6000
      behaviors:
      - !type:SpawnEntitiesBehavior
        offset: 0
        spawn:
          Brick1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DamageOverTime
    damage:
      types:
        Slash: 30
    interval: 1
    ignoreResistances: true
  - type: Sprite
    sprite: _Trauma/Objects/Materials/materials.rsi
    state: brick_wet
  - type: Item
    sprite: _Trauma/Objects/Materials/materials.rsi
    size: Small
    inhandVisuals:
      left:
      - state: brick-inhand-left
      right:
      - state: brick-inhand-right
  - type: Construction
    graph: WetBrick
    node: finish
  - type: CollisionWake
    enabled: false
  - type: Fixtures
    fixtures:
      slips:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        hard: false
        layer:
        - LowImpassable
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        density: 30
        mask:
        - ItemMask
  - type: StepTrigger
    intersectRatio: 0.2
    triggerGroups:
      types:
      - Caltrop
  - type: Slippery
    slipSound:
      path: /Audio/Effects/gib1.ogg
    slipData:
      launchForwardsMultiplier: 3
  - type: TriggerOnStepTrigger
  - type: DeleteOnTrigger
  - type: SpawnOnTrigger
    proto: WetCement

# Anvil

- type: entity
  abstract: true
  parent: [ BaseForgeItem, BaseMetallicSteel ]
  id: BaseAnvilPiece
  components:
  - type: DamageOnHolding
    damage:
      types:
        Heat: 15
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 400
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

# Anvil Top

- type: entity
  parent: [ BaseWorkableSteel, BaseAnvilPiece ]
  id: AnvilTopUnfinished
  name: unfinished anvil top
  description: Beat it into shape!
  components:
  - type: Sprite
    layers:
    - state: anvil_top_unfinished
      shader: Emissive
  - type: Workable
    remaining: 200
    result: AnvilTop
  - type: Construction
    graph: AnvilTop
    node: finish

- type: entity
  parent: BaseAnvilPiece
  id: AnvilTop
  name: anvil top
  description: The top part of an anvil. Put it on the bottom half once it has cooled down.
  components:
  - type: Sprite
    layers:
    - state: anvil_top
      shader: Emissive
  - type: Tag
  - type: Metallic
    minTemp: 333 # has to be reasonably cool for welding it, 60C
    idealTemp: 350
    workable: true # want to cool it instead of heat it
  - type: MetallicTags
    unworkable: [ AnvilTop ]

# Anvil Bottom

- type: entity
  parent: [ BaseWorkableSteel, BaseAnvilPiece ]
  id: AnvilBottomUnfinished
  name: unfinished anvil bottom
  description: Beat it into shape!
  components:
  - type: Sprite
    layers:
    - state: anvil_bottom_unfinished
      shader: Emissive
  - type: Workable
    remaining: 200
    result: AnvilBottom
  - type: Construction
    graph: AnvilBottom
    node: finish

- type: entity
  parent: BaseAnvilPiece
  id: AnvilBottom
  name: anvil bottom
  description: The bottom part of an anvil.
  components:
  - type: Sprite
    layers:
    - state: anvil_bottom
      shader: Emissive
  - type: Construction
    graph: Anvil
    node: start
    defaultTarget: anvil

# Unwelded

- type: entity
  parent: BaseItem
  id: AnvilUnwelded
  name: unwelded anvil
  description: Both parts of an anvil, needs to be welded to complete.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Specific/forging.rsi
    state: anvil_unwelded
  - type: Construction
    graph: Anvil
    node: unwelded
    defaultTarget: anvil
