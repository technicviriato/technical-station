# Arrows

- type: entity
  parent: [ BaseMetallicProcGen, BaseArrow ]
  id: ForgedArrow
  name: arrow
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    layers:
    - state: tail
      color: red
    - state: rod
      color: brown
    - state: tip
      map: [ "enum.MetallicVisuals.Layer" ]
      shader: Emissive
    - state: solution1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
  - type: Projectile
    damage:
      types:
        Piercing: 16

