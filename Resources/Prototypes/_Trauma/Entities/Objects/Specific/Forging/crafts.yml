- type: entity
  abstract: true
  parent: [ BaseMetallicProcGen, BaseMinorContraband ]
  id: BaseForgedProduct
  components:
  - type: Sprite
    layers:
    - state: icon
      shader: Emissive
      map: [ "enum.MetallicVisuals.Layer" ]
    - state: handle
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        shader: Emissive
      right:
      - state: inhand-right
        shader: Emissive

- type: entity
  abstract: true
  parent: BaseForgedProduct
  id: BaseForgedProductCrossGuard
  components:
  - type: Sprite
    layers:
    - state: icon
      shader: Emissive
      map: [ "enum.MetallicVisuals.Layer" ]
    - state: handle
    - state: crossguard

- type: entity
  abstract: true
  parent: BaseForgedProduct
  id: BaseForgedProductSeparateHead
  components:
  - type: Sprite
    layers:
    - state: head
      shader: Emissive
      map: [ "enum.MetallicVisuals.Layer" ]
    - state: handle
  - type: Item
    inhandVisuals:
      left:
      - state: head-inhand-left
        shader: Emissive
      - state: handle-inhand-left
      right:
      - state: head-inhand-right
        shader: Emissive
      - state: handle-inhand-right

