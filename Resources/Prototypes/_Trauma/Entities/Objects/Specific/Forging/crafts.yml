# Halberd

- type: entity
  parent: [ BaseMajorContraband, BaseForgedProductSeparateHead, BaseSword ]
  id: ForgedHalberd
  name: halberd
  description: A powerful polearm with an oddly shaped head.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Specific/Forging/Unfinished/halberd_head.rsi
  - type: Item
    sprite: _Trauma/Objects/Specific/Forging/Unfinished/halberd_head.rsi
    size: Ginormous
  - type: MeleeWeapon
    damage:
      types:
        Slash: 4
        Piercing: 18
      woundSeverityMultipliers:
        Slash: 2
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  #- type: Wieldable # TODO: wielding layers

# Longsword

- type: entity
