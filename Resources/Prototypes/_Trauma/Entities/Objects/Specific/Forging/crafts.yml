# Warhammer

- type: entity
  parent: [ BaseForgedProductSeparateHead, BaseItem ]
  id: ForgedWarhammer
  name: warhammer
  description: Every dwarf's gotta have one of these, or maybe forty thousand of them.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Specific/Forging/Unfinished/warhammer_head.rsi
  - type: Item
    sprite: _Trauma/Objects/Specific/Forging/Unfinished/warhammer_head.rsi
    storedRotation: -45
    shape:
    - 0,0,0,2
  - type: MeleeWeapon
    attackRate: 1
    damage:
      types:
        Blunt: 20
      woundSeverityMultipliers:
        Blunt: 2
    soundHit:
      collection: MetalThud
    animationRotation: -135
    wideAnimationRotation: -135
  - type: Tool
    qualities:
    - Prying
    - Hammering
    useSound:
      path: /Audio/Items/crowbar.ogg
  - type: Prying

