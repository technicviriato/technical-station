# Arming Sword

- type: entity
  parent: [ BaseForgedProductCrossGuard, BaseSword ]
  id: ForgedSword
  name: arming sword
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Specific/Forging/Unfinished/sword_blade.rsi
  - type: Item
    sprite: _Trauma/Objects/Specific/Forging/Unfinished/sword_blade.rsi
    storedRotation: -45
    shape:
    - 0,0,0,4
  - type: MeleeWeapon
    damage:
      types:
        Slash: 18
      woundSeverityMultipliers:
        Slash: 2
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: DisarmMalus
  - type: Parry
    parryMinSkill: 50
    soundOnParry:
      path: /Audio/_Goobstation/Heretic/parry.ogg
      params:
        variation: 0.2
        volume: -11

