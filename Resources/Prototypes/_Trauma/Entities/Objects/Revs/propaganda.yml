- type: entity
  parent: [ BasePaper, BaseRevMajorContraband ]
  id: RevPropaganda
  name: propaganda pamphlet
  description: It is a revolutionary propaganda pamphlet. It loses its charm after reading it once, so you will need plenty.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Revs/propaganda.rsi
    layers:
    - state: icon
      visible: true
      map: ["enum.ChargesVisualLayers.ChargesLeft"]
  - type: GenericVisualizer
    visuals:
      enum.ChargesVisuals.Charges:
        enum.ChargesVisualLayers.ChargesLeft:
          True: {state: icon}
          False: {state: burnt}
  - type: FireVisuals
    sprite: _Trauma/Effects/fire.rsi
    normalState: revfire
  - type: RevPropaganda
    conversionDuration: 2
    consumesCharges: 1
    userBlacklist:
      components:
      - MumbleAccent # cant use it while muzzled...
    whitelist:
      components:
      - HumanoidProfile
      - AlwaysRevolutionaryConvertible
    blacklist:
      components:
      - MindShield
      - Revolutionary # no wasting propaganda on someone already converted
      - Deaf # have to hear the headrevs words
      - Zombie
      - AntagImmune
  - type: UseDelay
    delay: 5
  - type: LimitedCharges
    maxCharges: 1
  - type: Tag
    tags:
    - Document # no Paper, cant fax it...

- type: entity
  parent: RevPropaganda
  id: RevPropagandaAdvanced
  name: advanced propaganda pamphlet
  description: This propaganda pamphlet is full of the most potent class consciousness you can come up with. It will convert instantly.
  components:
  - type: RevPropaganda
    conversionDuration: 0.1
    consumesCharges: 1
