- type: entity
  abstract: true
  parent: FloorTileItemBase
  id: BaseFloorTileAstro
  components:
  - type: PhysicalComposition
    materialComposition:
      Plastic: 25

- type: entity
  parent: BaseFloorTileAstro # it's made of plastic...
  id: FloorTileItemPlastic
  name: plastic tile
  components:
  - type: Sprite
    state: steel # no plastic tile item sprites
  - type: Item
    heldPrefix: steel
  - type: FloorTile
    outputs:
    - Plating
    - FloorPlastic
  - type: Stack
    stackType: FloorTilePlastic
  - type: Construction
    graph: TilePlastic
    node: plastic tile

- type: entity
  parent: FloorTileItemPlastic
  id: FloorTileItemPlasticDark
  name: dark plastic tile
  components:
  - type: Sprite
    state: dark
  - type: Item
    heldPrefix: dark
  - type: FloorTile
    outputs:
    - Plating
    - FloorDarkPlastic
  - type: Stack
    stackType: FloorTilePlasticDark
  - type: Construction
    node: dark plastic tile

- type: entity
  parent: FloorTileItemPlastic
  id: FloorTileItemPlasticWhite
  name: white plastic tile
  components:
  - type: Sprite
    state: white
  - type: Item
    heldPrefix: white
  - type: FloorTile
    outputs:
    - Plating
    - FloorWhitePlastic
  - type: Stack
    stackType: FloorTilePlasticWhite
  - type: Construction
    name: white plastic tile
