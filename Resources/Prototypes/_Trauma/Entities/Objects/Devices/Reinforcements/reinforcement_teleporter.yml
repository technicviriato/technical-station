- type: entity
  parent: ReinforcementRadio
  id: ReinforcementRadioSyndicateNukieMouse
  name: suspicious moldy cheese
  description: Moldy cheese with a little worm sticking out of it and a... blinking antenna? Might attract an odd mouse.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Devices/communication.rsi
    layers:
    - state: cheese-radio
  - type: GhostRole
    name: ghost-role-information-nukie-mouse-name
    description: ghost-role-information-nukie-mouse-description
    rules: ghost-role-information-rules-team-antagonist
    mindRoles:
    - MindRoleGhostRoleTeamAntagonist
  - type: GhostRoleMobSpawner
    prototype: MobNukieMouse
  - type: EmitSoundOnUse
    sound: /Audio/Animals/mouse_squeak.ogg

- type: entity
  parent: ReinforcementRadio
  id: ReinforcementRadioSyndicateNukieCarp
  name: syndicate carp reinforcement radio
  description: Calls in a syndicate carp ready to assist you.
  components:
  - type: GhostRole
    name: ghost-role-information-nukie-carp-name
    description: ghost-role-information-nukie-carp-description
    rules: ghost-role-information-rules-team-antagonist
    mindRoles:
    - MindRoleGhostRoleTeamAntagonist
  - type: GhostRoleMobSpawner
    prototype: MobNukieCarp

- type: entity
  parent: ReinforcementRadio
  id: ReinforcementRadioSyndicateNukieSpider
  name: inexplicably menacing egg
  description: You're not sure if that's a radio transceiver or an eye blinking at you. Might attract an odd spider.
  components:
  - type: Sprite
    sprite: _Trauma/Mobs/Animals/Syndicate/nukiespider.rsi
    layers:
    - state: syndicate-spider-egg
  - type: GhostRole
    name: ghost-role-information-nukie-spider-name
    description: ghost-role-information-nukie-spider-description
    rules: ghost-role-information-rules-team-antagonist
    mindRoles:
    - MindRoleGhostRoleTeamAntagonist
  - type: GhostRoleMobSpawner
    prototype: MobNukieSpider
  - type: EmitSoundOnUse
    sound: /Audio/Animals/snake_hiss.ogg

- type: entity
  parent: ReinforcementRadio
  id: ReinforcementRadioSyndicateCyborgSaboteur
  name: syndicate saboteur cyborg reinforcement radio
  description: Calls in a saboteur borg with light weaponry and disruptive gear.
  components:
  - type: GhostRole
    name: ghost-role-information-syndicate-cyborg-saboteur-name
    description: ghost-role-information-syndicate-cyborg-description
    rules: ghost-role-information-silicon-rules
    mindRoles:
    - MindRoleGhostRoleSilicon
    raffle:
      settings: default
  - type: GhostRoleMobSpawner
    prototype: PlayerBorgSyndicateSaboteurBattery

- type: entity
  parent: ReinforcementRadio
