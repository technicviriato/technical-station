- type: entity
  parent: [ AppraisalTool, RadioJammer ]
  id: AppraisalToolRadioJammer
  suffix: Jammer
  components:
  - type: Sprite
    sprite: Objects/Tools/appraisal-tool.rsi
    layers:
    - state: icon
    - state: jammer
      sprite: Objects/Devices/jammer.rsi
      map: ["enum.PowerDeviceVisualLayers.Powered"]
      visible: false
    - state: jammer_high_charge
      sprite: Objects/Devices/jammer.rsi
      visible: false
    - state: jammer_medium_charge
      sprite: Objects/Devices/jammer.rsi
      visible: false
    - state: jammer_low_charge
      sprite: Objects/Devices/jammer.rsi
      visible: false
  - type: Item
    sprite: Objects/Tools/appraisal-tool.rsi
    size: Small

- type: entity
  parent: [ DoorRemoteCanEletrifyDoors, BaseSyndicateContraband ]
  id: DoorRemoteSyndicate
  name: syndicate door remote
  description: A gadget which can open and bolt doors remotely. This one works for syndicate agents.
  components:
  - type: Sprite
    layers:
    - state: door_remotebase
    - state: door_remotelightscolour
      color: "#5c0202"
    - state: door_remotescreencolour
      color: "#5c0202"
  - type: Access
    tags:
    - NuclearOperative
    - SyndicateAgent

- type: entity
  parent: BaseJammer
  id: BorgRadioJammer
  name: radio jammer
  components:
  - type: RadioJammer
    frequenciesExcluded:
    - 1213 # Syndicate Radio
