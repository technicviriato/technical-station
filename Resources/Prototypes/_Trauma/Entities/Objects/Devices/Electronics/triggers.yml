- type: entity
  abstract: true
  parent: BaseItem
  id: BaseModularGrenadeTrigger
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Devices/bombcomponents.rsi
  - type: Item
    size: Small
  - type: StaticPrice
    price: 40
  - type: PayloadTrigger
    components:
    # *use used below to reduce copypaste
    - &use
      type: TriggerOnUse
      keyOut: startTimer
    - type: TimerTrigger # but cant use it as a "parent" sadly so this has to be copypasted everywhere
      keysIn: [ startTimer ]
      keyOut: trigger
  - type: PhysicalComposition
    materialComposition:
      Steel: 75
      Plastic: 25

- type: entity
  parent: [BaseModularGrenadeTrigger, BaseSyndicateContraband]
  id: MinibombTimerTrigger
  name: minibomb timer trigger
  description: A sinister timer.
  components:
  - type: Sprite
    state: timer-minibomb
  - type: PayloadTrigger
    components:
    - *use
    - type: TimerTrigger
      keysIn: [ startTimer ]
      keyOut: trigger
      delay: 5
      initialBeepDelay: 0
      delayOptions: [3, 5, 10, 15, 30]
      beepSound:
        path: /Audio/_Trauma/Machines/BombComponents/minibombbeep.ogg
        params:
          volume: 11

- type: entity
  parent: [BaseModularGrenadeTrigger, BaseSyndicateContraband]
  id: WhiteHoleTimerTrigger
  name: whitehole timer trigger
  description: A repulsive timer.
  components:
  - type: Sprite
    state: timer-whitehole
  - type: PayloadTrigger
    components:
    - *use
    - type: TimerTrigger
      keysIn: [ startTimer ]
      keyOut: trigger
      delay: 3
      initialBeepDelay: 0
      delayOptions: [3, 5, 10, 15, 30]
      beepInterval: 0.69
      beepSound:
        path: /Audio/Effects/Grenades/Supermatter/smbeep.ogg
        params:
          volume: 5

