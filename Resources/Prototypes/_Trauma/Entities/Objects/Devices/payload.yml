  components:
  - type: Sprite
    sprite: _Trauma/Objects/Devices/bombcomponents.rsi
    state: payload-air
  - type: DeleteOnTrigger
  - type: ReleaseGasOnTrigger
    removeFraction: 0.25
    air:
      volume: 1000
      moles: # Target is 3117.84 mols total for filling 30 tiles (goal is 101.325 kPa @ 20C)
      - 654.7464 # oxygen
      - 2463.0936 # nitrogen
      temperature: 293.15

