- type: entity
  parent: [ BasePayload, BaseSyndicateContraband ]
  id: MiniBombPayload
  name: minibomb payload
  description: Causes a small, deadly explosion.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Devices/bombcomponents.rsi
    state: payload-minibomb
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:TriggerBehavior
  - type: DeleteOnTrigger
  - type: Explosive
    explosionType: Minibomb
    maxIntensity: 200
    intensitySlope: 30
    totalIntensity: 60
  - type: ExplodeOnTrigger

- type: entity
  parent: BasePayload
  id: FakeMiniBombPayload
  name: small speaker
  description: Its preprogrammed with a fart noise...
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Devices/bombcomponents.rsi
    state: payload-trick
  - type: EmitSoundOnTrigger
    sound:
      path: /Audio/Effects/Emotes/parp1.ogg

- type: entity
  parent: [ BasePayload, BaseSyndicateContraband ]
  id: WhiteHolePayload
  name: whitehole payload
  description: Pushes everything away very quickly.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Devices/bombcomponents.rsi
    state: payload-whitehole
  - type: EmitSoundOnTrigger
    sound:
      path: /Audio/Effects/Grenades/Supermatter/whitehole_start.ogg
      params:
        volume: 5
  - type: TwoStageTrigger
    triggerDelay: 11.14
    components:
    - type: AmbientSound
      enabled: true
      volume: -5
      range: 14
      sound:
        path: /Audio/Effects/Grenades/Supermatter/whitehole_loop.ogg
    - type: GravityWell
      maxRange: 10
      baseRadialAcceleration: -180
      baseTangentialAcceleration: -5
      gravPulsePeriod: 0.01
    - type: SingularityDistortion
      intensity: -200
      falloffPower: 1.5
    - type: PointLight
      enabled: true
      color: "#ffffff"
      energy: 8
      radius: 6
      softness: 1
      offset: "0, 0"
    - type: EmitSoundOnTrigger
      sound:
        path: /Audio/Effects/Grenades/Supermatter/supermatter_end.ogg
        params:
          volume: 15
    - type: DeleteOnTrigger

- type: entity
  parent: [ BasePayload, BaseMajorContraband ]
  id: NuclearOptionPayload
  name: nuclear option payload
  description: Oh no.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Devices/bombcomponents.rsi
    state: payload-nuclearoption
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 1
      behaviors:
      - !type:TriggerBehavior
  - type: DeleteOnTrigger
  - type: Explosive
    explosionType: Minibomb
    maxIntensity: 50
    intensitySlope: 5
    totalIntensity: 20000
  - type: ExplodeOnTrigger

- type: entity
  parent: [ BasePayload, BaseSyndicateContraband ]
  id: SupermatterGrenadePayload
  name: supermatter payload
  description: Pulls nearby objects close, then explodes.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Devices/bombcomponents.rsi
    state: payload-supermatter
  - type: Destructible
    thresholds:
    - trigger: !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:TriggerBehavior
  - type: Explosive
    explosionType: Default
    totalIntensity: 200
    intensitySlope: 30
    maxIntensity: 120
  - type: TwoStageTrigger
    triggerDelay: 10.45
    components:
    - type: AmbientSound
      enabled: true
      volume: -5
      range: 14
      sound:
        path: /Audio/Effects/Grenades/Supermatter/supermatter_loop.ogg
    - type: GravityWell
      maxRange: 8
      baseRadialAcceleration: 8
      baseTangentialAcceleration: .5
      gravPulsePeriod: 0.02
    - type: SingularityDistortion
      intensity: 150
      falloffPower: 1.5
    - type: PointLight
      enabled: true
      color: "#ffaa44"
      energy: 8
      radius: 6
      softness: 1
      offset: "0, 0"
    - type: EmitSoundOnTrigger
      sound:
        path: /Audio/Effects/Grenades/Supermatter/supermatter_end.ogg
        params:
          volume: 5
    - type: ExplodeOnTrigger

- type: entity
  parent: [ BasePayload, BaseSecurityContraband ]
  id: StingerPayload
  name: stinger payload
  description: Launches many less-lethal stunning rubber pellets.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Devices/bombcomponents.rsi
    state: payload-stinger
  - type: ContainerContainer
    containers:
      cluster-payload: !type:Container
  - type: DeleteOnTrigger
  - type: ProjectileGrenade
    fillPrototype: PelletClusterRubber
    capacity: 30
  - type: EmitSoundOnTrigger
    sound:
      path: "/Audio/Effects/flash_bang.ogg"
  - type: SpawnOnTrigger
    proto: GrenadeFlashEffect

- type: entity
  parent: [ BasePayload, BaseSecurityContraband ]
  id: TearGasPayload
