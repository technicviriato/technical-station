- type: entity
  parent: [ BasePayload, BaseSyndicateContraband ]
  id: HolyPayload
  name: holy payload
  description: Causes a HUGE, deadly explosion.
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Devices/bombcomponents.rsi
    state: payload-HHG
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 25
      behaviors:
      - !type:TriggerBehavior
