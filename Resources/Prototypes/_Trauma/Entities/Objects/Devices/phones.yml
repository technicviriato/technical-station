- type: entity
  parent: BaseItem
  id: RotaryPhone
  name: phone
  categories: [ HideSpawnMenu ]
  description: it's a phone
  components:
  - type: Sprite
    sprite: _RMC14/Objects/phone/phone.rsi
    state: icon
  - type: BlockPull
  - type: RotaryPhone
  - type: ActiveListener
    range: 2
  - type: Speech
    speechVerb: Robotic
    speechSounds: RMCPhoneSpeakSounds
  - type: UserInterface
    interfaces:
      enum.PhoneUiKey.Key:
        type: PhoneBoundUserInterface
      enum.PhoneUiKey.NameChange:
        type: PhoneNameChangeUI
  - type: ActivatableUI
    key: enum.PhoneUiKey.Key
  - type: LanguageSpeaker
    speaks:
    - TauCetiBasic
    - RobotTalk
    understands:
    - TauCetiBasic
    - RobotTalk

- type: entity
  parent: BaseStructure
  id: RotaryPhoneStand
  abstract: true
  name: phone stand
  description: it's a phone stand
  components:
  - type: Sprite
    sprite: _RMC14/Objects/phone/rotary_phone.rsi
    layers:
      - state: rotary_phone
        map: [ "base" ]
    drawdepth: SmallObjects
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.10,-0.10,0.10,0.10"
        density: 500
        mask:
        - TabletopMachineMask
        layer:
        - BulletImpassable
  - type: Anchorable
  - type: RotaryPhoneHolder
  - type: InteractionOutline
  - type: Animateable
  - type: ContainerContainer
    containers:
      phone: !type:ContainerSlot
  - type: DeviceLinkSource
    ports:
    - PhoneRingPort
    - PhoneOutgoingPort
    - PhonePickupPort
    - PhoneHangupPort
  - type: Damageable
  - type: Injurable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: ItemSlots
    slots:
      phone:
        name: phone
        insertSound: /Audio/_RMC14/Phone/sound_machines_phones_hang_up.ogg
        ejectSound: /Audio/_RMC14/Phone/sound_machines_phones_pick_up.ogg
        ejectOnInteract: true
        whitelist:
          components:
          - RotaryPhone
  - type: ContainerFill
    containers:
      phone:
      - RotaryPhone
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.RotaryPhoneLayers.Layer:
        base:
          Base: { state: rotary_phone }
          Ring: { state: rotary_phone_ring }
          Ear: { state: rotary_phone_ear }

- type: entity
  parent: RotaryPhoneStand
  id: RotaryPhoneStandNoRot
  components:
  - type: Transform
    noRot: true

- type: entity
  parent: RotaryPhoneStand
  id: RMCRotaryPhoneWallmount
  name: wall-mounted phone
  description: "It is a wall mounted telephone. The fine text reads: To log your details with the mainframe please insert your keycard into the slot below. Unfortunately the slot is jammed. You can still use the phone, however."
  components:
  - type: Sprite
    sprite: _RMC14/Structures/wallmount_phone.rsi
    layers:
    - state: wall_phone
      map: [ "base" ]
  - type: WallMount
  - type: GenericVisualizer
    visuals:
      enum.RotaryPhoneLayers.Layer:
        base:
          Base: { state: wall_phone }
          Ring: { state: wall_phone_ring }
          Ear: { state: wall_phone_ear }

