- type: entity
  parent: MaterialBase
  id: Whetstone
  name: whetstone
  description: A whetstone, used to maintain bladed weapons.
  suffix: full
  components:
  - type: Sprite
    sprite: _Trauma/Objects/Tools/whetstone.rsi
    state: icon
  - type: Appearance
  - type: Stack
    stackType: Whetstone
    count: 5
  - type: Item
    sprite: _Trauma/Objects/Tools/whetstone.rsi
    storedOffset: 0,-1
    storedRotation: 15
    size: Small
    shape:
    - 0,0,1,0
  - type: Construction
    graph: Whetstone
    node: finish
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      Whetstone: 100
  - type: CustomDurabilityModifier
    maxDurabilityStateModifiers:
      Reinforced: 2, 1.15 # Either +2 damage or +15% damage, whichever is less
  - type: Tool
    qualities:
    - Sharpening
    speedModifier: 0.5
    useSound:
      path: /Audio/_Trauma/Tools/whetstone.ogg

- type: entity
  parent: Whetstone
  id: Whetstone1
  suffix: Single
  components:
  - type: Stack
    count: 1

- type: entity
  parent: MaterialBase
  id: WeaponBracing
  name: weapon bracing
  description: Bracing materials used to repair many weapons.
  suffix: full
  components:
  - type: Tag
    tags:
    - Bracing
  - type: Sprite
    sprite: _Trauma/Objects/Tools/weaponreinforcement.rsi
    state: icon
  - type: Item
    sprite: _Trauma/Objects/Tools/weaponreinforcement.rsi
    storedOffset: 0,-1
    storedRotation: 45
    size: Small
    shape:
    - 0,0,2,0
  - type: Stack
    stackType: Bracing
    count: 5
  - type: Construction
    graph: Bracing
    node: finish
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      Bracing: 100

- type: entity
  parent: WeaponBracing
  id: WeaponBracing1
  suffix: Single
  components:
  - type: Stack
    count: 1

- type: entity
  parent: MaterialBase
  id: DrillHead
  name: drill head
  description: A replacement drill head for hand drills.
  suffix: full
  components:
  - type: Tag
    tags:
    - DrillHead
  - type: Sprite
    sprite: _Trauma/Objects/Tools/drillhead.rsi
    state: icon
  - type: Item
    sprite: _Trauma/Objects/Tools/drillhead.rsi
    storedOffset: 0,-1
    storedRotation: 45
    size: Small
    shape:
    - 0,0,1,0
  - type: Stack
    stackType: DrillHead
    count: 1
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      DrillHead: 100
