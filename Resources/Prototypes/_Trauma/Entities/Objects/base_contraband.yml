# Valid rev items that you can get flogged for
- type: entity
  abstract: true
  id: BaseRevMinorContraband
  components:
  - type: Contraband
    severity: RevMinor

# Rev weaponry turrets etc
- type: entity
  abstract: true
  id: BaseRevMajorContraband
  components:
  - type: Contraband
    severity: RevMajor

- type: entity
  id: BaseChefContraband
  parent: BaseRestrictedContraband
  abstract: true
  components:
  - type: Contraband
    allowedJobs: [ Chef, ServiceWorker, Bartender ]

- type: entity
  id: BaseSecurityScienceContraband
  parent: BaseRestrictedContraband
  abstract: true
  components:
  - type: Contraband
    allowedDepartments: [ Security, Science ]

- type: entity
  abstract: true
  id: BaseChaplainContraband
  parent: BaseRestrictedContraband
  components:
  - type: Contraband
    allowedJobs: [ Chaplain ]
