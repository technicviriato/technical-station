- type: entity
  parent: BaseAction
  id: ActionRiseFish
  name: Summon Carp Horde
  description: Summons 3 carps on the spot to protect you from danger!
  components:
  - type: Action
    icon:
      sprite: _Goobstation/Actions/dragon.rsi
      state: carp_horde
    useDelay: 90
    priority: 4
  - type: InstantAction
    event: !type:DragonSpawnCarpHordeActionEvent

- type: entity
  parent: BaseAction
  id: ActionDragonRoar
  name: Wing flap
  description: Flap your wings to stun all enemies around you!
  components:
  - type: Action
    icon:
      sprite: _Goobstation/Actions/dragon.rsi
      state: wing_flap
    useDelay: 45
    priority: 5
  - type: InstantAction
    event: !type:DragonRoarActionEvent
