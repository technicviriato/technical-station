- type: polymorph
  id: MimicToolbox
  configuration:
    entity: MobMimicToolBox
    forced: true
    inventory: None
    transferName: false
    transferDamage: false
    revertOnCrit: false
    revertOnDeath: false
    polymorphSound: !type:SoundPathSpecifier
      path: /Audio/Effects/demon_attack1.ogg
    duration: 25

