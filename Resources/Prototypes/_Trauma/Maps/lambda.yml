- type: gameMap
  id: Lambda
  mapName: 'Lambda'
  mapPath: /Maps/_Trauma/lambda.yml
  minPlayers: 35
  maxPlayers: 70
  fallback: true
  stations:
    Lambda:
      stationProto: StandardNanotrasenStation
      components:
      - type: StationNameSetup
        mapNameTemplate: '{0} Lambda Station {1}'
        nameGenerator:
          !type:NanotrasenNameGenerator
          prefixCreator: 'TG'
      - type: StationEmergencyShuttle
        emergencyShuttlePath: /Maps/Shuttles/emergency_raven.yml
      - type: StationCargoShuttle
        path: /Maps/_Trauma/Shuttles/cargo_fland.yml
      - type: StationJobs
        availableJobs:
          # Command
          Captain: [ 1, 1 ]
          NanotrasenRepresentative: [ 1, 1 ]
          # Silicon
          StationAi: [ 1, 1 ]
          Borg: [ 3, 4 ]
          # Service
          HeadOfPersonnel: [ 1, 1 ]
          Bartender: [ 2, 2 ]
          Botanist: [ 2 , 3 ]
          Chef: [ 1, 2 ]
          ServiceWorker: [ 2, 3 ]
          # Engineering
          ChiefEngineer: [ 1, 1 ]
          AtmosphericTechnician: [ 2, 4 ]
          StationEngineer: [ 4, 6 ]
          TechnicalAssistant: [ 2, 4 ]
          # Medical
          ChiefMedicalOfficer: [ 1, 1 ]
          Chemist: [ 1, 2 ]
          MedicalDoctor: [ 4, 5 ]
          MedicalIntern: [ 3, 4 ]
          Paramedic: [ 1, 2 ]
          Virologist: [ 1, 1 ]
          # Science
          ResearchDirector: [ 1, 1 ]
          Scientist: [ 4, 6 ]
          ResearchAssistant: [ 3, 4 ]
          # Security
          HeadOfSecurity: [ 1, 1 ]
          Warden: [ 1, 1 ]
          SecurityOfficer: [ 5, 6 ]
          SecurityCadet: [ 3, 4 ]
          Detective: [ 1, 1 ]
          # Cargo
          Quartermaster: [ 1, 1 ]
          SalvageSpecialist: [ 4, 4 ]
          CargoTechnician: [ 4, 6 ]
          # Civilian
          Passenger: [ -1, -1 ]
          Clown: [ 2, 2 ]
          Mime: [ 1, 1 ]
          Musician: [ 1, 1 ]
          Janitor: [ 2, 3 ]
          Chaplain: [ 1, 1 ]
          Librarian: [ 1, 1 ]
          Lawyer: [ 2, 2 ]
      - type: StationBlobConfig
        stageBegin: 40
        stageCritical: 450
        stageTheEnd: 900
