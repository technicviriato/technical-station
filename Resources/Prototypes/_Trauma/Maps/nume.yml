          HeadOfPersonnel: [ 1, 1 ]
          Bartender: [ 2, 2 ]
          Botanist: [ 3, 3 ]
          ServiceWorker: [ 2, 2 ]
          # Engineering
          ChiefEngineer: [ 1, 1 ]
          AtmosphericTechnician: [ 3, 3 ]
          StationEngineer: [ 5, 5 ]
          TechnicalAssistant: [ 5, 5 ]
          # Medical
          ChiefMedicalOfficer: [ 1, 1 ]
          Chemist: [ 3, 3 ]
          MedicalDoctor: [ 4, 4 ]
          Paramedic: [ 1, 1 ]
          MedicalIntern: [ 3, 3 ]
          Virologist: [ 1, 1 ]
          Psychologist: [ 1, 1 ]
          # Science
          ResearchDirector: [ 1, 1 ]
          Scientist: [ 6, 6 ]
          ResearchAssistant: [ 4, 4 ]
          Geneticist: [ 3, 3 ]
          Roboticist: [ 2, 2 ]
          # Security
          HeadOfSecurity: [ 1, 1 ]
