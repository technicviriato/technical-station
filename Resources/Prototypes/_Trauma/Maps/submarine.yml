- type: gameMap
  id: Submarine
  mapName: 'Submarine'
  mapPath: /Maps/_Trauma/submarine.yml
  minPlayers: 60
  stations:
    Submarine:
      stationProto: StandardNanotrasenStation
      components:
      - type: StationNameSetup
        mapNameTemplate: '{0} Submarine {1}'
        nameGenerator: !type:NanotrasenNameGenerator
          prefixCreator: 'DV'
      - type: StationEmergencyShuttle
        emergencyShuttlePath: /Maps/_Goobstation/Shuttles/NTES_Propeller.yml
      - type: StationJobs
        availableJobs:
          # Command
          Captain: [ 1, 1 ]
          NanotrasenRepresentative: [ 1, 1 ]
          # Silicon
          StationAi: [ 1, 1 ]
          Borg: [ 3, 3 ]
          # Service
          HeadOfPersonnel: [ 1, 1 ]
          Bartender: [ 2, 3 ]
          Botanist: [ 2, 5 ]
          Chef: [ 3, 4 ]
          ServiceWorker: [ 1, 2 ]
          # Engineering
          ChiefEngineer: [ 1, 1 ]
          AtmosphericTechnician: [ 2, 4 ]
          StationEngineer: [ 4, 6 ]
          TechnicalAssistant: [ 1, 2 ]
          # Medical
          ChiefMedicalOfficer: [ 1, 1 ]
          Chemist: [ 2, 4 ]
          MedicalDoctor: [ 4, 5 ]
          MedicalIntern: [ 1, 2 ]
          Paramedic: [ 2, 3 ]
          Psychologist: [ 1, 2 ]
          Virologist: [ 1, 1 ]
          # Security
          HeadOfSecurity: [ 1, 1 ]
          Detective: [ 1, 1 ]
          SecurityOfficer: [ 4, 8 ]
          SecurityCadet: [ 1, 4 ]
          Warden: [ 1, 1 ]
          # Science
          Chaplain: [ 1, 1 ]
          ResearchAssistant: [ 1, 2 ]
          ResearchDirector: [ 1, 1 ]
          Scientist: [ 4, 6 ]
          # Cargo
          CargoTechnician: [ 3, 5 ]
          SalvageSpecialist: [ 7, 7 ]
          Quartermaster: [ 1, 1 ]
          # Civilian
          Passenger: [ -1, -1 ]
          Librarian: [ 1, 1 ]
          Clown: [ 1, 1 ]
          Janitor: [ 2, 4 ]
          Lawyer: [ 2, 3 ]
          Mime: [ 1, 1 ]
          Musician: [ 2, 2 ]
          Reporter: [ 1, 2 ]
      - type: StationBlobConfig
        stageBegin: 40
        stageCritical: 450
        stageTheEnd: 900
