- type: gameMap
  id: Amber
  mapName: 'Amber'
  mapPath: /Maps/_Trauma/amber.yml
  minPlayers: 7
  maxPlayers: 50
  stations:
    Amber:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Amber Station {1}'
          nameGenerator: !type:NanotrasenNameGenerator
            prefixCreator: '14-SB'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/Shuttles/emergency_amber.yml
        - type: StationJobs
          availableJobs:
            # Command
            Captain: [ 1, 1 ]
            NanotrasenRepresentative: [ 1, 1 ]
            # Silicon
            StationAi: [ 1, 1 ]
            Borg: [ 2, 2 ]
            # Service
            HeadOfPersonnel: [ 1, 1 ]
            Bartender: [ 1, 1 ]
            Botanist: [ 2, 2 ]
            Chef: [ 1, 1 ]
            ServiceWorker: [ 1, 3 ]
            # Engineering
            ChiefEngineer: [ 1, 1 ]
            AtmosphericTechnician: [ 2, 2 ]
            StationEngineer: [ 2, 4 ]
            TechnicalAssistant: [ 1, 1 ]
            # Medical
            ChiefMedicalOfficer: [ 1, 1 ]
            Chemist: [ 2, 2 ]
            MedicalDoctor: [ 2, 4 ]
            Paramedic: [ 2, 2 ]
            MedicalIntern: [ 1, 2 ]
            Psychologist: [ 1, 1 ]
            # Science
            ResearchDirector: [ 1, 1 ]
            Scientist: [ 4, 4 ]
            ResearchAssistant: [ 1, 2 ]
            Geneticist: [ 2, 2 ]
            # Security
            HeadOfSecurity: [ 1, 1 ]
            Warden: [ 1, 1 ]
            SecurityOfficer: [ 4, 4 ]
            Detective: [ 1, 1 ]
            SecurityCadet: [ 1, 1 ]
            # Cargo
            Quartermaster: [ 1, 1 ]
            SalvageSpecialist: [ 2, 3 ]
            CargoTechnician: [ 2, 3 ]
            # Civilian
            Passenger: [ -1, -1 ]
            Clown: [ 1, 1 ]
            Mime: [ 1, 1 ]
            Musician: [ 1, 1 ]
            Janitor: [ 2, 2 ]
            Chaplain: [ 1, 1 ]
            Librarian: [ 1, 1 ]
            Reporter: [ 1, 1 ]
            RadioHost: [ 1, 1 ]
            Lawyer: [ 1, 1 ]
        - type: StationBlobConfig
          stageBegin: 40
          stageCritical: 300
          stageTheEnd: 750
