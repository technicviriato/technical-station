- type: gameMap
  id: Core
  mapName: 'Core'
  mapPath: /Maps/_Trauma/core.yml
  minPlayers: 35
  maxPlayers: 70
  stations:
    Core:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Core {1}'
          nameGenerator: !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/Shuttles/emergency_rod.yml
        - type: StationCargoShuttle
          path: /Maps/_Trauma/Shuttles/cargo_core.yml
        - type: StationJobs
          availableJobs:
            # Command
            Captain: [ 1, 1 ]
            NanotrasenRepresentative: [ 1, 1 ]
            # Silicon
            StationAi: [ 1, 1 ]
            Borg: [ 2, 2 ]
            # Service
            HeadOfPersonnel: [ 1, 1 ]
            Bartender: [ 2, 2 ]
            Botanist: [ 2, 2]
            Chef: [ 1, 1 ]
            ServiceWorker: [ 3, 3 ]
            # Engineering
            ChiefEngineer: [ 1, 1 ]
            StationEngineer: [ 4, 4 ]
            AtmosphericTechnician: [ 2, 2 ]
            TechnicalAssistant: [ 2, 2 ]
            # Medical
            ChiefMedicalOfficer: [ 1, 1 ]
            MedicalDoctor: [ 3, 4 ]
            Chemist: [ 2, 2 ]
            MedicalIntern: [ 2, 2 ]
            Paramedic: [ 1, 2 ]
            # Science
            ResearchDirector: [ 1, 1 ]
            Scientist: [ 3, 3 ]
            ResearchAssistant: [ 1, 1 ]
            # Security
            HeadOfSecurity: [ 1, 1 ]
            SecurityOfficer: [ 4, 4 ]
            Warden: [ 1, 1 ]
            SecurityCadet: [ 1, 1 ]
            Detective: [ 1, 1 ]
            # Cargo
            CargoTechnician: [ 3, 3 ]
            Quartermaster: [ 1, 1 ]
            SalvageSpecialist: [ 2, 2 ]
            # Civilian
            Passenger: [ -1, -1 ]
            Clown: [ 1, 1 ]
            Mime: [ 1, 1 ]
            Musician: [ 1, 1 ]
            Reporter: [ 2, 2 ]
            Janitor: [ 2, 2 ]
            Chaplain: [ 1, 1 ]
            Librarian: [ 1, 1 ]
            Lawyer: [ 1, 1 ]
