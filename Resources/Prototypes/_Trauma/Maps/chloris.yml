            StationAi: [ 1, 1 ]
            Borg: [ 2, 3 ]
            # Service
            HeadOfPersonnel: [ 1, 1 ]
            Bartender: [ 1, 1 ]
            Botanist: [ 3, 4 ]
            Chef: [ 2, 3 ]
            ServiceWorker: [ 3, 4 ]
            # Cargo
            Quartermaster: [ 1, 1 ]
            SalvageSpecialist: [ 4, 4 ]
            CargoTechnician: [ 5, 6 ]
            # Engineering
            ChiefEngineer: [ 1, 1 ]
            AtmosphericTechnician: [ 2, 3 ]
            StationEngineer: [ 6, 8 ]
            TechnicalAssistant: [ 3, 4 ]
            # Medical
            ChiefMedicalOfficer: [ 1, 1 ]
            MedicalDoctor: [ 6, 8 ]
            MedicalIntern: [ 3, 4 ]
            Psychologist: [ 1, 1 ]
            Paramedic: [ 1, 2 ]
            Chemist: [ 2, 2 ]
            Virologist: [ 1, 1 ]
            # Science
            ResearchDirector: [ 1, 1 ]
            Scientist: [ 6, 8 ]
            ResearchAssistant: [ 3, 4 ]
            # Security
            HeadOfSecurity: [ 1, 1 ]
            Warden: [ 1, 1 ]
            SecurityOfficer: [ 7, 9 ]
            SecurityCadet: [ 3, 4 ]
            Detective: [ 1, 1 ]
            # Civilian
            Passenger: [ -1, -1 ]
            Chaplain: [ 1, 1 ]
            Clown: [ 1, 1 ]
            Janitor: [ 2, 3 ]
            Librarian: [ 1, 1 ]
            Mime: [ 1, 1 ]
            Musician: [ 1, 2 ]
            Reporter: [ 1, 2 ]
            RadioHost: [ 1, 1 ]
            Lawyer: [ 1, 1 ]
        - type: StationBlobConfig
          stageBegin: 40
          stageCritical: 450
          stageTheEnd: 900
