- type: gameMap
  id: Leonid
  mapName: 'Leonid Station'
  mapPath: /Maps/_Trauma/leonid.yml
  minPlayers: 50
  stations:
    Leonid:
      stationProto: StandardNanotrasenStation
      components:
      - type: StationNameSetup
        mapNameTemplate: '{0} Leonid Station {1}'
        nameGenerator: !type:NanotrasenNameGenerator
          prefixCreator: 'B'
      - type: StationEmergencyShuttle
        emergencyShuttlePath: /Maps/Shuttles/emergency_delta.yml
      - type: StationCargoShuttle
        path: /Maps/_Trauma/Shuttles/cargo_fland.yml
      - type: StationJobs
        availableJobs:
          # Command
          Captain: [ 1, 1 ]
          NanotrasenRepresentative: [ 1, 1 ]
          # Silicon
          StationAi: [ 1, 1 ]
          Borg: [ 4, 4 ]
          # Service
          HeadOfPersonnel: [ 1, 1 ]
          Bartender: [ 2, 2 ]
          Botanist: [ 3, 3 ]
          Chef: [ 3, 3 ]
          ServiceWorker: [ 2, 2 ]
          # Engineering
          ChiefEngineer: [ 1, 1 ]
          AtmosphericTechnician: [ 4, 4 ]
          StationEngineer: [ 6, 6 ]
          TechnicalAssistant: [ 6, 6 ]
          # Medical
          ChiefMedicalOfficer: [ 1, 1 ]
          Chemist: [ 3, 3 ]
          MedicalDoctor: [ 6, 6 ]
          Paramedic: [ 2, 2 ]
          MedicalIntern: [ 6, 6 ]
          Virologist: [ 2, 2 ]
          # Science
          ResearchDirector: [ 1, 1 ]
          Scientist: [ 6, 6 ]
          ResearchAssistant: [ 6, 6 ]
          Geneticist: [ 2, 2 ]
          # Security
          HeadOfSecurity: [ 1, 1 ]
          Warden: [ 1, 1 ]
          SecurityOfficer: [ 6, 6 ]
          Detective: [ 1, 1 ]
          SecurityCadet: [ 6, 6 ]
          # Cargo
          Quartermaster: [ 1, 1 ]
          SalvageSpecialist: [ 3, 3 ]
          CargoTechnician: [ 5, 5 ]
          # Civilian
          Passenger: [ -1, -1 ]
          Clown: [ 2, 2 ]
          Mime: [ 2, 2 ]
          Musician: [ 3, 3 ]
          Janitor: [ 3, 3 ]
          Chaplain: [ 1, 1 ]
          Librarian: [ 1, 1 ]
          Reporter: [ 1, 1 ]
          RadioHost: [ 1, 1 ]
          Lawyer: [ 3, 3 ]
      - type: StationBlobConfig
        stageBegin: 40
        stageCritical: 450
        stageTheEnd: 900
