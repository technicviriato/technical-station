- type: gameMap
  id: Origin
  mapName: 'Origin'
  mapPath: /Maps/_Trauma/origin.yml
  minPlayers: 50
  stations:
    Origin:
      stationProto: StandardNanotrasenStation
      components:
      - type: StationNameSetup
        mapNameTemplate: '{0} Origin {1}'
        nameGenerator: !type:NanotrasenNameGenerator
          prefixCreator: '14'
      - type: StationEmergencyShuttle
        emergencyShuttlePath: /Maps/Shuttles/emergency_courser.yml
      - type: StationJobs
        availableJobs:
          # Command
          Captain: [ 1, 1 ]
          NanotrasenRepresentative: [ 1, 1 ]
          # Silicon
          StationAi: [ 1, 1 ]
          Borg: [ 2, 2 ]
          # Service
          HeadOfPersonnel: [ 1, 1 ]
          Bartender: [ 2, 2 ]
          Botanist: [ 3, 3 ]
          Chef: [ 3, 3 ]
          ServiceWorker: [ 3, 4 ]
          # Engineering
          ChiefEngineer: [ 1, 1 ]
          AtmosphericTechnician: [ 3, 3 ]
          StationEngineer: [ 6, 6 ]
          TechnicalAssistant: [ 2, 3 ]
          # Medical
          ChiefMedicalOfficer: [ 1, 1 ]
          Chemist: [ 2, 2 ]
          Paramedic: [ 1, 1 ]
          MedicalDoctor: [ 6, 6 ]
          Psychologist: [ 1, 1 ]
          MedicalIntern: [ 1, 2 ]
          Virologist: [ 1, 1 ]
          # Science
          ResearchDirector: [ 1, 1 ]
          Scientist: [ 6, 6 ]
          ResearchAssistant: [ 4, 4 ]
          Geneticist: [ 2, 2 ]
          # Security
          HeadOfSecurity: [ 1, 1 ]
          Warden: [ 1, 1 ]
          Detective: [ 1, 1 ]
          SecurityOfficer: [ 7, 7 ]
          SecurityCadet: [ 2, 4 ]
          # Cargo
          Quartermaster: [ 1, 1 ]
          SalvageSpecialist: [ 8, 8 ]
          CargoTechnician: [ 5, 5 ]
          # Civilian
          Passenger: [ -1, -1 ]
          Clown: [ 1, 1 ]
          Mime: [ 1, 1 ]
          Musician: [ 2, 2 ]
          Reporter: [ 1, 1 ]
          RadioHost: [ 1, 1 ]
          Janitor: [ 3, 3 ]
          Chaplain: [ 1, 1 ]
          Librarian: [ 2, 2 ]
          Lawyer: [ 2, 2 ]
      - type: StationBlobConfig
        stageBegin: 40
        stageCritical: 450
        stageTheEnd: 900
