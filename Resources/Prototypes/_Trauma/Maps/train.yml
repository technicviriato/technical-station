- type: gameMap
  id: Train
  mapName: 'Train'
  mapPath: /Maps/_Trauma/train.yml
  maxRandomOffset: 0
  randomRotation: false
  minPlayers: 30
  maxPlayers: 60
  stations:
    Train:
      stationProto: StandardNanotrasenStation
      components:
      - type: StationNameSetup
        mapNameTemplate: 'Train "Sentipode" {0}-{1}'
        nameGenerator: !type:NanotrasenNameGenerator
          prefixCreator: 'ED'
      - type: StationEmergencyShuttle
        emergencyShuttlePath: /Maps/Shuttles/emergency_omega.yml # TODO - add railway station
      - type: StationJobs
        availableJobs:
          # Command
          Captain: [ 1, 1 ]
          NanotrasenRepresentative: [ 1, 1 ]
          # Silicon
          StationAi: [ 1, 1 ]
          Borg: [ 2, 2 ]
          # Service
          HeadOfPersonnel: [ 1, 1 ]
          Bartender: [ 1, 1 ]
          Botanist: [ 2, 2 ]
          Chef: [ 1, 1 ]
          ServiceWorker: [ 2, 3 ]
          # Engineering
          ChiefEngineer: [ 1, 1 ]
          AtmosphericTechnician: [ 2, 2 ]
          StationEngineer: [ 4, 4 ]
          TechnicalAssistant: [ 3, 3 ]
          # Medical
          ChiefMedicalOfficer: [ 1, 1 ]
          Chemist: [ 2, 2 ]
          MedicalDoctor: [ 2, 2 ]
          MedicalIntern: [ 2, 2 ]
          Paramedic: [ 1, 1 ]
          # Science
          ResearchDirector: [ 1, 1 ]
          Scientist: [ 4, 4 ]
          ResearchAssistant: [ 2, 2 ]
          # Security
          HeadOfSecurity: [ 1, 1 ]
          Warden: [ 1, 1 ]
          SecurityOfficer: [ 6, 6 ]
          SecurityCadet: [ 3, 3 ]
          Detective: [ 1, 1 ]
          # Cargo
          Quartermaster: [ 1, 1 ]
          SalvageSpecialist: [ 3, 3 ]
          CargoTechnician: [ 3, 3 ]
          # Civilian
          Passenger: [ -1, -1 ]
          Clown: [ 1, 1 ]
          Mime: [ 1, 1 ]
          Musician: [ 1, 1 ]
          Reporter: [ 1, 1 ]
          Janitor: [ 2, 2 ]
          Chaplain: [ 1, 1 ]
          Librarian: [ 1, 1 ]
          Lawyer: [ 1, 2 ]
      - type: StationBlobConfig
        stageBegin: 25
        stageCritical: 350
        stageTheEnd: 700
