- type: gameMap
  id: Delta
  mapName: 'Delta Station'
  mapPath: /Maps/_Trauma/delta.yml
  minPlayers: 55
  stations:
    Delta:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} Delta {1}'
          nameGenerator: !type:NanotrasenNameGenerator
            prefixCreator: 'TG'
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/Shuttles/emergency_delta.yml
        - type: StationJobs
          availableJobs:
            # Command
            Captain: [ 1, 1 ]
            NanotrasenRepresentative: [ 1, 1 ]
            # Silicon
            StationAi: [ 1, 1 ]
            Borg: [ 2, 3 ]
            # Service
            HeadOfPersonnel: [ 1, 1 ]
            Bartender: [ 1, 1 ]
            Botanist: [ 3, 4 ]
            Chef: [ 2, 3 ]
            ServiceWorker: [ 3, 3 ]
            # Cargo
            Quartermaster: [ 1, 1 ]
            SalvageSpecialist: [ 4, 4 ]
            CargoTechnician: [ 5, 6 ]
            # Engineering
            ChiefEngineer: [ 1, 1 ]
            AtmosphericTechnician: [ 2, 3 ]
            StationEngineer: [ 6, 7 ]
            TechnicalAssistant: [ 3, 3 ]
            # Medical
            ChiefMedicalOfficer: [ 1, 1 ]
            MedicalDoctor: [ 4, 5 ]
            MedicalIntern: [ 3, 3 ]
            Psychologist: [ 1, 1 ]
            Paramedic: [ 1, 1 ]
            Chemist: [ 2, 2 ]
            Virologist: [ 1, 1 ]
            # Science
            ResearchDirector: [ 1, 1 ]
            Scientist: [ 6, 7 ]
            ResearchAssistant: [ 3, 3 ]
            Geneticist: [ 3, 3 ]
            # Security
            HeadOfSecurity: [ 1, 1 ]
            Warden: [ 1, 1 ]
            SecurityOfficer: [ 6, 7 ]
            SecurityCadet: [ 3, 3 ]
            Detective: [ 1, 1 ]
            # Civilian
            Passenger: [ -1, -1 ]
            Chaplain: [ 1, 1 ]
            Clown: [ 1, 1 ]
            Janitor: [ 1, 2 ]
            Lawyer: [ 1, 2 ]
            Librarian: [ 1, 1 ]
            Mime: [ 1, 1 ]
            Musician: [ 2, 2 ]
            Reporter: [ 2, 2 ]
            RadioHost: [ 1, 1 ]
        - type: StationBlobConfig
          stageBegin: 40
          stageCritical: 450
          stageTheEnd: 900
