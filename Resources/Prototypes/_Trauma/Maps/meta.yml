- type: gameMap
  id: Meta
  mapName: 'Meta Station'
  mapPath: /Maps/_Trauma/meta.yml
  minPlayers: 30
  maxPlayers: 85
  stations:
    Meta:
      stationProto: StandardNanotrasenStation
      components:
      - type: StationNameSetup
        mapNameTemplate: '{0} Meta Station {1}'
        nameGenerator: !type:NanotrasenNameGenerator
          prefixCreator: 'TG'
      - type: StationEmergencyShuttle
        emergencyShuttlePath: /Maps/_Trauma/Shuttles/emergency_meta.yml
      - type: StationJobs
        availableJobs:
          # Command
          Captain: [ 1, 1 ]
          NanotrasenRepresentative: [ 1, 1 ]
          # Silicon
          StationAi: [ 1, 1 ]
          Borg: [ 2, 2 ]
          # Service
          HeadOfPersonnel: [ 1, 1 ]
          Bartender: [ 2, 2 ]
          Botanist: [ 2, 3 ]
          Chef: [ 2, 2 ]
          ServiceWorker: [ 2, 2 ]
          # Engineering
          ChiefEngineer: [ 1, 1 ]
          AtmosphericTechnician: [ 3, 3 ]
          StationEngineer: [ 5, 7 ]
          TechnicalAssistant: [ 3, 6 ]
          # Medical
          ChiefMedicalOfficer: [ 1, 1 ]
          Chemist: [ 2, 2 ]
          MedicalDoctor: [ 5, 5 ]
          MedicalIntern: [ 3, 6 ]
          Virologist: [ 1, 1 ]
          Paramedic: [ 1, 1 ]
          # Science
          ResearchDirector: [ 1, 1 ]
          Scientist: [ 5, 7 ]
          ResearchAssistant: [ 3, 6 ]
          Geneticist: [ 2, 2 ]
          # Security
          HeadOfSecurity: [ 1, 1 ]
          Warden: [ 1, 1 ]
          SecurityOfficer: [ 5, 7 ]
          Detective: [ 1, 1 ]
          SecurityCadet: [ 3, 6 ]
          # Cargo
          Quartermaster: [ 1, 1 ]
          SalvageSpecialist: [ 3, 3 ]
          CargoTechnician: [ 3, 3 ]
          # Civilian
          Passenger: [ -1, -1 ]
          Clown: [ 1, 1 ]
          Mime: [ 1, 1 ]
          Musician: [ 1, 1 ]
          Janitor: [ 1, 2 ]
          Chaplain: [ 1, 1 ]
          Librarian: [ 1, 1 ]
          RadioHost: [ 1, 1 ]
          Lawyer: [ 2, 2 ]
      - type: StationBlobConfig
        stageBegin: 40
        stageCritical: 450
        stageTheEnd: 900
