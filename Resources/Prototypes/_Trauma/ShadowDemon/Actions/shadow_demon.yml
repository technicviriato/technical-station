- type: entity
  parent: DemonicWhisperAction
  id: ShadowDemonicWhisperAction
  name: Demonic Whisper
  description: Drive mortals insane with demonic telepathy! Remind them you are the reason night lights exist!
  components:
  - type: Action
    icon:
      sprite: _Trauma/Mobs/ShadowDemon/actions.rsi
      state: shadow_whisper

- type: entity
  id: ShadowGrappleAction
  name: Shadow Grapple
  description: Fire one of your hands.
  components:
  - type: Action
    icon:
      sprite: _Trauma/Mobs/ShadowDemon/actions.rsi
      state: shadow_grapple
    itemIconStyle: NoItem
    useDelay: 10
  - type: EntityTargetAction
    event: !type:ShootGrappleEvent
      projectileProto: ShadowGrappleProjectile
      jointSprite:
        sprite: _Trauma/Mobs/ShadowDemon/shadow_hand.rsi
        state: shadow_hand_mid
  - type: TargetAction
    range: 60
    checkCanAccess: false

- type: entity
  id: ShadowCrawlAction
  name: Shadow Crawl
  description: Use darkness to phase out of existence.
  components:
  - type: Action
    icon:
      sprite: _Trauma/Mobs/ShadowDemon/actions.rsi
      state: shadow_crawl
    useDelay: 2 # applied only when entering jaunt
  - type: InstantAction
    event: !type:ShadowCrawlEvent
