    nameSegments:
    - NamesSlaughterTitle
    - NamesSlaughter
    nameFormat: name-format-slaughter
  - type: LightImmunity # Grants temporary light immunity so it survives AntagRandomSpawn | Remove once we get better spawns
    duration: 20
