- type: antag
  id: ShadowDemon
  name: roles-antag-shadow-demon-name
  antagonist: true
  objective: roles-antag-shadow-demon-objective

- type: antagSpecifier
  id: ShadowDemon
  spawnerPrototype: SpawnPointGhostShadowDemon
  mindRoles: [ MindRoleShadowDemon ]
  briefing:
    text: shadow-demon-role-greeting
    color: Red
    sound: /Audio/_Trauma/Mobs/ShadowDemon/briefing/shadowdemonbriefing.ogg
  components:
