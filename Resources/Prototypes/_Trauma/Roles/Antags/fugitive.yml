    text: hunter-role-greeting
    color: red
  components:
  - type: NpcFactionMember
    factions:
    - Syndicate
  - type: AutoImplant
    implants:
    - FakeMindShieldImplant
    - DeathAcidifierImplant
  - type: RandomMetadata
  mindRoles:
  - MindRoleGhostRoleHunter

