- type: reagent
  id: Johntonite
  name: reagent-name-johntonite
  group: Toxins
  desc: reagent-desc-johntonite
  physicalDesc: reagent-physical-desc-powdery
  flavor: bitter
  color: "#1abcff"
  metabolisms:
    Bloodstream:
      conditions:
      - !type:NameContainsCondition
        name: John
      effects:
      - !type:HealthChange
        damage:
          types:
            Asphyxiation: 1.5
            Heat: 5
            Cellular: 1
      - !type:PopupMessage
        type: Local
        visualType: MediumCaution
        probability: 0.03
        messages:
        - generic-reagent-effect-burning-insides
        - generic-reagent-effect-tearing-up
      - !type:ModifyParalysis
        probability: 0.2
        time: 2
      - !type:Emote
        emote: Gasp
        probability: 0.1
      - !type:Emote
        emote: Scream
        probability: 0.1
      - !type:Jitter

- type: reagent
  id: NitricAcid
  name: reagent-name-nitric-acid
  group: Toxins
  desc: reagent-desc-nitric-acid
  physicalDesc: reagent-physical-desc-abrasive
  flavor: acid
  color: "#FAFAFA"
  boilingPoint: 356
  meltingPoint: 231
  plantMetabolism:
  - !type:PlantAdjustToxins
    amount: 10
  - !type:PlantAdjustWeeds
    amount: -2
  - !type:PlantAdjustHealth
    amount: -5
  reactiveEffects:
    Acidic:
      methods: [ Touch ]
      effects:
      - !type:HealthChange
        ignoreResistances: false
        damage:
          types:
            Caustic: 0.1
      - !type:Emote
        emote: Scream
        probability: 0.1
  metabolisms:
    Bloodstream:
      metabolismRate: 3 # Okay damage, high metabolism rate. You need a lot of units to crit. Simulates acid burning through you fast.
      effects:
      - !type:HealthChange
        damage:
          types:
            Caustic: 12 # 4/u, comparable to other acids. it's fucking nitric acid
      - !type:PopupMessage
        type: Local
        visualType: Large
        messages: [ "generic-reagent-effect-burning-insides" ]
        probability: 0.33
      - !type:Emote
        emote: Scream
        probability: 0.2

- type: reagent
  id: Capsaicin
  name: reagent-name-capsaicin
  group: Toxins
  desc: reagent-desc-capsaicin
  physicalDesc: reagent-physical-desc-spicy
  flavor: spicy
  color: "#CC1111"
  metabolisms:
    Bloodstream:
      metabolismRate: 0.4
      effects:
      - !type:GenericStatusEffect
        key: Stutter
        component: StutteringAccent
      - !type:Emote
        emote: Cough
        probability: 0.1
      - !type:ModifyStatusEffect
        effectProto: StatusEffectStunned
        time: 1
        probability: 0.05
      - !type:PopupMessage
        type: Local
        probability: 0.08
        messages:
        - generic-reagent-effect-burning-eyes
        - generic-reagent-effect-burning-eyes-a-bit
        - generic-reagent-effect-tearing-up
        - norepinephricacid-effect-eyelids
        - norepinephricacid-effect-eyes-itch
        - norepinephricacid-effect-vision-fade
        - norepinephricacid-effect-vision-fail
      - !type:ModifyStatusEffect
        effectProto: StatusEffectBlindness
        time: 2
        probability: 0.5
      - !type:MovementSpeedModifier
        walkSpeedModifier: 0.7
        sprintSpeedModifier: 0.7
        time: 3
      - !type:Emote
        emote: Cough
        conditions:
        - !type:ReagentCondition
          reagent: Capsaicin
          min: 20
        probability: 0.20
      - !type:ModifyStatusEffect
        effectProto: StatusEffectStunned
        time: 1
        conditions:
        - !type:ReagentCondition
          reagent: Capsaicin
          min: 20
        probability: 0.20
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Capsaicin
          min: 20
        probability: 0.20
        damage:
          types:
            Asphyxiation: 0.5
      - !type:ModifyKnockdown
        time: 5
        conditions:
        - !type:ReagentCondition
          reagent: Capsaicin
          min: 80
