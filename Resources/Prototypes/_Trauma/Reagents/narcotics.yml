          reagent: CrackCocaine
          min: 4
        damage:
          types:
            Poison: 0.75
            Asphyxiation: 1.25
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Cocaine
          max: 0.01
        damage:
          types:
            Poison: 0.75
            Asphyxiation: 1.25
      # Main effects
      - !type:MovementSpeedModifier
        walkSpeedModifier: 1.25
        sprintSpeedModifier: 1.25
      - !type:ModifyStatusEffect
        effectProto: StatusEffectCocaineStamina
        time: 1.2
      - !type:GenericStatusEffect
        key: Adrenaline
        component: IgnoreSlowOnDamage
        time: 1.2
      # Side effects
      - !type:Jitter
      - !type:GenericStatusEffect
        key: Stutter
        component: StutteringAccent
      - !type:Jitter
