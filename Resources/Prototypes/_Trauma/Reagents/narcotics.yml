- type: reagent
  id: Cocaine
  name: reagent-name-cocaine
  group: Narcotics
  desc: reagent-desc-cocaine
  physicalDesc: reagent-physical-desc-powdery
  contrabandSeverity: Major
  flavor: bitter
  color: "#FAFAFA"
  boilingPoint: 187.0
  meltingPoint: 98.0
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types:
            Poison: 0.1
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Cocaine
          min: 11
        damage:
          types:
            Poison: 1
            Asphyxiation: 1.5
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: CrackCocaine # if you mix crack and coke you still OD
          max: 0.01
        damage:
          types:
            Poison: 0.75
            Asphyxiation: 1.25
      - !type:MovementSpeedModifier
        walkSpeedModifier: 1.1
        sprintSpeedModifier: 1.1
      - !type:ModifyStatusEffect
        effectProto: StatusEffectCocaineStamina
        time: 1.5
      - !type:GenericStatusEffect
        key: Adrenaline
        component: IgnoreSlowOnDamage
        time: 1.5
      # Side effects
      - !type:ModifyStatusEffect
        effectProto: StatusEffectStunned
        time: 0.5
        type: Remove
      - !type:ModifyKnockdown
        time: 0.5
        type: Remove
      - !type:ModifyStatusEffect
        conditions:
        - !type:ReagentCondition
          reagent: Haloperidol
          max: 0.01
        effectProto: StatusEffectDrowsiness
        time: 10
        type: Remove
      - !type:GenericStatusEffect
        key: Adrenaline
        component: IgnoreSlowOnDamage
        time: 1
      - !type:RemoveComponents
        components:
        - type: DelayedKnockdown
        guidebookText: entity-effect-guidebook-remove-delayed-knockdown

      # Side effects
      - !type:ResetNarcolepsy
        conditions:
        - !type:ReagentCondition
          reagent: Cocaine
          min: 20

- type: reagent
