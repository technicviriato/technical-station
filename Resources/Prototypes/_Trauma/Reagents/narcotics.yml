        boozePower: 10
      - !type:Emote
        emote: Scream
        probability: 0.05
      - !type:ModifyParalysis
        probability: 0.1
        time: 12
      - !type:Emote
        emote: Jump
        probability: 0.05
      - !type:Emote
        emote: Flip
        probability: 0.05

