- type: entityTable
  id: BasicCalmEventsTrauma
  table: !type:AllSelector
    children:
    - id: TidemindDevelop
    - id: MothmaggotSpawn
    - id: DerelictCyborgSyndicateSpawn
    - id: MalignRiftSpawn
    - id: FloorGoblinMidRound
    - id: ClownGoblinMigration
    - id: RadiationStormRule

- type: entityTable
  id: BasicAntagEventsTrauma
  table: !type:AllSelector
    children:
    - id: CarpMigrationRule
    # TOOD: remove these if they fucking suck lmao
    - id: SingulothKnightsMidround
    - id: MimeAssassinMidround
    - id: VoxRaidersMidround
    - id: TunnelClownMidround
    - id: WraithMidround # Unchuddified version | no evolution | no absorbing corpses
    - id: ParadoxCloneSpawn
    - id: MorphRule

- type: entityTable
  id: ModerateAntagEventsTrauma
  table: !type:AllSelector
    children:
    - id: BlobMidround
    - id: DuoAbductorSpawn
    - id: BingleSpawn
    - id: XenomorphsInfestation
    #- id: SlasherSpawn # TODO: when slasher is ready
    - id: ColossusSpawn

- type: entity
  parent: BaseGameRule
  id: CarpMigrationRule
  components:
  - type: StationEvent
    duration: 1
    weight: 1
  - type: CarpMigrationRule
  - type: SpaceSpawnRule

- type: entity
  parent: BaseGameRule
  id: RadiationStormRule
  components:
  - type: StationEvent
    weight: 0.5
    startAnnouncement: station-event-radiation-storm-announcement
    minimumPlayers: 25
    reoccurrenceDelay: 20
    maxOccurrences: 3
    duration: 1
  - type: RadiationStormRule
  - type: MapEffectsRule
    effects:
    - !type:ModifyStatusEffect
      effectProto: WeatherSchedulerRadiationStorm
      time: null # it removes itself when done

- type: entity
  id: RatmaSpawn
  parent: BaseStationEventShortDelay
  components:
  - type: StationEvent
    startAnnouncement: station-event-vent-creatures-start-announcement
    startAudio:
      path: /Audio/Announcements/attention.ogg
    minimumPlayers: 30
    weight: 3
    duration: 5
    reoccurrenceDelay: 30
  - type: VentHordeRule
    table:
      id: MobRatma
      amount: 1, 1

- type: entity
  id: WailingHorseSpawn
  parent: BaseStationEventShortDelay
  components:
  - type: StationEvent
    startAnnouncement: station-event-vent-creatures-start-announcement
    startAudio:
      path: /Audio/Announcements/attention.ogg
    minimumPlayers: 30
    weight: 3
    duration: 5
    reoccurrenceDelay: 30
  - type: VentHordeRule
    table:
      id: MobWailingHorse
      amount: 1, 1

- type: entity
  id: CoconutCrabSpawn
  parent: BaseStationEventShortDelay
  components:
  - type: StationEvent
    startAnnouncement: station-event-vent-creatures-start-announcement
    startAudio:
      path: /Audio/Announcements/attention.ogg
    minimumPlayers: 15
    weight: 10
    duration: 5
    reoccurrenceDelay: 30
  - type: VentHordeRule
    table:
      id: MobCoconutCrab
      amount: 1, 4

