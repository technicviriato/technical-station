## Antag schedulers: runs a limited number of midround antags

- type: entity
  parent: BaseGameRule
  id: BasicAntagEventScheduler
  components:
  - type: RuleSchedulerLimit
    limit: 10
  - type: BasicStationEventScheduler
    scheduledGameRules: !type:NestedSelector
      tableId: BasicAntagEventsTable
    # start 10-15 mins in
    minimumTimeUntilFirstEvent: 600
    maximumSpanUntilFirstEvent: 300
    # 12-25 mins between each vent critter or whatever
    minMaxEventTiming:
      min: 720
      max: 1500

- type: entity
  parent: BaseGameRule
  id: ModerateAntagEventScheduler
  components:
  - type: BasicStationEventScheduler
    scheduledGameRules: !type:NestedSelector
      tableId: ModerateAntagEventsTable
    # starts 40-60 mins in
    minimumTimeUntilFirstEvent: 2400
    maximumSpanUntilFirstEvent: 3600
    # 30-50 mins between each antag
    minMaxEventTiming:
      min: 1800
      max: 3000

## Morph

- type: entity
  parent: [ BaseRoundstartAntagRule ]
  id: MorphRule
  components:
  - type: GhostroleAlert
  - type: StationEvent
    earliestStart: 20
    weight: 3
    minimumPlayers: 30
    duration: null
    occursDuringRoundEnd: false
  - type: MorphRule
  - type: MaintsSpawnRule
  - type: AntagSpawner
    prototype: MobMorph
  - type: AntagSelection
    antags:
    - !type:FixedAntagCount
      proto: Morph

## Shadow demon

- type: entity
  abstract: true
  parent: BaseGameRule
  id: BaseShadowDemonRule
  components:
  - type: AntagSpawner
    prototype: BaseMobShadowDemon
  - type: MaintsSpawnRule
  - type: AntagSelection
    agentName: shadow-demon-round-end-agent-name
    antags:
    - !type:FixedAntagCount
      proto: ShadowDemon

- type: entity
  parent: [ BaseShadowDemonRule, BaseAntagGhostRoleRule ]
  id: ShadowDemonSummon
  components:
  - type: GhostroleAlert

## Shadowling

- type: entity
  parent: [ BaseShadowlingRule, BaseAntagGhostRoleRule ]
  id: ShadowlingMidround
  components:
  - type: GhostroleAlert
  - type: AntagSpawner
    prototype: MobShadowling
  - type: MaintsSpawnRule
  - type: AntagSelection
    antags:
    - !type:FixedAntagCount
      proto: Shadowling

## Sleeper agents ninja threat, the ninja does the announcement

- type: entity
  parent: BaseTraitorRule
  id: SleeperAgentsQuiet # cipher's assassin...
  components:
  - type: StationEvent
    earliestStart: 30
    weight: 8
    minimumPlayers: 15
    maxOccurrences: 1 # can only happen once per round
    duration: null # the rule has to last the whole round not 1 second
    occursDuringRoundEnd: false
  - type: AntagSelection
    antags:
    - !type:LinearAntagCount
      proto: TraitorSleeper
      range:
        min: 1
        max: 2
      playerRatio: 10

## Quiet version of wailing horse

- type: entity
  parent: WailingHorseSpawn
  id: WailingHorseQuiet
  components:
  - type: StationEvent
    startAnnouncement: null
    startAudio: null
