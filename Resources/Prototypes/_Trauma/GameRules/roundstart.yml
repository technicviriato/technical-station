# i love this dogshit system nobody has improved for 2 years :)
- type: entity
  parent: BaseGameRule
  id: SubGamemodesRuleNoHeretic
  components:
  - type: SubGamemodes
    rules:
    - id: Thief
      prob: 0.5
    - id: Devil
      prob: 0.02
    - id: ShadowlingRoundstart
      prob: 0.02
    - id: WraithRoundstart
      prob: 0.02

- type: entity
  parent: BaseRoundstartAntagRule
  id: Insurgency
  components:
  - type: GameRule
    minPlayers: 5 # no insurgents on deadpop
  - type: RuleGrids
  - type: LoadMapRule
    gridPath: /Maps/_Trauma/Shuttles/insurgents.yml
  - type: AntagObjectives
    objectives:
    - InsurgentEscapeObjective
    #- InsurgentAllSurviveObjective # TODO
  - type: AntagLoadProfileRule
    speciesOverride: Human
    speciesOverrideBlacklist:
    - Plasmaman # instantly dies
  - type: InsurgencyRule
  - type: AntagSelection
    agentName: insurgent-round-end-agent-name
    antags:
    - !type:LinearAntagCount
      proto: Insurgent
      range:
        min: 1
        max: 4
      playerRatio: 10

- type: entity
  parent: BaseGameRule
  id: SubTraitorRandom
  components:
  - type: SubGamemodes
    rules:
    - id: SubTraitor
      prob: 0.5

- type: entity
  parent: [ BaseShadowlingRule, BaseRoundstartAntagRule ]
  id: ShadowlingGamemode
  components:
  - type: GameRule
    minPlayers: 30
  - type: AntagSelection
    antags:
    - !type:LinearAntagCount
      proto: Shadowling
      range:
        min: 1
        max: 3
      playerRatio: 25

- type: entity
  parent: TraitorReinforcement
  id: TraitorReinforcementNukeOps
  components:
  - type: AntagPlayerEffects
    effects:
    - !type:NestedEffect
      proto: InstallHypoportNukie
    - !type:NestedEffect
      proto: InstallSkillChipNukie
