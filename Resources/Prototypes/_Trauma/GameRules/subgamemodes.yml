- type: entity
  parent: Traitor
  id: SubTraitor
  components:
  - type: GameRule
    minPlayers: 5
  - type: AntagSelection
    antags:
    - !type:LinearAntagCount
      proto: Traitor
      range:
        min: 1
        max: 3
      playerRatio: 20

- type: entity
  parent: HereticRoundstart
  id: SubHeretic
  components:
  - type: AntagSelection
    antags:
    - !type:LinearAntagCount
      proto: Heretic
      range:
        min: 1
        max: 3
      playerRatio: 20

- type: entity
  parent: [BaseRoundstartAntagRule, DuoAbductorSpawn ]
  id: SubDuoAbductor
  components:
  - type: AntagSelection
    antags:
    - !type:FixedAntagCount
      proto: AbductorScientist
    - !type:FixedAntagCount
      proto: AbductorAgent
