- type: entity
  parent: [ OrganBaseTail, OrganReptilianExternal ]
  id: OrganReptilianTail
  components:
  - type: Sprite
    sprite: _Trauma/Mobs/Species/Reptilian/parts.rsi
  - type: VisualOrgan
    data:
      sprite: _Trauma/empty.rsi
      state: empty # no sprite since the markings actually control it
  - type: PullerTail
    speciesWhitelist:
    # need to have a body adapted to controlling a tail properly
    - Reptilian
    - Kobold
    - Monkey
  - type: OrganComponents
    onAdd:
    - type: Wagging
      organ: Tail

- type: entity
  parent: OrganReptilianTail
  id: OrganReptilianTailDefault
  suffix: Reptilian, Default
  components:
  - type: Sprite
    layers:
    - state: tail
      color: "#33A222FF"
  - type: VisualOrgan
    profile:
      skinColor: "#33A222FF"
  - type: VisualOrganMarkings
    markings:
      Tail:
      - markingId: LizardTailSmooth
        markingColor: [ "#33A222FF" ]
