- type: constructionGraph
  id: SheetPaper
  start: start
  graph:
  - node: start
    edges:
    - to: paper sheet
      completed:
      - !type:SetStackCount
        amount: 1
      steps:
      - tag: Paper
        doAfter: 5
        name: construction-graph-tag-paper
        icon:
          sprite: Objects/Misc/bureaucracy.rsi
          state: paper
  - node: paper sheet
    entity: SheetPaper

- type: constructionGraph
  id: PowerArmorStand
  start: start
  graph:
  - node: start
    entity: RevPowerArmorStand
    edges:
    - to: PowerArmorStand
      steps:
        - material: Steel
          amount: 30
          doAfter: 20

  - node: PowerArmorStand
    entity: RevPowerArmorStand

- type: constructionGraph
  id: ArmoryOverrideKey
  start: start
  graph:
  - node: start
    entity: ArmoryOverrideKeyComponents
    edges:
    - to: finished
      steps:
      - tag: OverrideKeyComponents
        doAfter: 5
        name: construction-graph-tag-overridekeycomponents
        icon:
          sprite: _Trauma/Objects/Tools/overridecomponents.rsi
          state: icon
      - tag: OverrideKeyComponents
        doAfter: 5
        name: construction-graph-tag-overridekeycomponents
        icon:
          sprite: _Trauma/Objects/Tools/overridecomponents.rsi
          state: icon

  - node: finished
    entity: ArmoryOverrideKey

- type: constructionGraph
  id: Bracing
  start: start
  graph:
  - node: start
    edges:
    - to: finish
      completed:
        - !type:SetStackCount
          amount: 1
      steps:
        - material: MetalRod
          amount: 3
        - material: Cable
          amount: 3
  - node: finish
    entity: WeaponBracing

- type: constructionGraph
  id: Whetstone
  start: start
  graph:
  - node: start
    edges:
    - to: finish
      completed:
        - !type:SetStackCount
          amount: 1
      steps:
        - material: Steel
          amount: 1
        - material: Brick
          amount: 1
  - node: finish
    entity: Whetstone
