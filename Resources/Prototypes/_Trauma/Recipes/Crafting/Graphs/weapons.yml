# Magazine

- type: constructionGraph
  id: GaussImprovMagazineGraph
  start: start
  graph:

  - node: start
    edges:
    - to: 1
      steps:
      - tag: MetalContainer
        icon:
          sprite: Objects/Consumable/Drinks/mug_metal.rsi
          state: icon
        name: construction-graph-tag-part-metal-container
        doAfter: 0.5

  - node: 1
    entity: CraftingGaussMagazineImprov
    edges:
    - to: finish
      steps:
      - tool: Slicing
        doAfter: 3

  - node: finish
    entity: MagazineGaussgunImprov

# Ammo

- type: constructionGraph
  id: GaussImprovAmmoGraph
  start: start
  graph:

  - node: start
    edges:
    - to: 1
      steps:
      - material: MetalRod
        amount: 1
        doAfter: 0.5

  - node: 1
    entity: CraftingGaussAmmoImprov
    edges:
    - to: finish
      steps:
      - tool: Sawing
        doAfter: 1.5
      - tool: Sawing
        doAfter: 1.5
      - tool: Sawing
        doAfter: 1.5
      - tool: Sawing
        doAfter: 1.5
      - tool: Sawing
        doAfter: 1.5
      - tool: Sawing
        doAfter: 1.5
      - tool: Sawing
        doAfter: 1.5
      completed:
      - !type:SpawnPrototype
        prototype: CartridgeBallBearing
        amount: 7

  - node: finish
    entity: CartridgeBallBearing
