- type: constructionGraph
  id: AnvilTop
  graph:
  - node: start
    edges:
    - to: finish
      steps:
      - tag: IngotWorkableSteel
        name: construction-graph-tag-ingotsteel
        icon:
          sprite: _Trauma/Objects/Specific/forging.rsi
          state: ingot_steel
        doAfter: 5
      - tag: IngotWorkableSteel
        name: construction-graph-tag-ingotsteel
        icon:
          sprite: _Trauma/Objects/Specific/forging.rsi
          state: ingot_steel
  - node: finish
    entity: AnvilTopUnfinished

