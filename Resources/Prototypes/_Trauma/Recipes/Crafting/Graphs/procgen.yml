# Procedurally generated tools/weapons graphs

- type: constructionGraph
  id: ForgedShortHandle
  graph:
  - node: start
    edges:
    - to: finished
      conditions:
      - !type:QuenchMetal
      completed:
      - !type:FinishForgedItem
      steps:
      - tag: WoodenHandleShort
        doAfter: 4
        name: construction-graph-tag-smallhandle
        icon:
          sprite: _Trauma/Objects/Specific/forging.rsi
          state: handlesmall
      - tool: Hammering
        doAfter: 3
      - tool: Hammering
        doAfter: 3
  - node: finished
    # entity gets changed manually in FinishForgedItem

