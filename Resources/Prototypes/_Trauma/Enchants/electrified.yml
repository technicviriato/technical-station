- type: entity
  parent: BaseEnchant
  id: EnchantElectrified
  name: Electrified
  components:
  - type: Enchant
    maxLevel: 1
  - type: ComponentsEnchant
    added:
    - type: PointLight
      enabled: true
      radius: 5
      color: "#4080FF"
    - type: Electrified
      shockDamage: 2
      shockTime: 0.8
      requirePower: false
    - type: EmitSoundOnCollide
      sound:
        path: /Audio/Effects/Lightning/lightningshock.ogg
        params:
          variation: 0.65
          volume: -10
