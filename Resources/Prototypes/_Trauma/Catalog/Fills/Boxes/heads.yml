- type: entity
  parent: ToteBase
  id: BoxSkillChipsBase
  name: skillchips box
  description: A large box for storing spare skillchips. Might be sterile? Who knows.
  components:
  - type: Storage
    whitelist: null # just a box

- type: entity
  parent: BoxSkillChipsBase
  id: BoxSkillChipsService
  name: service skillchips box
  description: A large box containing service skillchips. Definitely isn't sterile. Oh well.
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: SkillChipPassenger
        - id: SkillChipBartender
        - id: SkillChipBotanist
        - id: SkillChipChaplain
        - id: SkillChipChef
        - id: SkillChipClown
        - id: SkillChipJanitor
        - id: SkillChipLawyer
        - id: SkillChipLibrarian
        - id: SkillChipMime
        - id: SkillChipMusician
        - id: SkillChipRadioHost
        - id: SkillChipReporter
        - id: SkillChipServiceWorker

- type: entity
  parent: BoxSkillChipsBase
  id: BoxSkillChipsCargo
  name: cargo skillchips box
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: SkillChipQuartermaster
        - id: SkillChipSalvageSpecialist
          amount: 2
        - id: SkillChipCargoTechnician
          amount: 3

