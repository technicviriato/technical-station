- type: entity
  categories: [ HideSpawnMenu ]
  parent: ClosetMaintenance
  id: ClosetMaintenanceFilledLess
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: MaintenanceLockerLoot
        prob: 0.5 # 0.5x loot on average...

- type: entity
  categories: [ HideSpawnMenu ]
  parent: ClosetMaintenance
  id: ClosetMaintenanceFilledMore
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: MaintenanceLockerLoot
        rolls: 2 # 2x loot so has to be 50% chance of replacing it in the trait
