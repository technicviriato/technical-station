- type: entity
  parent: CrateSyndicate
  id: CrateXenomorphBundle
  suffix: Xenomorph Bundle
  description: A crate containing all the tools and organs necessary to kickstart your army of biological terror!
  components:
    - type: StorageFill
      contents:
      - id: OrganXenomorphEyes
      - id: OrganXenomorphResinSpinner
      - id: OrganXenomorphNeurotoxinGland
      - id: OrganXenomorphAcidGland
      - id: OrganXenomorphPlasmaVessel
      - id: OrganXenomorphEggSack
      - id: OrganXenomorphHiveNode
      - id: OmnimedTool
      - id: MonkeyCubeWrapped
        amount: 3
      - id: ClothingMaskGasSyndicate
      - id: XenoTissueSample
        amount: 3
      - id: XenoCompatibilityImplanter

- type: entity
  parent: CrateSyndicate
  id: CrateNameSyndicateShuttleBundle
  name: shuttle bundle crate
  description: Everything but the shuttle board. It's a shuttle in a crate* (Some assembly required)
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: GyroscopeFlatpack
        - id: ThrusterFlatpack
          amount: 4
        - id: CableMVStack
        - id: CableHVStack
        - id: CableApcStack
          amount: 2
        - id: Multitool
        - id: WallmountSubstationElectronics
        - id: APCElectronics
        - id: WallmountGeneratorAPUElectronics
          amount: 2
        - id: SheetSteel
        - id: PartRodMetal
        - id: MicroManipulatorStockPart
        - id: PowerCellSmall
        - id: SheetGlass