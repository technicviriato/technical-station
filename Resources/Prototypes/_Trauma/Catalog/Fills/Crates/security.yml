- type: entity
  parent: CrateSecgear
  id: CrateSecurityWeaponLaserSidearm
  name: phaser crate
  description: Contains three phasers. Requires security access to open.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage:
        id: WeaponLaserSidearm
        amount: 3

- type: entity
  parent: CrateSecgear
  id: CrateSecurityGunpowder
  name: gunpowder crate
  description: Contains one shipment of gunpowder. Requires security access to open.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage:
        id: GunpowderCase

- type: entity
  parent: CrateSecgear
  id: CrateSkillChipsSec
  name: security skillchips crate
  description: A crate containing security skillchips. Requires security access to open.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: SkillChipDetective
        - id: SkillChipWarden
        - id: SkillChipSecurityOfficer
        - id: SkillChipSecurityCadet
          amount: 3
