- type: entityEffect
  id: ShadowSnare
  effects:
  - !type:SetHandheldLight        # False by default
  - !type:SetUnpoweredFlashlight  # False by default

- type: entityEffect
  id: Extinguish
  effects:
  - !type:SetHandheldLight
  - !type:SetUnpoweredFlashlight
  - !type:DestroyLightBulb

- type: entityEffect
  id: EternalDarkness
  effects:
  - !type:RelayNearby
    compName: Temperature
    range: 8
    effect: !type:NestedEffect
      proto: EternalDarknessTemp
  - !type:RelayNearby
    compName: Hands
    range: 8
    effect: !type:NestedEffect
      proto: EternalDarknessProj
  - !type:SpawnParticles
    particleProto: EternalDarkness
  - !type:ConsumeVampireBlood
    amount: 2 # 6 every 2 seconds

- type: entityEffect
  id: EternalDarknessTemp
  effects:
  - !type:AdjustTemperature
    amount: -30000

- type: entityEffect
  id: EternalDarknessProj
  effects:
  - !type:ModifyStatusEffect
    effectProto: EternalDarknessProjectileStatusEffect
    time: 6
    type: Set
