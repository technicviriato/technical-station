- type: entity
  id: ProjectileDemonicHand
  name: demonic hand
  parent: BaseBullet
  components:
  - type: DemonicHand
  - type: PointLight
    color: "#DC143C"
    radius: 2.0
    energy: 5.0
  - type: Projectile
    damage:
      types:
        Heat: 0 # overwrites the default damage values since this projectile is not supposed to deal damage
    soundHit:
      path: /Audio/Weapons/Guns/Hits/energy_meat1.ogg
  - type: TriggerOnCollide
    fixtureID: projectile
    maxTriggers: 1
  - type: EntityEffectOnTrigger
    targetUser: true
    effects:
    - !type:ModifyParalysis
      time: 1
      type: Add
  - type: Sprite
    sprite: _Trauma/Vampires/vampire_effects.rsi
    layers:
    - state: demonic_grasp
      shader: unshaded
  - type: Reflective
    reflective: Magic
  - type: Physics
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,-0.1,0.1,0.1"
        hard: false
        mask:
        - BulletImpassable
