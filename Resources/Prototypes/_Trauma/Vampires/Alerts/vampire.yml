# Base Vampire Alert
- type: alert
  id: BloodLevel
  clickEvent: !type:VampireBloodAlertEvent
  icons:
  - sprite: /Textures/_Trauma/Vampires/blood_alert.rsi
    state: blood_display
  alertViewEntity: AlertBloodLevelView
  name: blood-display-name
  description: blood-display-description

- type: entity
  id: AlertBloodLevelView
  categories: [ HideSpawnMenu ]
  components:
  - type: GenericCounterAlert
    centerGlyph: false
  - type: Sprite
    sprite: Interface/Alerts/essence_counter.rsi # idc its just numbers
    layers:
    - map: [ "enum.AlertVisualLayers.Base" ]
    - map: [ "1" ]
      offset: 0.5, 0
    - map: [ "10" ]
      offset: 0.375, 0
    - map: [ "100" ]
      offset: 0.25, 0
    - map: [ "1000" ]
      offset: 0.125, 0

