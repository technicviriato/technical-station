# Looks like a shockwave, expands upwards using a circle shape.
- type: particleEffect
  id: VampireStompShockwave
  sprite:
    sprite: _Starfall/Particles/generic.rsi
    state: soft_dot
  startColor: "#FF5555FF"
  endColor: "#FFA500"
  alphaOverLifetime:
  - time: 0.0
    value: 0.5
  - time: 0.08
    value: 1.0
  - time: 0.3
    value: 0.45
  - time: 1.0
    value: 0.9
  sizeOverLifetime:
  - time: 0.0
    value: 0.5
  - time: 0.15
    value: 2.5
  - time: 0.3
    value: 3.6
  - time: 0.5
    value: 4.7
  - time: 0.6
    value: 5.0
  lifetime: 0.5
  lifetimeVariance: 0.05
  speed: 0.2
  speedVariance: 0.0
  particleSize: 1.0
  sizeVariance: 0.2
  emissionRate: 0
  maxCount: 30
  burst: true
  gravity: 0.0
  drag: 0.0
  noiseStrength: 0.0
  noiseFrequency: 0.0
  spreadAngle: 0
  emitAngle: 0
  startRotation: 90
  startRotationVariance: 0
  rotationSpeed: 0.0
  rotationSpeedVariance: 0
  stretchFactor: 1.0
  shape:
    type: CircleEdge
    radius: 5.0

