# Small particles that look like dust getting off the ground
- type: particleEffect
  id: VampireCharge
  sprite:
    sprite: _Starfall/Particles/generic.rsi
    state: soft_dot
  startColor: "#818181"
  endColor: "#000000"
  alphaOverLifetime:
  - time: 0.0
    value: 0.0
  - time: 0.1
    value: 0.7
  - time: 1.0
    value: 0.0
  sizeOverLifetime:
