- type: entity
  id: BaseMachineCircuitboard
  parent: BaseItem
  name: machine board
  abstract: true
  suffix: Machine Board
  components:
    # <Trauma>
    - type: Extractable
      grindableSolutionName: processor
    - type: Solution
      id: processor
      solution:
        reagents:
        - ReagentId: NanoProcessor
          Quantity: 15
    # </Trauma>
    - type: MachineBoard
    - type: Sprite
