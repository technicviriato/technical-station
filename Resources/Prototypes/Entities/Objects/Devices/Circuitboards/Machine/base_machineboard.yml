        - DroneUsable # Goobstation
    - type: StaticPrice
      price: 100
    - type: PhysicalComposition
      materialComposition:
        Glass: 125 # Trauma - was 230
        Steel: 25 # Trauma
      chemicalComposition:
        Silicon: 20
    - type: Circuitboard
