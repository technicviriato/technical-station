- type: entity
  name: telecrystal
  parent: [BaseItem, BaseSyndicateContraband]
  id: Telecrystal
  # Goobstation - Telecrystal rework
  suffix: 100 TC
  description: It seems to be pulsing with suspiciously enticing energies.
  components:
  - type: Sprite
    sprite: Objects/Specific/Syndicate/telecrystal.rsi
    state: telecrystal
  - type: Item
    sprite: Objects/Specific/Syndicate/telecrystal.rsi
    size: Tiny
  - type: Stack
    count: 100
    stackType: Telecrystal
  - type: StaticPrice
    price: 0
  - type: StackPrice
    price: 1000
  - type: Currency
    price:
      Telecrystal: 1
  - type: ScannableForPoints # Goobstation - NTR rework
    points: 0 # there was a bug that let ntr get infinite points
  # Goobstation
  - type: Tag
    tags:
    - Telecrystal

