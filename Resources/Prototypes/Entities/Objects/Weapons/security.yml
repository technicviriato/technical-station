- type: entity
  name: stun baton
  parent: [BaseItem, BaseSecurityContraband, BracingDurability] # Trauma - Durability
  id: Stunbaton
  description: A stun baton for incapacitating people with. Actively harming with this is considered bad tone.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Melee/stunbaton.rsi
    layers:
    - state: stunbaton_off
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: Stunbaton
    energyPerUse: 50
  - type: ItemToggle
    predictable: false
    soundActivate:
      collection: sparks
      params:
        variation: 0.250
    soundDeactivate:
      collection: sparks
      params:
        variation: 0.250
    soundFailToActivate:
      path: /Audio/Machines/button.ogg
      params:
        variation: 0.250
  - type: ItemTogglePrefix
    prefixOn: on
    prefixOff: off
  - type: ItemToggleMeleeWeapon
    activatedDamage:
      types:
        Blunt: 0
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 7
    bluntStaminaDamageFactor: 2.0
    angle: 0
    animation: WeaponArcThrust
  # it was ~35 now it's 55 so it's a buff ig
  - type: StaminaDamageOnHit # Trauma - edited values
    damage: 15
    overtime: 5
    lightAttackOvertimeDamageMultiplier: 4
    lightAttackDamageMultiplier: 4
    sound: /Audio/Weapons/egloves.ogg
  # <Goob>
  - type: DelayedKnockdownOnHit
    useDelay: stunbaton
  - type: UseDelayBlockMelee
    delays:
    - stunbaton
  # lol no
  #- type: StaminaDamageOnCollide
  #  damage: 35
  #  sound: /Audio/Weapons/egloves.ogg
  #- type: LandAtCursor # it deals stamina damage when thrown
  # </Goob>
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: UseDelay
    delays: # Goobstation
      stunbaton:
        length: 2.5
  - type: Item
    heldPrefix: off
  # <Trauma>
    shape:
    - 0,0,2,0
  # <Trauma>
    storedRotation: 45 # Goob

    size: Normal
  - type: Clothing
    sprite: Objects/Weapons/Melee/stunbaton.rsi
    quickEquip: false
    slots:
    - Belt
  - type: DisarmMalus
    malus: 0.225
  - type: Appearance
  - type: GenericVisualizer
    visuals:
     enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: {state: stunbaton_on}
          False: {state: stunbaton_off}
  - type: StaticPrice
    price: 80
  - type: Riggable
  - type: SolutionContainerManager
    solutions:
      battery:
        maxVol: 5
  - type: InjectableSolution
    solution: battery
  - type: DrawableSolution
    solution: battery
  - type: Explosive
    explosionType: Default
    intensitySlope: 1.5
    maxIntensity: 200
  - type: PhysicalComposition #Goobstation - Recycle update
    materialComposition:
      Steel: 75
      Plastic: 75
  - type: GuideHelp
    guides:
    - Security
  - type: KnowledgeGrantOnWear # Trauma - Knowledge
    blocked:
      MartialArtCorporateJudo: true
  - type: Tag # Goob
    tags:
    - StunBaton

