- type: entity
  parent: [BaseItem, KnifeDurabilitySharpenOnly] # Trauma - durability
  id: BaseKnife
  abstract: true
  components:
  - type: Tag
    tags:
    - Knife
  - type: Sharp
  - type: Execution
    doAfterDuration: 4.0
  - type: Utensil
    types:
      - Knife
  - type: MeleeWeapon
    animationRotation: -135 # WWDP
    wideAnimationRotation: -135
    canWideSwing: false # Trauma
    damage:
      types:
        Slash: 10
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  # Goobstation edit start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/knife_pickup.ogg
      params:
        volume: -8
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_Goobstation/Items/handling/knife_drop.ogg
      params:
        volume: -8
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Items/handling/knife_drop.ogg
      params:
        volume: -8
  # Goobstation edit end
  - type: Sprite
  - type: Item
    size: Small
  - type: Tool
    qualities:
      - Slicing
    useSound:
      path: /Audio/Items/Culinary/chop.ogg
  - type: Scalpel # Shitmed
    speed: 0.65
  - type: CosmicTransmutable # Trauma
    transmuteTo: SwordCosmicCult

- type: entity
  parent: [BaseKnife, BaseChefContraband] # Trauma - Made it contraband
  id: KitchenKnife
  name: kitchen knife
  description: A general purpose Chef's Knife made by Asters Merchant Guild. Guaranteed to stay sharp for years to come..
  components:
  - type: Tag
    tags:
    - Knife
    - KitchenKnife
  - type: Sprite
    sprite: Objects/Weapons/Melee/kitchen_knife.rsi
    state: icon
  - type: Item
    sprite: Objects/Weapons/Melee/kitchen_knife.rsi
    storedOffset: -1,1
    storedRotation: -45
  - type: GuideHelp
    guides:
    - Chef
    - FoodRecipes
  - type: EmbeddableProjectile # Goobstation
    sound: /Audio/Weapons/star_hit.ogg
    offset: -0.15,0.0
  - type: LandAtCursor # Goobstation
  - type: DamageOtherOnHit # Goobstation
    damage:
      types:
        Slash: 10

- type: entity
  name: butcher's cleaver
  parent: [BaseKnife, BaseChefContraband] # Trauma - Made it contraband
  id: ButchCleaver
  description: A huge blade used for chopping and chopping up meat. This includes clowns and clown-by-products.
  components:
  - type: Tag
    tags:
    - Knife
    - Cleaver
  - type: Sprite
    sprite: Objects/Weapons/Melee/cleaver.rsi
    state: butch
  - type: MeleeWeapon
    wideAnimationRotation: -115
    attackRate: 1.5
    damage:
      types:
        Slash: 13
  - type: Item
    size: Normal
    shape: # Trauma
    - 0,0,0,0
    - 1,0,2,1
    storedRotation: 27 # Trauma
    storedOffset: 5,-5 # Trauma
    sprite: Objects/Weapons/Melee/cleaver.rsi
  - type: GuideHelp
    guides:
    - Chef
    - FoodRecipes
  # <Trauma>
  - type: Sharp
    butcherDelayModifier: 0.75 # it's designed for butchering
  - type: Scalpel
    speed: 0.3
  - type: BoneSaw # Better than tg 25% because its a cleaver its meant to hack off limbs
    speed: 0.5
  # </Trauma>

