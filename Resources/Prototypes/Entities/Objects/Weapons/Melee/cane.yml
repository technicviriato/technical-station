- type: entity
  parent: BaseItem
  id: Cane
  name: cane
  description: A standard wooden cane. Can help disabled people move easier. # Goobstation
  components:
  - type: Sprite
    sprite: Objects/Weapons/Melee/cane.rsi
    state: cane
  - type: Item
    size: Normal
    # <Trauma>
    shape:
    - 0,0,2,0
    storedRotation: 45
    # <Trauma>
    sprite: Objects/Weapons/Melee/cane.rsi
  - type: Appearance
  - type: MobilityAid
  - type: MeleeWeapon
    animationRotation: -45 # WWDP
    wideAnimationRotation: 45
    damage:
      types:
        Blunt: 5
  - type: StaminaDamageOnHit
    damage: 5
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 3
  - type: UseDelay
    delay: 1

- type: entity
  name: cane blade
  parent: [KnifeDurabilitySharpenOnly, BaseSword, BaseSyndicateContraband]
  id: CaneBlade
  description: A sharp blade with a cane shaped hilt. Enchanted with fire powers by a fellow book lover. # Goobstation
  components:
  - type: Sprite
    sprite: Objects/Weapons/Melee/cane_blade.rsi
  - type: MeleeWeapon
    animationRotation: 45 # WWDP
    wideAnimationRotation: 65
    attackRate: 1.5
    damage:
      types:
        Slash: 17
    soundHit:
        path: /Audio/Weapons/bladeslice.ogg
  - type: Item
    sprite: Objects/Weapons/Melee/cane_blade.rsi
    # <Trauma>
    shape:
    - 0,0,2,0
    storedRotation: 45
    # <Trauma>
  - type: Tag
    tags:
      - CaneBlade
  - type: DisarmMalus
  - type: IgniteOnMeleeHit # Goobstation
    fireStacks: 0.5

- type: entity
  parent: [Cane, SelectableLock]
  id: CaneSheath
  suffix: Empty
  components:
  - type: Sprite
    sprite: Objects/Weapons/Melee/cane.rsi
    state: cane-empty
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      item: !type:ContainerSlot
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: ItemSlotsLock
    slots:
    - item
  - type: ItemSlots
    slots:
      item:
        name: CaneBlade
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb
        whitelist:
          tags:
          - CaneBlade
        insertSound: /Audio/Items/sheath.ogg
        ejectSound: /Audio/Items/unsheath.ogg
        priority: 3
  - type: ItemMapper
    mapLayers:
      cane:
        whitelist:
          tags:
          - CaneBlade
  - type: HideContrabandContent #Goobstation-Contraband detector

- type: entity
  id: CaneSheathFilled
  parent: CaneSheath
  suffix: Filled
  components:
  - type: ContainerFill
    containers:
      item:
      - CaneBlade
