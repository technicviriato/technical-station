# Goob edit - energy bola

- type: entity
  name: bola
  parent: [BaseItem, BaseSecurityContraband]
  id: BaseBola
  description: Linked together with some spare cuffs and metal.
  abstract: true
  components:
  - type: Item
    size: Normal
    shape: # Trauma
    - 1,0,1,0
    - 0,1,2,1
  - type: Sprite
    sprite: Objects/Weapons/Throwable/bola.rsi
    state: icon
  - type: EmitSoundOnThrow
    sound: /Audio/Weapons/bolathrow.ogg
  - type: EmitSoundOnLand
    sound: /Audio/Effects/snap.ogg
  - type: LandAtCursor
  - type: Ensnaring
    freeTime: 2.0
    breakoutTime: 1 # Trauma, was 3.5
    walkSpeed: 0.7 #makeshift bola shouldn't slow too much
    sprintSpeed: 0.7
    staminaDamage: 0
    canThrowTrigger: true
    canMoveBreakout: true
    maxEnsnares: 1
  - type: ThrowableBlocked
  - type: CombatDoAfter
    trigger: !type:CombatDoAfterThrownEvent
    delay: 1.5
    dropCancelDelay: 0.005

- type: entity
  name: bola
  parent: BaseBola
  id: Bola
  components:
  - type: Construction
    graph: Bola
    node: bola
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 75
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DamageOnLand
    damage:
      types:
        Blunt: 5
  - type: ThrowableBlocked
    behavior: Damage
    damage:
      types:
        Blunt: 15
  # <Trauma>
  - type: PhysicalComposition
    materialComposition:
      Steel: 300
  - type: Tag
    tags:
    - Trash
  # </Trauma>

- type: entity
  name: energy bola
  description: A specialized hardlight bola designed to ensnare fleeing criminals and aid in arrests.
  parent: BaseBola
  id: BolaEnergy
  components:
  - type: Item
    size: Small
    shape:
    - 1,0,1,0
    - 2,1,2,1
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Throwable/energy_bola.rsi
  - type: Ensnaring
    freeTime: 2.0
    breakoutTime: 0.5 #Trauma, was 3.5
    walkSpeed: 0.5 #makeshift bola shouldn't slow too much
    sprintSpeed: 0.5
    staminaDamage: 0 # anything but this is gamebreaking
    canThrowTrigger: true
    canMoveBreakout: true
    destroyOnRemove: true
    maxEnsnares: 1
  - type: Tag
    tags:
    - BolaEnergy
  - type: LandAtCursor
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeCircle
          radius: 0.4
        density: 20 # derived from base_item
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
