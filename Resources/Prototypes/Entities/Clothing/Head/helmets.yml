# Armor values heavily edited by Goobstation due to woundmed

- type: entity
  parent: ClothingHeadBase
  id: ClothingHeadHelmetBase
  abstract: true
  components:
  # <Trauma>
  - type: Armor
    coverage:
    - Head
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/helmet_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_Goobstation/Items/handling/helmet_drop.ogg
  # </Trauma>
  - type: Tag
    tags:
    - WhitelistChameleon
  #- type: HideLayerClothing #Goobstation
  #  layers:
  #    HeadTop : HEAD
  #    HeadSide : HEAD

- type: entity
  parent: [ ClothingHeadHelmetBase, BaseClothingViewconeMedium ] # Trauma - helmet reduces vision cone
  id: ClothingHeadHelmetArmoredBase
  abstract: true
  components:
  # <Trauma>
  - type: ArmorPointBlank # for most helmets the face is completely open
  # </Trauma>
  - type: Armor #Values seem to let the user survive one extra hit if attacked consistently.
    traumaDeductions:
      Dismemberment: 0.2
      OrganDamage: 0.2
      BoneDamage: 0.2
      VeinsDamage: 0
    modifiers:
      coefficients:
        Blunt: 0.5 # Trauma, was 0.7
        Slash: 0.5 # Trauma, was 0.7
        Piercing: 0.1 # Trauma, was 0.7
        Heat: 0.5 # Trauma, was 0.7
  - type: Tag
    tags:
    - WhitelistChameleon
  #- type: HideLayerClothing #Goobstation
  #  slots:
  #  - HeadTop
  #  - HeadSide

