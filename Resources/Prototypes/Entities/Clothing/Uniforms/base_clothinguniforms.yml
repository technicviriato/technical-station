- type: entity
  abstract: true
  parent: [SolutionFood, SolutionToolNormal, Clothing]
  id: UnsensoredClothingUniformBase
  components:
  # Goobstation edit start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/cloth_pickup.ogg
      params:
        volume: -4
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_Goobstation/Items/handling/cloth_drop.ogg
      params:
        volume: -4
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Items/handling/cloth_drop.ogg
      params:
        volume: -4
  # Goobstation edit end
  - type: Sprite
    state: icon
  - type: Clothing
    slots: [innerclothing]
    equipSound:
      path: /Audio/Items/jumpsuit_equip.ogg
  - type: Butcherable
    butcheringType: Knife
    spawned:
    - id: MaterialCloth1
      amount: 3
  - type: PhysicalComposition # 50% of the amount of cloth you'd obtain upon butchering
    materialComposition:
      Cloth: 150
  - type: Edible
    requiresSpecialDigestion: true
  - type: Solution
    solution:
      reagents:
      - ReagentId: Fiber
        Quantity: 30
  - type: Tag
    tags:
    - ClothMade
    - Recyclable
    - WhitelistChameleon
    - Skirt # Goobstation

- type: entity
  abstract: true
  parent: UnsensoredClothingUniformBase
  id: UnsensoredClothingUniformSkirtBase
  components:
  - type: Clothing
    slots: [innerclothing]
    femaleMask: UniformTop


- type: entity
  abstract: true
  parent: UnsensoredClothingUniformBase
  id: ClothingUniformBase
  components:
  - type: SuitSensor
  - type: DeviceNetwork
    deviceNetId: Wireless
    transmitFrequencyId: SuitSensor
    savableAddress: false
  - type: WirelessNetworkConnection
    range: 1200
  - type: StationLimitedNetwork
  - type: PhysicalComposition #Goobstation - Recycle update
    materialComposition:
      Cloth: 75
  - type: SuitSensorShockable # Goobstation

- type: entity
  abstract: true
  parent: ClothingUniformBase
  id: ClothingUniformSkirtBase
  components:
  - type: Clothing
    slots: [innerclothing]
    femaleMask: UniformTop
  - type: Tag # Goob - add Skirt tag
    tags:
    - Skirt
    - ClothMade
    - WhitelistChameleon

- type: entity
  abstract: true
  id: ClothingUniformFoldableBase
  components:
  - type: Foldable
    canFoldInsideContainer: true
    unfoldVerbText: unfold-verb-clothing-jacket
    foldVerbText: fold-verb-clothing-jacket
  - type: FoldableClothing
    foldedEquippedPrefix: folded
