- type: entity
  parent: MarkerBase
  id: RandomFoodBakedWhole
  name: random baked food spawner
  suffix: Whole
  placement:
    mode: AlignTileAny
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Objects/Consumable/Food/Baked/pie.rsi
      state: plain
  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - !type:GroupSelector #small item
        weight: 0.95
        prob: 0.8
        children:
        - id: FoodBreadVolcanic
        - id: FoodBreadPlain
        - id: FoodBreadMeat
        - id: FoodBreadCorn
        - id: FoodBreadSausage
