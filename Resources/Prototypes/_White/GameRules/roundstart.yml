- type: entity
  abstract: true
  parent: BaseGameRule
  id: BaseXenomorphsRule
  components:
  - type: AntagObjectives
    objectives:
    - XenomorphSurviveObjective
  - type: XenomorphsRule
    xenomorphInfestationSound:
      collection: XenoStart
  - type: MaintsSpawnRule
  - type: AntagSpawner
    prototype: MobXenomorphLarva
  - type: AntagSelection
    agentName: xenomorph-round-end-agent-name

- type: entity
  parent: [ BaseXenomorphsRule, BaseRoundstartAntagRule ]
  id: XenomorphsInfestationRoundstart
  components:
  - type: GameRule
    minPlayers: 30
  - type: AntagSelection
    antags:
    - !type:FixedAntagCount
      proto: Xenomorph
      count: 4
