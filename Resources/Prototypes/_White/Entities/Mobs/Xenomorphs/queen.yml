- type: entity
  parent: [ BaseMobXenomorphAdult, AppearanceXenomorphQueen ]
  id: BaseMobXenomorphQueen
  name: xenomorph queen
  description: The highest individual, the central element and mother of the Hive. The destruction of the Queen in most cases means the collapse of the Hive.
  abstract: true
  components:
  - type: Sprite
    sprite: _Trauma/Mobs/Xenos/queen.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: xenomorph
      offset: 0, 0.6
    - map: [ "pocket1" ]
    - map: [ "pocket2" ]
  - type: Xenomorph
    caste: Queen
  - type: XenomorphQueen
  - type: TailLash
    tailDamage:
      types:
        Slash: 5
    inject:
      ChloralHydrate: 10
  - type: TypingIndicator
    proto: alien_royal
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.40
        density: 300
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MobThresholds
    thresholds:
      0: Alive
      400: Critical
      425: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      375: 0.9
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 3
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 10
        Slash: 20
        Piercing: 20
  - type: Deathgasp
    prototype: XenomorphQueenDeathgasp
  - type: Speech
    speechSounds: Xenomorph
    speechVerb: LargeMob
  - type: LanguageSpeaker
    speaks:
    - Xeno
    - TauCetiBasic
    understands:
    - Xeno
    - Hissing
    - Draconic
    - TauCetiBasic
  - type: QueenRoar
  - type: XenomorphShoveTracker
    shoveThreshold: 1
  # - type: GuideHelp
  #   guides:
  #   - XenomorphQueen

- type: entity
  parent: [ BaseMobXenomorphQueen, BaseXenomorphGhostRole ]
  id: MobXenomorphQueen
  components:
  - type: GhostRole
    name: ghost-role-information-xenomorph-queen-name
    description: ghost-role-information-xenomorph-queen-description

- type: entity
  parent: [BaseMobXenomorphDungeon, BaseMobXenomorphQueen]
  id: MobXenomorphQueenDungeon
  components:
  - type: MovementSpeedModifier
    baseSprintSpeed: 3.8
  - type: SlowOnDamage
    speedModifierThresholds:
      375: 0.9
