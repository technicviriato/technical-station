- type: entity
  parent: [BaseItem, BaseMajorContraband]
  id: LavalandHierophantClub
  name: hierophant club
  description: Get item'ed lol
  components:
  - type: Sprite
    sprite: _Lavaland/Objects/Weapons/hierophant_club.rsi
    state: icon
  - type: Clothing
    sprite: _Lavaland/Objects/Weapons/hierophant_club.rsi
    slots:
    - back
    - suitStorage
  - type: Item
    size: Normal
    sprite: _Lavaland/Objects/Weapons/hierophant_club-inhands.rsi
  - type: StaticPrice
    price: 5000
  - type: MeleeWeapon
    wideAnimationRotation: 90
    attackRate: 0.75
    damage:
      types:
        Blunt: 15
        Heat: 5
  - type: ActionGrant
    actions:
    - ActionHierophantClubTileMovement
    - ActionHierophantClubBlink
  - type: ItemActionGrant
    actions:
    - ActionHierophantClubTileMovement
    - ActionHierophantClubBlink
  - type: HeldGrantComponent
    components:
    - type: MegafaunaBlink
      spawnOnTarget: HierophantShapeBlinkSafe
      spawnOnUsed: HierophantShapeBlinkSafe

- type: entity
  id: LavalandHierophantMarker
  name: mysterious marker
  description: What even is this?
  placement:
    mode: AlignTileAny
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        hard: false
        shape:
          !type:PhysShapeCircle
          radius: 0.35
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    sprite: _Lavaland/Structures/Specific/hierophant_telepad.rsi
    state: hierophant_tele_on # TODO hierophant visuals
  - type: SyncSprite
  - type: PointLight
    radius: 5.0
    energy: 1.5
    softness: 1
    castShadows: false
