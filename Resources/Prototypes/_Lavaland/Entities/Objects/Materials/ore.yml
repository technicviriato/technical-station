- type: entity
  parent: OreBase
  id: ArtifactFragmentOre
  name: artifact fragment ore
  suffix: Full
  components:
  - type: Stack
    stackType: ArtifactFragmentOre
  - type: Sprite
    sprite: _Lavaland/Objects/Materials/ore.rsi
    state: artifact
  - type: Material
  - type: PhysicalComposition
    materialComposition:
      RawArtifactFragment: 100
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Artifexium
        Quantity: 10
  - type: GuideHelp
    guides:
    - Xenoarchaeology
  - type: Item
    heldPrefix: artifact
  - type: Tag
    tags:
    - Ore
    - OreGold

- type: entity
  parent: ArtifactFragmentOre
  id: ArtifactFragmentOre1
  suffix: Single
  components:
  - type: Stack
    count: 1

