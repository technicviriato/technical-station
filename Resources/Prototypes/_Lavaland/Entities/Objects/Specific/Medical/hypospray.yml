- type: entity
  name: survival medipen
  parent: ChemicalMedipen
  id: SurvivalMedipen
  description: A cocktail of powerful healing chemicals. Contains Leporazine, and Miner's Salve. Slowly heals damage and stabilizes body temperature. You can overdose on these if you use more than one in quick succession.
  components:
  - type: Sprite
    sprite: /Textures/_Lavaland/Objects/Specific/Medical/medipen.rsi
    layers:
    - state: survivalpen
      map: [ "enum.SolutionContainerLayers.Fill" ]
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: survivalpen_empty
  - type: Solution
    solution:
      maxVol: 40
      reagents:
      - ReagentId: MinersSalve
        Quantity: 20
      - ReagentId: Leporazine
        Quantity: 10
      - ReagentId: Epinephrine
        Quantity: 10

# doesn't get any better than this
- type: entity
  name: luxurium medipen
  parent: ChemicalMedipen
  id: LuxuryMedipen
  description: A medipen containing medicines both ordinary and exotic to keep Nanotrasen's finest miners going. Harmful to use outside of low-pressure environments.
  components:
  - type: Sprite
    sprite: /Textures/_Lavaland/Objects/Specific/Medical/luxmedipen.rsi
    layers:
    - state: luxpen
      map: [ "enum.SolutionContainerLayers.Fill" ]
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: luxpen_empty
  - type: Solution
    solution:
      maxVol: 40
      reagents:
        - ReagentId: Luxurium
          Quantity: 20
        - ReagentId: TranexamicAcid
          Quantity: 10
        - ReagentId: Saline
          Quantity: 10
