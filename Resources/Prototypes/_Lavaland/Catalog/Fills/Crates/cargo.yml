    containers:
      entity_storage: !type:AllSelector
        children:
        - id: ClarkeHarness
        - id: ClarkeHead
        - id: ClarkeLArm
        - id: ClarkeRArm
        - id: ClarkeTreads
        - id: ClarkeCentralElectronics
