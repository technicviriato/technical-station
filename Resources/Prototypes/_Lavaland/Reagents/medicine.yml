- type: reagent
  id: MinersSalve
  name: reagent-name-minerssalve
  group: Medicine
  desc: reagent-desc-minerssalve
  physicalDesc: reagent-physical-desc-shiny
  flavor: metallic
  color: "#f2c777"
  recognizable: true
  metabolisms:
    Bloodstream:
      effects:
      - !type:ModifyBloodLevel
        amount: 1.5
      - !type:EvenHealthChange
        damage:
          Burn: -1
          Brute: -1
          Airloss: -1
      - !type:ModifyBloodLevel
        amount: 1.5
        conditions:
        - !type:PressureCondition
          min: 1
          max: 50
          worksOnLavaland: true
      - !type:EvenHealthChange
        damage:
          Burn: -4
          Brute: -4
          Airloss: -1
        conditions:
        - !type:PressureCondition
          min: 1
          max: 50
          worksOnLavaland: true
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: MinersSalve
          min: 21
        - !type:PressureCondition
          min: 1
          max: 50
          worksOnLavaland: true
        damage:
          types:
            Poison: 5
            Cold: 5
      - !type:Jitter
      - !type:PopupMessage
        type: Local
        visualType: Small
        messages: [ "generic-reagent-effect-burning-insides" ]
        probability: 0.1
      - !type:Emote
        emote: Scream
        probability: 0.05
        #It's balanced I swear!

- type: reagent
  id: Luxurium
  name: reagent-name-luxurium
  group: Medicine
  desc: reagent-desc-luxurium
  physicalDesc: reagent-physical-desc-powdery
  flavor: metallic
  color: "#302f70"
  recognizable: true
  metabolisms:
    Bloodstream:
      effects:
      # Healing done only between 0-50kpa, poisoning has different damage
      - !type:EvenHealthChange
        conditions:
        - !type:PressureCondition
            min: 0
            max: 50
        damage:
          Toxin: -2
          Brute: -6
          Burn: -6
          Airloss: -6
      # Improper pressure effects below
      - !type:EvenHealthChange
        conditions:
        - !type:PressureCondition
          inverted: true
          min: 0
          max: 50
        damage:
          Toxin: 1
          Brute: 1
          Airloss: 1
      - !type:Emote
        conditions:
        - !type:PressureCondition # five billion pressure conditions :joel:
          inverted: true
          min: 0
          max: 50
        emote: Scream
        probability: 0.1
      - !type:Jitter
        conditions:
        - !type:PressureCondition
          inverted: true
          min: 0
          max: 50

- type: reagent
  id: VitriumFroth
  name: reagent-name-vitrium-froth
  group: Medicine
  desc: reagent-desc-vitrium-froth
  physicalDesc: reagent-physical-desc-exotic-smelling
  flavor: sweet
  color: "#d3a308"
  metabolisms:
    Bloodstream:
      effects:
      - !type:EvenHealthChange
        damage:
          Brute: -2
          Burn: -3

- type: reagent
  id: SerakaExtract
  name: reagent-name-seraka-extract
  group: Medicine
  desc: reagent-desc-seraka-extract
  physicalDesc: reagent-physical-desc-sticky
  flavor: metallic
  color: "#00767c"
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types:
            Bloodloss: -1
      - !type:ModifyBleed
        amount: -1
      - !type:ModifyBloodLevel
        amount: 1
      - !type:EvenHealthChange # Overdose can cause blood to clot in the veins
        conditions:
        - !type:ReagentCondition
          reagent: SerakaExtract
          min: 8
        damage:
          Airloss: 7
