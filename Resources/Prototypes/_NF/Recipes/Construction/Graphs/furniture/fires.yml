- type: constructionGraph
  id: FiresGraph
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity {}
      edges:
        - to: FireplaceNode
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: WoodPlank
              amount: 10
              doAfter: 1
            - material: Steel
              amount: 10
              doAfter: 1
    - node: FireplaceNode
      entity: Fireplace
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetSteel1
              amount: 4
          steps:
            - tool: Prying
              doAfter: 1
