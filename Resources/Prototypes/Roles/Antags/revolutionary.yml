  - !type:DepartmentTimeRequirement # Goob - was overall
    department: Command # Goob - was overall
    time: 10h
  guides: [ Revolutionaries ] # Goob
  creditImage: /Textures/_Trauma/EndCredits/Antags/revolution.png # Trauma

- type: antagSpecifier
  abstract: true
  parent: RestrictedAntag
  id: BaseRev
  name: revolutionary
