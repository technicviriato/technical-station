- type: antag
  id: Survivor
  name: roles-antag-survivor-name
  antagonist: true
  objective: roles-antag-survivor-objective
  # guides: [  ]

- type: antag
  id: Wizard
  name: roles-antag-wizard-name
  antagonist: true
  setPreference: true
  objective: roles-antag-wizard-description-goob # Goob
  requirements: # I hate time locked roles but this should be enough time for someone to be acclimated
  - !type:OverallPlaytimeRequirement
    time: 5h
  guides: [ Wizard ]
  creditImage: /Textures/_Trauma/EndCredits/Antags/wizard.png # Trauma

- type: antagSpecifier
  parent: RestrictedAntag
  id: Wizard
  spawnerPrototype: SpawnPointGhostWizard
  startingGear: WizardGear # Trauma
  unequipOldGear: true # Trauma
  prefRoles: [ Wizard ] # Trauma
  roleLoadout:
  - RoleSurvivalEVA # Trauma - was RoleSurvivalExtended
  briefing:
    text: wizard-role-greeting
    color: Turquoise
    # TODO: Need Wizard Start sound
    #sound: "/Audio/Ambience/Antag/wizard_start.ogg"
  # TODO: WizardComp as needed
  components:
  # <Trauma>
  - type: Wizard
  - type: LanguageSpeaker
    speaks: []
    understands: []
  - type: UniversalLanguageSpeaker
  - type: TowerOfBabel
  # </Trauma>
  - type: NpcFactionMember
    factions:
    - Wizard
  - type: RandomMetadata
    nameSegments:
    - NamesWizardFirst
    - NamesWizardLast
    nameFormat: name-format-wizard
  mindRoles:
  - MindRoleWizard

# See wizard_startinggear for wiz start gear options
