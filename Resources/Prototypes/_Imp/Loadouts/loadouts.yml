# Species
- type: loadoutEffectGroup
  id: Aquatic
  effects:
  - !type:SpeciesLoadoutEffect
    species:
    - Decapoid

- type: loadout
  id: LoadoutDecapoidBreathTool
  effects:
  - !type:GroupLoadoutEffect
    proto: Aquatic
  equipment:
    mask: ClothingNeckDecapoidVaporizer
    suitstorage: DecapoidVaporTank
    outerClothing: ClothingOuterVestTank

# Breath tool in inventory
- type: loadout
  id: LoadoutDecapoidBreathToolInventory
  effects:
  - !type:GroupLoadoutEffect
    proto: Aquatic
  storage:
    back:
    - ClothingNeckDecapoidVaporizer

- type: loadout
  id: EmergencyVapor
  effects:
  - !type:GroupLoadoutEffect
    proto: Aquatic
  storage:
    back:
    - BoxSurvivalSlotsVapor
