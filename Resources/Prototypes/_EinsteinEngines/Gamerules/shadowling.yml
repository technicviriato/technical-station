- type: entity
  abstract: true
  parent: BaseGameRule
  id: BaseShadowlingRule
  components:
  - type: ShadowlingRule
  - type: AntagObjectives
    objectives:
    - ShadowlingAscendObjective
  - type: AntagSelection
    antags:
    - !type:FixedAntagCount
      proto: Shadowling

- type: entity
  parent: [ BaseShadowlingRule, BaseRoundstartAntagRule ]
  id: ShadowlingRoundstart
  components:
  - type: GameRule
    minPlayers: 30
