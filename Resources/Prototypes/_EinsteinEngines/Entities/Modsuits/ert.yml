- type: entity
  abstract: true
  id: BaseModsuitPieceERT
  components:
  - type: ExplosionResistance
    damageCoefficient: 0.45
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.75
        Slash: 0.4
        Piercing: 0.65
        Heat: 0.15
        Cold: 0.10
        Shock: 0.15
        Radiation: 0.1
        Caustic: 0.1

- type: entity
  abstract: true
  parent: [ ClothingModsuitStandard, BaseCentcommContraband, BaseModsuitBatteryMicroreactor ]
  id: BaseModsuitERT
  components:
  - type: Storage
    grid:
    - 0,0,10,3
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 1

- type: entity
  abstract: true
  parent: [ ClothingModsuitGauntletsStandard, BaseModsuitPieceERT ]
  id: BaseModsuitGauntletsERT

- type: entity
  abstract: true
  parent: [ ClothingModsuitHelmetStandard, ShowSecurityIcons, BaseModsuitPieceERT ]
  id: BaseModsuitHelmetERT
  components:
  - type: PressureProtection
    highPressureMultiplier: 0.08
    lowPressureMultiplier: 1000
  - type: FlashImmunity
  - type: FlashSoundSuppression
    protectionRange: 0
  - type: EyeProtection
  - type: ShowHealthBars
    damageContainers:
    - Biological
  - type: PointLight
    color: "#FFDF00"

- type: entity
  abstract: true
  parent: [ ClothingModsuitChestplateStandard, BaseModsuitPieceERT ]
  id: BaseModsuitChestplateERT
  components:
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 1
  - type: StaminaResistance
    damageCoefficient: 0.5 # 50%
  - type: FireProtection
    reduction: 1

- type: entity
  abstract: true
  parent: [ ClothingModsuitBootsStandard, BaseModsuitPieceERT ]
  id: BaseModsuitBootsERT
  components:
  - type: ItemToggle
  - type: ToggleClothing
    action: ActionToggleMagboots
  - type: ComponentToggler
    components:
    - type: NoSlip
  - type: Magboots
    enabledPrefix: null
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 1
