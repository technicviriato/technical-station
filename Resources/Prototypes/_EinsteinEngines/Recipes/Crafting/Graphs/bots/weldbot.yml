- type: constructionGraph
  id: WeldBot
  start: start
  graph:
  - node: start
    edges:
    - to: bot
      steps:
      - tag: ProximitySensor
        icon:
          sprite: Objects/Misc/proximity_sensor.rsi
          state: icon
        name: construction-graph-tag-proximity-sensor
        doAfter: 2
      - tag: WeldingMask
        icon:
          sprite: Clothing/Head/Welding/welding.rsi
          state: icon
        name: construction-graph-tag-welding-mask
        doAfter: 2
      - tag: WelderExperimental
        icon:
          sprite: Objects/Tools/welder_experimental.rsi
          state: icon
        name: construction-graph-tag-welder-experimental
        doAfter: 2
  - node: bot
    entity: MobWeldbot
