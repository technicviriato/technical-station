    - 0,0,8,4
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: PenCentcom # Reference to half life. If you look inside G-Mans briefcase, this is whats inside.
        - id: PenCap # Todo - Maybe make these unique pens?
        - id: CyberPen
