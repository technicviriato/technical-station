    size: Ginormous
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,6,3
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: WeaponPistolDualetta
          amount: 2
        - id: MagazinePistolHighCapacity
          amount: 2
        - id: ClothingHandsGlovesCombat

