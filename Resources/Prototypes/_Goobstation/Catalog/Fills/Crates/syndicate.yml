- type: entity
  id: CratePizzaParty
  parent: CratePlastic
  name: disaster pizza delivery
  description: In the ultimate event that all else has failed, Find comfort in that more pizza solves everything. Includes 16 pizzas.
  suffix: "bombs"
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - !type:GroupSelector
          children:
          - id: FoodBoxPizzaFilled
          - id: FoodBoxPizzaBomb
          rolls: 14 # maybe you get good pizza maybe i blow your arm off
        - id: FoodBoxPizzaBomb # to counter the guaranteed cotton pizza
        - id: FoodBoxPizzaCotton
        - id: LidSalami
          prob: 0.01

