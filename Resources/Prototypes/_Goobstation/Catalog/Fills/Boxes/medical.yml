- type: entity
  name: pax syringe box
  parent: BoxCardboard
  id: BoxSyringePax
  description: A box full of tranquilizer syringes.
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase:
        id: SyringePax
        amount: 6
  - type: Sprite
    layers:
      - state: box
      - state: syringe

- type: entity
  name: poison syringe box
  parent: BoxCardboard
  id: BoxSyringePoison
  description: A box full of quick-acting poison syringes.
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase:
        id: SyringePoisonCentcomm
        amount: 6
  - type: Sprite
    layers:
    - state: box
    - state: syringe
