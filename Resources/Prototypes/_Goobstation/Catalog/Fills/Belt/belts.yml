- type: entity
  id: ClothingBeltHolsterFilledChaplain
  parent: ClothingBeltBase
  name: Chaplains' Holster
  description: A shoulder holster from the Gods. Contains a set of dual pistols.
  suffix: Filled, Chaplain
  components:
  - type: Item
    size: Ginormous
  - type: Sprite
    sprite: _ShitChap/Clothing/Belt/holster.rsi
  - type: Clothing
    sprite: _ShitChap/Clothing/Belt/holster.rsi
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      item: !type:ContainerSlot {}
      item2: !type:ContainerSlot {}
  - type: ItemSlots
    slots:
      item:
        name: casul
        whitelist:
          tags:
          - WeaponPistolCasul
      item2:
        name: jackal
        whitelist:
          tags:
          - WeaponPistolJackal
  - type: ContainerFill
    containers:
      item:
      - WeaponPistolCasul
      item2:
      - WeaponPistolJackal
  - type: DivineIntervention
  - type: Reflect
    reflectProb: 1
    reflects:
    - Magic
  - type: Tag
    tags:
    - ChaplainsHolster

