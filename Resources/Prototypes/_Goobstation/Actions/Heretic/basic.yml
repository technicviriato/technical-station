# actions
- type: entity
  parent: BaseAction
  id: ActionHereticOpenStore
  name: Open Knowledge Store
  description: Open the Knowledge Store.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: open_store
  - type: InstantAction
    event: !type:EventHereticOpenStore
  - type: HereticAction
    requireMagicItem: false
  - type: Tag
    tags:
    - SpellIgnoreForestAdmonitions

- type: entity
  parent: BaseAction
  id: ActionHereticMansusGrasp
  name: Mansus Grasp
  description: Channel the power of the Old Gods through your grip.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: mansus_grasp
  - type: InstantAction
    event: !type:TouchSpellEvent
      touchSpell: TouchSpellMansus
      specialEvent: !type:MansusGraspSpecialEvent
        cooldown: 10
        speech: heretic-speech-mansusgrasp
        sound:
          path: /Audio/Items/welder.ogg
      touchSpellWhitelist:
        components:
        - MansusGrasp
  - type: HereticAction
    requireMagicItem: false
  - type: Tag
    tags:
    - SpellIgnoreForestAdmonitions

- type: entity
  parent: BaseAction
  id: ActionHereticLivingHeart
  name: Living Heart
  description: Use your heart to get your sacrifice targets location.
  components:
  - type: Action
    useDelay: 2
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: living_heart
  - type: InstantAction
    event: !type:EventHereticLivingHeart
  - type: HereticAction
    requireMagicItem: false
  - type: Tag
    tags:
    - SpellIgnoreForestAdmonitions

- type: entity
  parent: BaseAction
  id: ActionHereticMansusLink
  name: Mansus Link
  description: Pierce through reality and connect minds to one another. Default key is +m
  components:
  - type: Action
    useDelay: 10
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: mansus_link
  - type: TargetAction
  - type: EntityTargetAction
    event: !type:EventHereticMansusLink
  - type: HereticAction
    requireMagicItem: false
  - type: SpeakOnAction
    sentence: heretic-speech-mansuslink

- type: entity
  parent: BaseAction
  id: ActionHereticShadowCloak
  name: Cloak of Shadow
  description: Completely conceals your identity, but does not make you invisible. Can be activated early to disable it. While cloaked, you move faster, but undergo actions much slower. Taking damage while cloaked may cause it to lift suddenly.
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 6
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: shadowcloak
  - type: InstantAction
    event: !type:EventHereticCloak
      status: ShadowCloakStatusEffect
      lifetime: 180
  - type: HereticAction
    requireMagicItem: true
  - type: Tag
    tags:
    - ShadowCloakAction

- type: entity
  parent: BaseAction
  id: ActionHereticShapeshift
  name: Shapechange
  description: A spell that allows you to take on the form of another creature, gaining their abilities.
  components:
  - type: Action
    useDelay: 10
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: shapeshift
  - type: InstantAction
    event: !type:EventHereticShapeshift
  - type: ShapeshiftAction
    polymorphs:
    - ShapeshiftMouse
    - ShapeshiftHonkBot
    - ShapeshiftAdultSlimesBlue
    - ShapeshiftBat
    - ShapeshiftMothroach
    - ShapeshiftCrab
    - ShapeshiftGoose
    - ShapeshiftLizard
    - ShapeshiftParrot
    - ShapeshiftGiantSpider
    - ShapeshiftFox
    - ShapeshiftCorgi
    - ShapeshiftCat
    - ShapeshiftHamster
    - ShapeshiftCarp
    - ShapeshiftBingle
    - ShapeshiftLaserRaptor
  - type: UserInterface
    interfaces:
      enum.HereticShapeshiftUiKey.Key:
        type: HereticShapeshiftBoundUserInterface
        requireInputValidation: false
        interactionRange: -1
  - type: HereticAction

- type: entity
  parent: BaseAction
  id: DisguiseRevertAction
  name: Revert
  description: Revert back into your original identity.
  components:
  - type: Action
    temporary: true
  - type: InstantAction
    event: !type:DisguiseRevertEvent
