- type: entity
  parent: BaseAction
  id: ActionHereticChampionHook
  name: Champion Hook
  description: Knockdown and hook your next heretic blade light attack target.
  components:
  - type: Action
    checkCanInteract: false
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: hook
    iconOn:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: hook_on
  - type: InstantAction
    event: !type:EventHereticToggleChampionHook

- type: entity
  parent: BaseAction
  id: ActionHereticSacraments
  name: Sacraments of Power
  description: Become immune to all damage temporarily, sending it back to attackers.
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 30
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: sacraments
  - type: InstantAction
    event: !type:EventHereticSacraments
  - type: HereticAction
    requireMagicItem: true
  - type: SpeakOnAction
    sentence: heretic-speech-blade-sacraments

- type: entity
  parent: BaseAction
  id: ActionHereticFuriousSteel
  name: Furious Steel
  description: Summon three orbiting protecting blades around you.
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 60
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: furious_steel
  - type: InstantAction
    event: !type:EventHereticFuriousSteel
  - type: HereticAction
    requireMagicItem: true
  - type: SpeakOnAction
    sentence: heretic-speech-blade-furioussteel
  - type: ChangeUseDelayOnAscension
    newUseDelay: 30
    requiredPath: Blade

- type: entity
  parent: BaseAction
  id: ActionHereticDomainExpansion
  name: Wolves among Sheep
  description: Alters the fabric of reality, conjuring a magical arena unpassable to outsiders, all participants are trapped and immune to any form of crowd control or enviromental hazards; trapped participants are granted a Blade and are unable to leave or jaunt until they score a critical hit.
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 300
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: among_sheep
  - type: InstantAction
    event: !type:EventHereticDomainExpansion
  - type: HereticAction
    requireMagicItem: true
  - type: SpeakOnAction
    sentence: heretic-speech-blade-domain-expansion
