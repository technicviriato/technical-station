- type: entity
  parent: BaseAction
  id: ActionHereticVoidPhase
  name: Void Phase
  description: Lets you blink to your pointed destination, causes 3x3 aoe damage bubble around your pointed destination and your current location.
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 20
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: void_phase
    sound: !type:SoundPathSpecifier
      path: /Audio/_Goobstation/Heretic/voidblink.ogg
  - type: TargetAction
    checkCanAccess: false
    range: 16
  - type: WorldTargetAction
    event: !type:HereticVoidBlinkEvent
  - type: HereticAction
    requireMagicItem: true
  - type: SpeakOnAction
    sentence: heretic-speech-void-phase
  - type: ChangeUseDelayOnAscension
    newUseDelay: 10
    requiredPath: Void

- type: entity
  parent: BaseAction
  id: ActionHereticVoidPrison
  name: Void Prison
  description: Sends a heathen into the void for 10 seconds. They will be unable to perform any actions for the duration. Afterwards, they will be chilled and returned to the mortal plane.
  components:
  - type: Action
    predicted: false
    checkCanInteract: false
    useDelay: 30
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: voidball
  - type: TargetAction
    range: 3
  - type: EntityTargetAction
    whitelist:
      components:
      - MobState
    canTargetSelf: false
    event: !type:HereticVoidPrisonEvent
  - type: HereticAction
    requireMagicItem: true
  - type: SpeakOnAction
    sentence: heretic-speech-void-prison
  - type: ChangeUseDelayOnAscension
    newUseDelay: 15
    requiredPath: Void

- type: entity
  parent: BaseAction
  id: ActionHereticVoidPull
  name: Void Pull
  description: Calls the void, damaging, knocking down, pulling people closer, and stunning people nearby.
  components:
  - type: Action
    useDelay: 30
    itemIconStyle: NoItem
    checkCanInteract: false
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: void_pull
    sound: !type:SoundPathSpecifier
      path: /Audio/_Goobstation/Heretic/voidblink.ogg
  - type: InstantAction
    event: !type:HereticVoidPullEvent
  - type: HereticAction
    requireMagicItem: true
  - type: SpeakOnAction
    sentence: heretic-speech-void-pull
  - type: ChangeUseDelayOnAscension
    newUseDelay: 15
    requiredPath: Void

- type: entity
  parent: BaseAction
  id: ActionHereticVoidConduit
  name: Void Conduit
  description: Opens a gate to the Void; it releases an intermittent pulse that damages windows and airlocks, while afflicting Heathens with void chill. Affected Heretics instead receive low pressure resistance.
  components:
  - type: Action
    useDelay: 90
    itemIconStyle: NoItem
    checkCanInteract: false
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: void_rift
  - type: InstantAction
    event: !type:HereticVoidConduitEvent
  - type: HereticAction
    requireMagicItem: true
  - type: SpeakOnAction
    sentence: heretic-speech-void-conduit
  - type: ChangeUseDelayOnAscension
    newUseDelay: 45
    requiredPath: Void
