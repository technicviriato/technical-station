# Deathsquad

- type: entity
  parent: BaseUnknownShuttleRule
  id: SpawnDeathsquad
  components:
  - type: StationEvent
    startAnnouncement: station-event-deathsquad-enroute
    startAudio:
      path: /Audio/_Goobstation/StationEvents/rescue_imminent.ogg
    reoccurrenceDelay: 30
    duration: null
    maxOccurrences: 1
  - type: LoadMapRule
    gridPath: /Maps/_Goobstation/Shuttles/consul.yml

