#Contractor
- type: entity
  parent: [ BaseAntagGhostRoleRule, BaseUnknownShuttleRule ]
  id: ContractorSpawn
  components:
  - type: StationEvent
    startAnnouncement: null
    weight: 1
    duration: null
    earliestStart: 30
    minimumPlayers: 30
  - type: RuleGrids
  - type: LoadMapRule
    gridPath: /Maps/_Trauma/Shuttles/ShuttleEvent/legionnaire.yml
  - type: AntagLoadProfileRule
    speciesOverrideBlacklist:
    - IPC
    - Diona
    - Plasmaman
  - type: AntagObjectives
    objectives:
    - ContractorRansomObjective
  - type: AntagSelection
    agentName: ghost-role-information-contractor-name
    antags:
    - !type:FixedAntagCount
      proto: Contractor
