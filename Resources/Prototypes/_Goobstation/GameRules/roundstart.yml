# GameModes

- type: entity
  parent: BaseTraitorRule
  id: CorporateAgent
  components:
  - type: TraitorRule
    objectiveIssuers: CorporateFlavor
  - type: AntagRandomObjectives
    sets:
    - groups: CorporateObjectiveGroups
    maxDifficulty: 8 # Very rare antag so they should get a lot of objectives
  - type: GameRule
    minPlayers: 30
    delay:
      min: 465
      max: 665 # Delay is so the heads help their department get set up.
  - type: AntagSelection
    antags:
    - !type:LinearAntagCount
      proto: CorporateAgent
      range:
        min: 1
        max: 2
      playerRatio: 25

- type: entity
  parent: BaseTraitorRule
  id: CalmTraitor # For Dual Antag Gamemodes
  components:
  - type: GameRule
    minPlayers: 30
  - type: AntagSelection
    lateJoinAdditional: true
    antags:
    - !type:LinearAntagCount
      proto: Traitor
      range:
        min: 1
        max: 3
      playerRatio: 15

- type: entity
  parent: Changeling
  id: CalmLing # For Dual Antag Gamemodes
  components:
  - type: GameRule
    minPlayers: 30
  - type: AntagSelection
    antags:
    - !type:LinearAntagCount
      proto: Changeling
      range:
        min: 1
        max: 2
      playerRatio: 15

- type: entity
  parent: BaseNukeopsRule
  id: Calmops # For Dual Antag Gamemodes
  components:
  - type: GameRule
    minPlayers: 30
  - type: LoadMapRule
    mapPath: /Maps/_Trauma/Nonstations/nukieplanet.yml
  - type: AntagSelection
    selectionTime: PrePlayerSpawn
    antags:
    - !type:FixedAntagCount
      proto: NukeopsCommander
    - !type:FixedAntagCount
      proto: NukeopsMedic
    - !type:LinearAntagCount
      proto: NukeopsOperative
      range:
        min: 1
        max: 8
      playerRatio: 20

- type: entity
  parent: Revolutionary
  id: CalmRevs # For Dual Antag Gamemodes
  components:
  - type: GameRule
    minPlayers: 30
  - type: AntagSelection
    antags:
    - !type:FixedAntagCount
      proto: HeadRev

# Blob
- type: entity
  id: BlobRule
  parent: BaseGameRule
  components:
  - type: BlobRule

- type: entity
  parent: [ BlobRule, BaseRoundstartAntagRule ]
  id: BlobGameMode
  components:
  - type: GameRule
    minPlayers: 40
  - type: AntagSelection
    antags:
    - !type:FixedAntagCount
      proto: Blob

- type: entity
  parent: [ BaseNukeopsRule, BaseRoundstartAntagRule ]
  id: Honkops
  components:
  - type: GameRule
    minPlayers: 40 # Trauma, was 20
  - type: RandomMetadata # this generates the random operation name cuz it's cool.
    nameSegments:
    - OperationPrefixHonkops
    - OperationSuffixHonkops
    nameFormat: name-format-standard
  - type: NukeopsRule
    localePrefix: "honkops-"
  - type: LoadMapRule
    mapPath: /Maps/_Trauma/Nonstations/nukieplanet-honkops.yml
  - type: AntagSelection
    antags:
    - !type:FixedAntagCount
      proto: HonkopsCommander
    - !type:FixedAntagCount
      proto: HonkopsMedic
    - !type:LinearAntagCount
      proto: HonkopsOperative
      range:
        min: 1
        max: 5
      playerRatio: 16

- type: entity
  parent: [ BaseGameRule, BaseRoundstartAntagRule ]
  id: Devil
  components:
  - type: DevilRule
  - type: GameRule
    minPlayers: 15
  - type: AntagObjectives
    objectives:
    - DevilContractObjective
    - DevilWeightObjective
  - type: AntagSelection
    agentName: devil-roundend-name
    antags:
    - !type:FixedAntagCount
      proto: Devil
