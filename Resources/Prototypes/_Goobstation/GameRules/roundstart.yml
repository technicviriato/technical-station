# SubGamemodes

- type: entity
  parent: BaseGameRule
  id: TraitorSubGamemodesRule
  components:
  - type: SubGamemodes
    rules:
    - id: SubgamemodeTraitor
      prob: 0.5

# GameModes

- type: entity
  parent: BaseGameRule
  id: Changeling
  components:
  - type: ChangelingRule
  - type: GameRule
    minPlayers: 15
  - type: AntagRandomObjectives
    sets:
    - groups: ChangelingObjectiveGroups
    maxDifficulty: 5
  - type: AntagObjectives
    objectives:
    - ChangelingSurviveObjective
    - ChangelingStealDNAObjective
    - ChangelingAbsorbObjective
    - EscapeIdentityObjective
  - type: AntagSelection
    selectionTime: IntraPlayerSpawn
    agentName: changeling-roundend-name
    definitions:
    - prefRoles: [ Changeling ]
      max: 4
      playerRatio: 12
      blacklist:
        components:
        - CommandStaff
      lateJoinAdditional: true
      mindRoles:
      - MindRoleChangeling
  - type: AntagPlayerEffects
    effects:
    - !type:NestedEffect
      proto: ChangelingSkills

- type: entity
  parent: BaseTraitorRule
  id: CorporateAgent
  components:
  - type: TraitorRule
    objectiveIssuers: CorporateFlavor
  - type: AntagRandomObjectives
    sets:
    - groups: CorporateObjectiveGroups
    maxDifficulty: 8 # Very rare antag so they should get a lot of objectives
  - type: GameRule
    minPlayers: 30
    delay:
      min: 465
      max: 665 # Delay is so the heads help their department get set up.
  - type: AntagSelection
    definitions:
    - prefRoles: [ Traitor ]
      max: 2
      playerRatio: 25
      jobBlacklist: [ NanotrasenRepresentative ]
      whitelist:
        components:
        - CommandStaff
      blacklist:
        components:
        - Condemned # Stops the NTR from rolling it
      lateJoinAdditional: true
      mindRoles:
      - MindRoleTraitor

- type: entity
  parent: BaseTraitorRule
  id: CalmTraitor # For Dual Antag Gamemodes
  components:
  - type: GameRule
    minPlayers: 30
  - type: AntagSelection
    selectionTime: IntraPlayerSpawn
    definitions:
    - prefRoles: [ Traitor ]
      max: 3
      playerRatio: 15
      blacklist:
        components:
        - CommandStaff
        - AntagImmune
        - Changeling
      lateJoinAdditional: true
      mindRoles:
      - MindRoleTraitor

- type: entity
  parent: Changeling
  id: CalmLing # For Dual Antag Gamemodes
  components:
  - type: GameRule
    minPlayers: 30
  - type: AntagSelection
    selectionTime: IntraPlayerSpawn
    agentName: changeling-roundend-name
    definitions:
    - prefRoles: [ Changeling ]
      max: 2
      playerRatio: 15
      blacklist:
        components:
        - CommandStaff
      lateJoinAdditional: true
      mindRoles:
      - MindRoleTraitor

- type: entity
  parent: BaseNukeopsRule
  id: Calmops # For Dual Antag Gamemodes
  components:
  - type: GameRule
    minPlayers: 30
  - type: LoadMapRule
    mapPath: /Maps/_Trauma/Nonstations/nukieplanet.yml
  - type: AntagSelection
    selectionTime: PrePlayerSpawn
    definitions:
    - prefRoles: [ NukeopsCommander ]
      fallbackRoles: [ Nukeops, NukeopsMedic ]
      spawnerPrototype: SpawnPointNukeopsCommander
      playerRatio: 15
      startingGear: SyndicateCommanderGearFull
      unequipOldGear: true
      components:
      - type: NukeOperative
      - type: RandomMetadata
        nameSegments:
        - NamesSyndicateElite
        nameFormat: name-format-nukie-commander
      - type: NpcFactionMember
        factions:
        - Syndicate
      mindRoles:
      - MindRoleNukeopsCommander
    - prefRoles: [ NukeopsMedic ]
      fallbackRoles: [ Nukeops, NukeopsCommander ]
      spawnerPrototype: SpawnPointNukeopsMedic
      playerRatio: 15
      startingGear: SyndicateOperativeMedicFull
      unequipOldGear: true
      components:
      - type: NukeOperative
      - type: RandomMetadata
        nameSegments:
        - NamesSyndicateElite
        nameFormat: name-format-nukie-agent
      - type: NpcFactionMember
        factions:
        - Syndicate
      - type: SurgerySpeedModifier # shitmed
        speedModifier: 2
      mindRoles:
      - MindRoleNukeopsMedic
    - prefRoles: [ Nukeops ]
      fallbackRoles: [ NukeopsCommander, NukeopsMedic ]
      spawnerPrototype: SpawnPointNukeopsOperative
      max: 10
      playerRatio: 20
      startingGear: SyndicateOperativeGearFull
      unequipOldGear: true
      components:
      - type: NukeOperative
      - type: RandomMetadata
        nameSegments:
        - NamesSyndicateElite
        nameFormat: name-format-nukie-operator
      - type: NpcFactionMember
        factions:
        - Syndicate
      mindRoles:
      - MindRoleNukeops

- type: entity
  id: CalmRevs # For Dual Antag Gamemodes
  parent: BaseGameRule
  components:
  - type: GameRule
    minPlayers: 30
  - type: RevolutionaryRule
  - type: AntagSelection
    selectionTime: IntraPlayerSpawn
    definitions:
    - prefRoles: [ HeadRev ]
      max: 1
      playerRatio: 20
      blacklist:
        components:
        - CommandStaff
      briefing:
        text: head-rev-role-greeting
        color: CornflowerBlue
        sound: "/Audio/Ambience/Antag/headrev_start.ogg"
      startingGear: HeadRevGear
      components:
      - type: Revolutionary
      - type: HeadRevolutionary
      mindRoles:
      - MindRoleHeadRevolutionary

# Blob
- type: entity
  id: BlobRule
  parent: BaseGameRule
  components:
  - type: BlobRule

- type: entity
  id: BlobGameMode
  parent: BlobRule
  components:
  - type: GameRule
    minPlayers: 50
  - type: AntagSelection
    selectionTime: IntraPlayerSpawn
    definitions:
    - prefRoles: [ Blob ]
      allowNonHumans: true
      blacklist:
        components:
        - CommandStaff
        - AntagImmune
      briefing:
        text: blob-carrier-role-greeting
        color: Plum
        sound: /Audio/Announcements/bloblarm.ogg
      mindRoles:
      - MindRoleBlob

- type: entity
  parent: BaseNukeopsRule
  id: Honkops
  components:
  - type: GameRule
    minPlayers: 20
  - type: RandomMetadata # this generates the random operation name cuz it's cool.
    nameSegments:
    - OperationPrefixHonkops
    - OperationSuffixHonkops
    nameFormat: name-format-standard
  - type: NukeopsRule
    localePrefix: "honkops-"
  - type: LoadMapRule
    mapPath: /Maps/_Trauma/Nonstations/nukieplanet-honkops.yml
  - type: AntagSelection
    selectionTime: PrePlayerSpawn
    definitions:
    - prefRoles: [ NukeopsCommander ]
      fallbackRoles: [ Nukeops, NukeopsMedic ]
      spawnerPrototype: SpawnPointNukeopsCommander
      startingGear: SyndicateCommanderGearFullHonkops
      roleLoadout:
      - RoleSurvivalNukieHonkops
      components:
      # clown
      - type: Clumsy
      - type: SleepEmitSound
        snore: /Audio/Voice/Misc/silly_snore.ogg
        interval: 10
      - type: SpeechFontOverride
        font: LDFComicSans
      - type: NukeOperative
      - type: RandomMetadata
        nameSegments:
        - NamesHonkopsPrefix
        - NamesHonkopsElite
        nameFormat: name-format-standard
      - type: NpcFactionMember
        factions:
        - Syndicate
      mindRoles:
      - MindRoleNukeopsCommander
    - prefRoles: [ NukeopsMedic ]
      fallbackRoles: [ Nukeops, NukeopsCommander ]
      spawnerPrototype: SpawnPointNukeopsMedic
      startingGear: SyndicateOperativeMedicFullHonkops
      roleLoadout:
      - RoleSurvivalNukieHonkops
      components:
      - type: NukeOperative
      - type: RandomMetadata
        nameSegments:
        - NamesHonkopsPrefix
        - NamesHonkopsElite
        nameFormat: name-format-standard
      - type: NpcFactionMember
        factions:
        - Syndicate
      - type: SurgerySpeedModifier # shitmed
        speedModifier: 2
      mindRoles:
      - MindRoleNukeopsMedic
    - prefRoles: [ Nukeops ]
      fallbackRoles: [ NukeopsCommander, NukeopsMedic ]
      spawnerPrototype: SpawnPointNukeopsOperative
      max: 5 # Goobstation / 古布空间站 - 没有限制的核特工 # Traumastation / 创伤站——亲爱的领导要求削减核行动人员
      playerRatio: 16 # Goobstation
      startingGear: SyndicateOperativeGearFullHonkops
      roleLoadout:
      - RoleSurvivalNukieHonkops
      components:
      - type: NukeOperative
      - type: RandomMetadata
        nameSegments:
        - NamesHonkopsPrefix
        - NamesHonkopsElite
        nameFormat: name-format-standard
      - type: NpcFactionMember
        factions:
        - Syndicate
      mindRoles:
      - MindRoleNukeops

- type: entity
  parent: BaseGameRule
  id: Devil
  components:
  - type: DevilRule
  - type: GameRule
    minPlayers: 15
  - type: AntagObjectives
    objectives:
    - DevilContractObjective
    - DevilWeightObjective
  - type: AntagSelection
    selectionTime: IntraPlayerSpawn
    agentName: devil-roundend-name
    definitions:
    - prefRoles: [ Devil ]
      max: 1
      playerRatio: 40 # from 20 --> 40 , makes it less likely to spawn (Fuck devils)
      jobBlacklist: [ Chaplain, Mime, ChiefEngineer, ResearchDirector, Quartermaster ] #chaplain is obvious, mime can't write.
      mindRoles:
      - DevilMindRole
      mindComponents: # Trauma - devil is evil
      - type: Evil
      startingGear: DevilStartingGear
