- type: entity
  abstract: true
  id: BaseMidroundAntagRule
  components:
  - type: StationEvent
    earliestStart: 20
    weight: 4
    minimumPlayers: 15
    maxOccurrences: 1
    startAnnouncement: station-event-communication-interception
    startAudio:
      path: /Audio/Announcements/intercept.ogg
    duration: null
    occursDuringRoundEnd: false
  - type: AlertLevelInterceptionRule
  - type: AntagSelection
    selectionTime: RuleStarted
    lateJoinAdditional: true

- type: entity
  parent: [ BaseMidroundAntagRule, Traitor ]
  id: TraitorMidround
  components:
  - type: StationEvent
    earliestStart: 30
    weight: 8
  - type: AntagSelection
    lateJoinAdditional: true
    antags:
    - !type:LinearAntagCount
      proto: TraitorSleeper
      range:
        min: 1
        max: 2
      playerRatio: 10

# Midround Changelings
- type: entity
  parent: [ BaseMidroundAntagRule, Changeling ]
  id: ChangelingMidround
  components:
  - type: AntagSelection
    antags:
    - !type:LinearAntagCount
      proto: Changeling
      range:
        min: 1
        max: 2
      playerRatio: 10

# Midround Heretics
- type: entity
  parent: [ BaseMidroundAntagRule, BaseHereticRule ]
  id: HereticMidround
  components:
  - type: StationEvent
    weight: 3
    minimumPlayers: 30
  - type: AntagSelection
    antags:
    - !type:LinearAntagCount
      proto: HereticMidround
      range:
        min: 1
        max: 2
      playerRatio: 15

# Midround Revolutionaries
- type: entity
  parent: Revolutionary
  id: RevolutionaryMidround
  components:
  - type: StationEvent
    weight: 3
    minimumPlayers: 30
  - type: AntagSelection
    antags:
    - !type:LinearAntagCount
      proto: HeadRev
      range:
        min: 1
        max: 3
      playerRatio: 15

# Skeleton Spawn
- type: entity
  parent: BaseGameRule
  id: SkeletonMidround
  components:
  - type: StationEvent
    weight: 5
    duration: 1
    minimumPlayers: 15
    maxOccurrences: 2
  - type: RandomEntityStorageSpawnRule
    prototype: MobSkeletonCloset

# Blob Midround
- type: entity
  parent: BaseGameRule
  id: BlobMidround
  components:
  - type: GhostroleAlert
  - type: StationEvent
    weight: 1
    earliestStart: 45
    minimumPlayers: 50
    duration: null
    maxOccurrences: 1
  - type: BlobSpawnRule
    carrierBlobProtos:
    - SpawnPointGhostBlobRat
    playersPerCarrierBlob: 30
    maxCarrierBlob: 1

- type: entity
  parent: BaseGameRule
  id: FloorGoblinMidRound
  components:
  - type: StationEvent
    weight: 15
    earliestStart: 15
    minimumPlayers: 15
    maxOccurrences: 2
    duration: 5
  - type: VentHordeRule
    table:
      id: MobFloorGoblin

# Midround Devil
- type: entity
  parent: [ BaseMidroundAntagRule, Devil ]
  id: DevilMidround
  components:
  - type: StationEvent
    weight: 1
    minimumPlayers: 30
  - type: AntagSelection
    antags:
    - !type:FixedAntagCount
      proto: Devil

- type: entity
  parent: BaseAntagGhostRoleRule
  id: TunnelClownMidround
  components:
  - type: StationEvent
    weight: 1
    duration: null
    earliestStart: 15
    minimumPlayers: 20
  - type: AntagSpawner
    prototype: MobHumanTunnelClown
  - type: AntagSelection
    agentName: ghost-role-information-tunnel-clown-name
    antags:
    - !type:FixedAntagCount
      proto: TunnelClown
  - type: MaintsSpawnRule
  - type: AntagObjectives
    objectives:
    - TunnelClownProtectMaintenanceObjective
  - type: AntagPlayerEffects
    effects:
    - !type:NestedEffect
      proto: ChangelingSkills

- type: entity
  parent: BaseAntagGhostRoleRule
  id: SingulothKnightsMidround
  components:
  - type: StationEvent
    weight: 0.5
    duration: null
    earliestStart: 45
    minimumPlayers: 50
  - type: AntagSpawner
    prototype: MobHumanSingulothKnight
  - type: AntagSelection
    agentName: ghost-role-information-Singuloth-Knight-name
    antags:
    - !type:FixedAntagCount
      proto: SingulothKnight
      count: 3
  - type: AntagRandomSpawn
  - type: AntagObjectives
    objectives:
    - SingulothKnightPreachObjective
    - SingulothKnightSingularityObjective
    - SingulothKnightTeslaObjective
  - type: AntagPlayerEffects
    effects:
    - !type:NestedEffect
      proto: HereticSkills

