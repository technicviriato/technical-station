- type: reagent
  id: Fentanyl
  name: reagent-name-fentanyl
  group: Narcotics
  desc: reagent-desc-fentanyl
  flavor: fentanyl
  physicalDesc: reagent-physical-desc-murky
  contrabandSeverity: Major
  color: "#6e697d"
  metabolisms:
    Bloodstream:
      metabolismRate: 0.05
      effects:
      # Main effects
      - !type:EvenHealthChange
        damage:
          Brute: -1
      - !type:HealthChange
        damage:
          types:
            Heat: -0.5
            Shock: -0.5
            Cold: -0.5
            Radiation: -0.5
      - !type:HealthChange
        damage:
          types:
            Poison: 0.25
      - !type:HealthChange # When overdosing
        conditions:
        - !type:ReagentCondition
          reagent: Fentanyl
          min: 5
        damage:
          types:
            Poison: 0.25 # effectively 10 poison/u
            Asphyxiation: 0.75 # more damage, but easier to treat, will rapidly kill in crit probably?
      - !type:HealthChange # More overdose damage
        conditions:
        - !type:ReagentCondition
          reagent: Fentanyl
          min: 5
        probability: 0.05
        damage:
          types:
            Slash: 1 # clawing at your own skin

      # Side effects
      - !type:PopupMessage # the usual hallucinations
        type: Local
        visualType: Medium
        messages: ["fentanyl-effect-lostsomething","fentanyl-effect-skincrawl","fentanyl-effect-fakepresence","fentanyl-effect-rushing","fentanyl-effect-giddy"]
        probability: 0.05
      - !type:PopupMessage # when you're really tripping balls
        conditions:
        - !type:ReagentCondition
          reagent: Fentanyl
          min: 5
        type: Local
        visualType: Medium
        messages: ["fentanyl-effect-skinworms","fentanyl-effect-breathingrazors","fentanyl-effect-lungstight","fentanyl-effect-observed"]
        probability: 0.05
      - !type:ModifyStatusEffect # you didn't think this would improve your abilities right?
        effectProto: FentanylSlowdownStatusEffect
      - !type:GenericStatusEffect
        key: Stutter
        component: StutteringAccent
      - !type:Jitter
      - !type:ModifyParalysis # loss of muscle control
        probability: 0.05
        time: 2
      - !type:ModifyParalysis # more severe effects when you are overdosing
        conditions:
        - !type:ReagentCondition
          reagent: Fentanyl
          min: 5
        probability: 0.05
        time: 4
      - !type:ModifyStatusEffect # tripping balls, duh
        effectProto: StatusEffectSeeingRainbow
        type: Add
        time: 20
      - !type:Drunk
        boozePower: 10
      - !type:Emote # Now a bunch of emotes
        emote: Scream
        probability: 0.05

- type: reagent
  id: BlindToxin
  name: reagent-name-blind-toxin
  group: Narcotics
  desc: reagent-desc-blind-toxin
  physicalDesc: reagent-physical-desc-syrupy
  color: "#000000"
  boilingPoint: 255.0
  meltingPoint: 36.0
  metabolisms:
    Bloodstream:
      effects:
      - !type:ModifyStatusEffect
        effectProto: StatusEffectBlindness
        type: Add
        time: 3

- type: reagent
  id: Amnestizine
  name: reagent-name-amnestizine
  group: Narcotics
  desc: reagent-desc-amnestizine
  physicalDesc: reagent-physical-desc-milky
  color: "#FFF1DE"
  boilingPoint: 255.0
  meltingPoint: 36.0
  metabolisms:
    Bloodstream:
      metabolismRate: 0.05
      effects:
      - !type:GenericStatusEffect
        key: Dementia
        component: DementiaAccent
      - !type:GenericStatusEffect
        key: Stutter
        component: StutteringAccent
      - !type:TakeStaminaDamage
        amount: 7
        immediate: false
      - !type:PopupMessage
        visualType: MediumCaution
        type: Local
        messages: # Flavor text, you're supposed to forget what's happening.
        - amnestizine-effect-forget
        - amnestizine-effect-hole
        - amnestizine-effect-blank
        - amnestizine-effect-distracted
        - amnestizine-effect-widen
        - amnestizine-effect-soul
        - amnestizine-effect-peaceful
        - amnestizine-effect-leave
        - amnestizine-effect-listen
        conditions:
        - !type:ReagentCondition
          reagent: Amnestizine
          min: 1
        probability: 0.35
      - !type:GenericStatusEffect # You can't remember how to fire a gun, or swing a sword.
        key: Pacified
        component: Pacified
        type: Add
        time: 4
      - !type:ModifyStatusEffect # You can't quite remember how to walk properly.
        conditions:
        - !type:ReagentCondition
          reagent: Amnestizine
          min: 4
        effectProto: AmnestizineSlowdownStatusEffect
      - !type:ModifyStatusEffect
        conditions:
        - !type:ReagentCondition
          reagent: Amnestizine
          min: 10
        effectProto: StatusEffectBlindness
        type: Add
        time: 2
      - !type:Jitter
        conditions:
        - !type:ReagentCondition
          reagent: Amnestizine
          min: 15
      - !type:HealthChange
        damage:
          types:
            Poison: 0.25
            Asphyxiation: 0.25
        conditions:
        - !type:ReagentCondition
          reagent: Amnestizine
          min: 15
      - !type:HealthChange
        damage:
          types:
            Cellular: 1
            Asphyxiation: 1
        conditions:
        - !type:ReagentCondition
          reagent: Amnestizine
          min: 30
      - !type:Flammable
        multiplier: 0.3
      - !type:ModifyParalysis
        probability: 0.05
        time: 2
  reactiveEffects:
    Flammable:
      methods: [ Touch ]
      effects:
      - !type:Flammable
        multiplier: 0.4

# Homemade hyperzine, should be worse than it and harder to make, but
# doesn't require vestine. Should NOT be addictive when we get addictions
- type: reagent
  id: Aranesp
  name: reagent-name-aranesp
  group: Narcotics
  desc: reagent-desc-aranesp
  physicalDesc: reagent-physical-desc-oily
  flavor: oily
  color: "#75fff5"
  metabolisms:
    Bloodstream:
      metabolismRate: 1
      effects:
      - !type:ModifyStatusEffect
        effectProto: AranespStatusEffect
      - !type:ModifyParalysis
        time: 3
        type: Remove
      - !type:ModifyKnockdown
        time: 3
        type: Remove
      - !type:ModifyStatusEffect
        effectProto: StatusEffectDrowsiness
        type: Remove
      - !type:GenericStatusEffect
        key: Adrenaline
        component: IgnoreSlowOnDamage
        time: 5
      - !type:TakeStaminaDamage
        amount: -5
        immediate: true
      - !type:RemoveComponents
        components:
        - type: DelayedKnockdown
        guidebookText: entity-effect-guidebook-remove-delayed-knockdown

      - !type:ResetNarcolepsy

      # Side effects
      - !type:HealthChange
        damage:
          types:
            Asphyxiation: 0.5
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Aranesp
          min: 50
        damage:
          types:
            Poison: 3
      - !type:Emote
        emote: Gasp
        probability: 0.1

- type: reagent
  id: MouseBites
  name: reagent-name-mousebites
  group: Narcotics
  desc: reagent-desc-mousebites
  physicalDesc: reagent-physical-desc-oily
  flavor: oily
  color: "#ffaa00"
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types:
            Cellular: -0.2
      - !type:Polymorph
        prototype: MouseSentient
        conditions:
        - !type:ReagentCondition
          reagent: MouseBites
          min: 50 # raised because mouse retaliation is now a thing
      - !type:AdjustReagent
        reagent: MouseBites
        amount: -20
        conditions:
        - !type:ReagentCondition
          reagent: MouseBites
          min: 50 # keep it the same as above
      - !type:PopupMessage
        conditions:
        - !type:ReagentCondition
          reagent: MouseBites
          min: 5
        type: Local
        visualType: Medium
        messages: [ "mousebites-effects-vexes", "mousebites-effects-stupid", "mousebites-effects-metoo" ]
        probability: 0.10

