- type: reagent
  id: Stasizium
  name: reagent-name-stasizium
  group: Medicine
  desc: reagent-desc-stasizium
  physicalDesc: reagent-physical-desc-stasizium
  flavor: futuristic
  color: "#8364BE"
  worksOnTheDead: true
  metabolisms:
    Bloodstream:
      effects:
      - !type:ModifyBloodLevel
        amount: 10
      - !type:ModifyBleed
        amount: -2
      - !type:ReduceRotting
        seconds: 30
        conditions:
        - !type:MobStateCondition
          mobstate: Dead
      - !type:EvenHealthChange
        damage:
          Brute: -20
          Burn: -20
          Airloss: -20
          Toxin: -20
          Genetic: -20
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Stasizium
          min: 21
        damage:
          types:
            Blunt: 100
      - !type:AdjustTemperature
        conditions:
        - !type:TemperatureCondition
          min: 263.15
        amount: -50000

- type: reagent
  id: LingPanacea
  name: reagent-name-panacea
  group: Medicine
  desc: reagent-desc-panacea
  physicalDesc: reagent-physical-desc-ling
  flavor: clean
  color: "#ff0000"
  metabolisms:
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types:
            Poison: -3
            Cellular: -3
            Radiation: -3
      - !type:PopupMessage
        type: Local
        messages: [ "reagent-popup-panacea" ]
        probability: 0.2
      - !type:AdjustReagent
        reagent: Pax
        amount: -7.5
      - !type:AdjustReagent
        reagent: BZ
        amount: -7.5
      - !type:GenericStatusEffect
        key: Jitter
        time: 10.0
        type: Remove
      - !type:ModifyStatusEffect
        effectProto: StatusEffectSeeingRainbow
        time: 10.0
        type: Remove
      - !type:ModifyStatusEffect
        effectProto: StatusEffectDrunk
        time: 10
        type: Remove
      - !type:EyeDamage
      - !type:RemoveComponents
        components:
        - type: PermanentBlindness
        - type: Narcolepsy
          # chud shit
          maxTimeBetweenIncidents: 0
          minTimeBetweenIncidents: 0
          minDurationOfIncident: 0
          maxDurationOfIncident: 0
        - type: Unrevivable # i don't think this really affects lings, but might aswell to be safe
        - type: Muted
        - type: Paracusia
          # chud shit
          minTimeBetweenIncidents: 0.1
          maxTimeBetweenIncidents: 300
          maxSoundDistance: 7
          sounds:
            collection: Paracusia
        - type: PainNumbness
        - type: LegsParalyzed
        guidebookText: entity-effect-guidebook-removes-disabilities

- type: reagent
  id: LingAdrenaline
  name: reagent-name-lingdrenaline
  group: Medicine
  desc: reagent-desc-lingdrenaline
  physicalDesc: reagent-physical-desc-ling
  flavor: clean
  color: "#ff0000"
  worksOnTheDead: true
  metabolisms:
