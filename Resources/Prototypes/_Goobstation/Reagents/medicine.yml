      effects:
      - !type:AdjustReagent
        reagent: ChloralHydrate
        amount: -10.0
      - !type:AdjustReagent
        reagent: NitrousOxide
        amount: -10.0
      - !type:AdjustReagent
        reagent: Nocturine
        amount: -10.0
      - !type:GenericStatusEffect
        key: Stutter
        component: StutteringAccent
      - !type:Jitter
      - !type:ModifyParalysis
        time: 5
        type: Remove
      - !type:ModifyKnockdown
        time: 10
        type: Remove
      - !type:ModifyStatusEffect
        effectProto: StatusEffectDrowsiness
        time: 10
        type: Remove
      - !type:ModifyStatusEffect
        effectProto: StatusEffectForcedSleeping
        time: 10
        type: Remove
      - !type:GenericStatusEffect
        key: Adrenaline
        component: IgnoreSlowOnDamage
        time: 2
      - !type:RemoveComponents
        components:
        - type: DelayedKnockdown
        guidebookText: entity-effect-guidebook-remove-delayed-knockdown
      - !type:PopupMessage
        type: Local
        messages: [ "reagent-popup-lingdrenaline" ]
        probability: 0.2
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: LingAdrenaline
          min: 5.01
        damage:
          types:
            Poison: 1.35 # 6.75 toxin damage per inject if used directly after cooldown (47.25 if used 4 times)

# Normal, but little gimmicky meds

- type: reagent
  id: Probital
  name: reagent-name-probital
  group: Medicine
  desc: reagent-desc-probital
  physicalDesc: reagent-physical-desc-soothing
  flavor: medicine
  color: "#ffff64"
  metabolisms:
    Bloodstream:
      effects:
      - !type:EvenHealthChange
        damage:
          Brute: -1.5 # Lower than Bicardine, offloading healing onto mitotrophin
      - !type:TakeStaminaDamage
        conditions:
        - !type:ReagentCondition
          reagent: Probital
          min: 20
        amount: 5 # effectively 3 "sleeps" per 20OD, but only 1 on 10 (like with 2 syringes)
        immediate: false
      - !type:ModifyStatusEffect # kinda sleepiness
        conditions:
        - !type:StaminaDamageCondition
          min: 80
        - !type:ReagentCondition
          reagent: Probital
          min: 20
        effectProto: ProbitalSlowdownStatusEffect
      - !type:GenericStatusEffect
        conditions:
        - !type:StaminaDamageCondition
          min: 80
        - !type:ReagentCondition
          reagent: Probital
          min: 20
        key: Stutter
        component: StutteringAccent
      - !type:ModifyStatusEffect # go to sleep once cycle elapses
        conditions:
        - !type:StaminaDamageCondition
          min: 100
        - !type:ReagentCondition
          reagent: Probital
          min: 20
        effectProto: StatusEffectForcedSleeping
        type: Add
        time: 10
      - !type:TakeStaminaDamage
        conditions:
        - !type:StaminaDamageCondition
          min: 100
        - !type:ReagentCondition
          reagent: Probital
          min: 20
        amount: -100 # power nap
        immediate: true
      - !type:AdjustReagent
        reagent: Mitogen
        amount: 0.125 # 1.25 per 5u

