# Externally applied meds

- type: reagent
  id: Synthflesh
  name: reagent-name-synthflesh
  desc: reagent-desc-synthflesh
  physicalDesc: reagent-physical-desc-pulpy
  flavor: strange
  color: "#ffbebe"
  plantMetabolism:
    - !type:PlantAdjustWeeds
      amount: 10
    - !type:PlantAdjustHealth
      amount: 10
  worksOnTheDead: true
  reactiveEffects:
    Acidic:
      methods: [ Touch ]
      effects:
      - !type:HealthChange
        scaling: true
        ignoreResistances: false
        ignoreBlockers: false
        damage: #1/4th of the brute healing of Styptic Powder and 1/4th the burn healing of Silver Sulfide, so 1/2 of the overall healing of either chem
          types:
            Blunt: -0.5
            Piercing: -0.25
            Slash: -0.5
            Heat: -0.38
            Cold: -0.38
            Shock: -0.25
            Caustic: -0.25
        conditions:
        - !type:NestedCondition
          proto: NoPressureProtection
      - !type:ModifyBleed
        amount: -2
        conditions:
        - !type:NestedCondition
          proto: NoPressureProtection

