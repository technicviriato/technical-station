- type: entity
  abstract: true
  parent: BaseItem
  id: BaseSlimeExtract
  name: slime extract
  description: Goo extracted from a slime. Legends claim these to have "magical powers".
  components:
  - type: Item
    size: Small
  - type: Sprite
    layers:
    - sprite: _Goobstation/Xenobiology/Specific/Xenobiology/extract.rsi
      state: core
      color: "#828282"
  - type: Appearance
  - type: Solution
    id: extract
    solution:
      maxVol: 100
  - type: InjectableSolution
    solution: extract
  - type: DrawableSolution
    solution: extract
  - type: ExaminableSolution
    solution: extract
  - type: SlimeExtract
  - type: Reactive
    scaleOverride: 1 # don't light someone on fire 20x as hard if injecting 20u
  - type: StatusEffects # used for jittering and stuff
    allowed:
    - Jitter
  - type: GuideHelp
    guides:
    - Xenobiology
