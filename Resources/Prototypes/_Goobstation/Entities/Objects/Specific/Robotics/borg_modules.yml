- type: entity
  id: BorgModuleSyndicateWeaponAdvanced
  parent: [ BaseBorgModule, BaseProviderBorgModule, BaseSyndicateContraband ]
  name: advanced weapon cyborg module
  components:
  - type: Sprite
    layers:
    - state: syndicate
    - state: icon-syndicate
  - type: ItemBorgModule
    hands:
    - item: WeaponPistolAnaconda
    - item: EnergySword
  - type: BorgModuleIcon
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: syndicate-weapon-module }

- type: entity
  id: BorgModuleLollypop
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: lollypop cyborg module
  components:
  - type: Sprite
    layers:
    - state: generic
    - state: icon-lollypop
      sprite: _Goobstation/Objects/Specific/Robotics/borgmodule.rsi
  - type: ItemBorgModule
    hands:
    - item: LauncherLollypopRegenerating
    - item: LauncherLollypopRegeneratingTricordazine
    - item: LauncherLollypopRegeneratingMystery # I <3 GAMBLING
  - type: BorgModuleIcon
    icon: { sprite: _Goobstation/Actions/actions_borg.rsi, state: lollypop-module }

- type: entity
  id: BorgModulePKA
  parent: [ BaseBorgModuleCargo, BaseProviderBorgModule ]
  name: proto-kinetic cyborg module
  components:
  - type: Sprite
    layers:
    - state: cargo
    - state: icon-pka
      sprite: _Goobstation/Objects/Specific/Robotics/borgmodule.rsi
  - type: ItemBorgModule
    hands:
    - item: WeaponProtoKineticAccelerator # Goob
      hand:
        emptyRepresentative: BorgModulePKAPlaceholder
        emptyLabel: borg-slot-pka-empty
        whitelist:
          components:
          - PressureDamageChange
  - type: BorgModuleIcon
    icon: { sprite: Objects/Weapons/Guns/Basic/kinetic_accelerator.rsi, state: icon }
