# Q - Why is this edible?
# A - Because the dispenser reminded me of a pez dispenser, and it'd be funny if you could eat them.
- type: entity
  name: amnestic autoinjector cartridge
  parent: [ BaseCentcommContraband , BaseAutoinjectorCartridge, FoodBase ]
  description: Contains 10u of dimtremethic-neuramincyl acid, used in a cartridge autoinjector.
  id: CartridgeAmnestic
  components:
  - type: Sprite
    layers:
    - state: base
    - state: filling
      color: "#FAF9F6"
  - type: SolutionCartridge
    solutionName: food
  - type: Solution
    solution:
      reagents:
      - ReagentId: Amnestizine
        Quantity: 10
  - type: Edible
    delay: 0.2
    forceFeedDelay: 1.5
    transferAmount: null
    edible: Pill
  - type: BadFood
  - type: FlavorProfile
    ignoreReagents: [ ]

# Medipens

- type: entity
  name: futuristic medipen
  parent: ChemicalMedipen
  id: StasiziumAutoInjector
  suffix: DO NOT MAP
  description: A dose of medicinal substances from the future that can raise even the dead to their feet.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Specific/Medical/stasipen.rsi
    layers:
    - state: stasipen
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: stasipen_empty
  - type: Solution
    solution:
      maxVol: 10
      reagents:
      - ReagentId: Stasizium
        Quantity: 10

- type: entity
  name: centcomm advanced stimulant
  parent: [ChemicalMedipen, BaseCentcommContraband]
  id: CentcommStimpack
  suffix: DO NOT MAP
  description: According to a Nanotrasen funded study, it has zero addictive properties.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Specific/Medical/medipen.rsi
    layers:
    - state: ntstimpen
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: Solution
    solution:
      maxVol: 50
      reagents:
      - ReagentId: Stimulants
        Quantity: 25
      - ReagentId: Ichor
        Quantity: 10
      - ReagentId: Dylovene
        Quantity: 15
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: ntstimpen_empty
  - type: StaticPrice
    price: 500

- type: entity
  name: biohazard medipen
  parent: ChemicalMedipen
  id: AmbuzolMedipen
  suffix: DO NOT MAP
  description: A safe and effective way to treat infections. Does not prevent re-infection.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Specific/Medical/medipen.rsi
    layers:
    - state: ambuzolpen
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: ambuzolpen_empty
  - type: Solution
    solution:
      maxVol: 15
      reagents:
      - ReagentId: Ambuzol
        Quantity: 10
      - ReagentId: Ultravasculine
        Quantity: 5
  - type: Tag
    tags:
    - Medipen
    - EmergencyMedipen

- type: entity
  name: advanced biohazard medipen
  parent: ChemicalMedipen
  id: AmbuzolPlusMedipen
  suffix: DO NOT MAP
  description: A safer and extremely effective way to treat any infections. Prevents re-infection.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Specific/Medical/medipen.rsi
    layers:
    - state: ambuzolpluspen
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: ambuzolpen_empty
  - type: Solution
    solution:
      maxVol: 20
      reagents:
      - ReagentId: AmbuzolPlus
        Quantity: 5
      - ReagentId: Diphenhydramine
        Quantity: 15
  - type: Tag
    tags:
    - Medipen
    - EmergencyMedipen

# Actual hyposprays

- type: entity
  parent: [BaseHypospray, BaseCentcommContraband]
  id: CentCommHypo
  name: centcomm hypospray
  description: Reserved for Nanotrasen's top doctors. It utilizes experimental bluespace technology.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Specific/Medical/centcomm_hypo.rsi
    state: hypo
  - type: Item
    sprite: _Goobstation/Objects/Specific/Medical/centcomm_hypo.rsi
  - type: Solution
    solution:
      maxVol: 100
  - type: IgnoreHypoport
  - type: UseDelay
    delay: 0.2
