- type: entityTable
  id: FishingScrapLootTable
  table: !type:GroupSelector
    children:
    # 75% chance of scrap of some kind
    - !type:GroupSelector
      weight: 75
      children:
      - !type:NestedSelector
        tableId: SalvageScrapLowValue
        weight: 65
      - !type:NestedSelector
        tableId: SalvageScrapHighValue
        weight: 35
    # 15% chance of some trash
    - !type:NestedSelector
      tableId: GenericTrashItems
      weight: 15
    # 9% chance of low-value treasure or maintenance tools
    - !type:GroupSelector
      weight: 9
      children:
      - !type:NestedSelector
        tableId: SalvageTreasureCommon
      - !type:NestedSelector
        tableId: MaintToolsTable
    # 9% chance of low-value treasure or maintenance tools
    - !type:GroupSelector
      weight: 1
      children:
      - id: FishingRodGolden
    # 1% Chance of golden rod

# Items from Water
- type: entityTable
  id: WaterFishingLootTable
  table: !type:GroupSelector
    children:
      - !type:NestedSelector
        tableId: CommonFishTable
        weight: 7
      - !type:NestedSelector
        tableId: RareFishTable
        weight: 1
      - !type:NestedSelector
        tableId: FishingScrapLootTable
        weight: 1
      - !type:NestedSelector
        tableId: HostileFishTableWater
        weight: 1

# Items from Lava
- type: entityTable
  id: LavaFishingLootTable
  table: !type:GroupSelector
    children:
      - !type:NestedSelector
        tableId: FishingScrapLootTable
        weight: 5
      - !type:NestedSelector
        tableId: FishingOreCrabTable
        weight: 3
      - !type:NestedSelector
        tableId: LavaLandHostile
        weight: 1
      - !type:NestedSelector
        tableId: PreciousMetals
        weight: 2

# Items from Plasma
- type: entityTable
  id: PlasmaFishingLootTable
  table: !type:GroupSelector
    children:
      - !type:NestedSelector
        tableId: FishingScrapLootTable # Make this one better
        weight: 5
      - !type:GroupSelector
        weight: 5
        children:
        - id: MobPlasmamanRandom

# Items from Toilets
- type: entityTable
  id: ToiletFishingLootTable
  table: !type:GroupSelector
    children:
      - !type:NestedSelector
        tableId: HostileFishTableWater
        weight: 4
      - !type:NestedSelector
        tableId: GrossTable
        weight: 5
      - !type:NestedSelector
        tableId: CommonFishTable
        weight: 1
