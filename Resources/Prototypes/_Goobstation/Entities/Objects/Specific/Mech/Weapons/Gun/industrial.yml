- type: entity
  id: WeaponMechIndustrialKineticAccelerator
  name: proto-kinetic launcher
  description: Fires huge damage kinetic bolts at a medium range.
  suffix: Mech Weapon, Gun, Industrial, Kinetic Accelerator
  parent: [ BaseMechWeaponRange, IndustrialMechEquipment ]
  components:
  - type: Sprite
    sprite: Objects/Specific/Mech/mecha_equipment.rsi
    state: mecha_kineticgun
  - type: Gun
    fireRate: 0.5
    selectedMode: SemiAuto
    availableModes:
      - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/kinetic_accel.ogg
    projectileSpeed: 25
  - type: BatteryAmmoProvider
    proto: BulletKineticShuttle
    fireCost: 0.1
  - type: Appearance
  - type: AmmoCounter
  - type: PressureDamageChange
  - type: PressureEfficiency
  - type: UpgradeableWeapon
    maxUpgradeCapacity: 40
  - type: ContainerContainer
    containers:
      upgrade_slot_1: !type:ContainerSlot
  - type: ItemSlots
    slots:
      upgrade_slot_1:
        name: weapon-upgrade-slot-name-first
        swap: false # can't use the swap...
        priority: 1
        insertDelay: 1.2
        ejectDelay: 0.9
        whitelist:
          tags:
          - PKAUpgrade
