- type: entity
  parent: FoodBoxPizza
  id: FoodBoxPizzaBomb
  name: pizza box
  suffix: Bomb
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Bombs/pizzabomb.rsi
    layers:
    - state: box
      map: ["enum.StorageVisualLayers.Base"]
    - state: box-open
      map: ["enum.StorageVisualLayers.Door"]
  - type: TimerTrigger
    delay: 0.5
    examinable: false
    initialBeepDelay: 0
    beepSound: /Audio/Machines/microwave_done_beep.ogg
  - type: TriggerOnOpenStorage
  - type: ExplodeOnTrigger
    keysIn: [ timer ]
  - type: Explosive # Weak explosion in a very small radius. Doesn't break underplating.
    explosionType: Default
    totalIntensity: 130
    intensitySlope: 10
    maxIntensity: 10
    canCreateVacuum: false
