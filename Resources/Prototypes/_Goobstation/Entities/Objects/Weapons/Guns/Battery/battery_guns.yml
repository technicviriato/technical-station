    sprite: _Goobstation/Objects/Weapons/Guns/Battery/energy_rifle.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Item
    sprite: _Goobstation/Objects/Weapons/Guns/Battery/energy_rifle.rsi
    size: Large
  - type: Clothing
    sprite: _Goobstation/Objects/Weapons/Guns/Battery/energy_rifle.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: MagazineVisuals
    magState: mag
