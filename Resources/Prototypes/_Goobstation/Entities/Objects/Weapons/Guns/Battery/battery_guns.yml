        insertSound: /Audio/Weapons/Guns/MagIn/revolver_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/revolver_magout.ogg
        whitelist:
          tags:
            - EnergyMagAmmo

- type: entity
  name: Lawbringer
  parent: [BaseWeaponBatterySmall, BaseGrandTheftContraband]
  id: WeaponEnergyGunLawbringer
  description: A versatile energy gun, with many different modes. The owner of this gun embodies the law itself.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Guns/Battery/lawbringer.rsi
    layers:
    - state: icon
      map: ["enum.GunVisualLayers.Base"]
  - type: Clothing
    quickEquip: false
    slots:
    - suitStorage
    - belt
    sprite: _Goobstation/Objects/Weapons/Guns/Battery/lawbringer.rsi
  - type: Gun
    soundGunshot:
      path: /Audio/_DV/Weapons/Guns/Gunshots/laser.ogg
    soundEmpty:
      path: /Audio/_DV/Weapons/Guns/Empty/dry_fire.ogg
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: BatteryAmmoProvider
    proto: BulletDetain
    fireCost: 80
  - type: AmmoSelector
    prototypes:
    - BulletEnergyGunClownshot
    - BulletEnergyGunPulse
    - BulletEnergyGunDetain
    - BulletEnergyGunExecute
    - BulletEnergyGunHotshot
    - BulletEnergyGunSleepshot
    - BulletEnergyGunLawyershot
  - type: UserInterface
    interfaces:
      enum.AmmoSelectorUiKey.Key:
        type: AmmoSelectorMenuBoundUserInterface
  - type: ActivatableUI
    inHandsOnly: true
    key: enum.AmmoSelectorUiKey.Key
  - type: ItemToggle
    activated: true
    onActivate: false
    onUse: false
    wieldToggle: false
  - type: ItemToggleColor
  - type: Appearance
  - type: ToggleableVisuals
    spriteLayer: Firemode
    inhandVisuals:
      left:
      - state: mode-inhand-left
        shader: unshaded
      right:
      - state: mode-inhand-right
        shader: unshaded
  - type: Tag
    tags:
    - HighRiskItem
    - Sidearm
    - WeaponEnergyGunLawbringer
  - type: StealTarget
    stealGroup: WeaponEnergyGunLawbringer
  - type: RestrictById
    restrictMelee: true
    restrictRanged: true
    isEmaggable: true
  - type: StaticPrice
    price: 750
  - type: TriggerOnVoice
    showVerbs: false
    keyPhrase: "I AM THE LAW"
    listenRange: 1
  - type: AccessTriggerCondition # need hos access to explode it
  - type: HoldingTriggerCondition # need to be holding it to explode it so chuddies cant run up to you and boom
  - type: AccessReader
    access: [['HeadOfSecurity']]
  - type: ActiveListener
  - type: ExplodeOnTrigger
  - type: EntityEffectOnTrigger
    targetUser: true
    effects:
    - !type:DropItems
  - type: Explosive
    explosionType: Default
    maxIntensity: 2
    intensitySlope: 1
    totalIntensity: 2
    canCreateVacuum: false
    deleteAfterExplosion: false
    repeatable: true
  - type: BatterySelfRecharger
    autoRechargeRate: 50
    autoRechargePauseTime: 40

