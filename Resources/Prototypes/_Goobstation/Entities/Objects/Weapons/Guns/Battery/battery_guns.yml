      shader: unshaded
  - type: Item
    sprite: _Goobstation/Objects/Weapons/Guns/Battery/ion_rifle.rsi
    size: Large
  - type: Appearance
  - type: Clothing
    sprite: _Goobstation/Objects/Weapons/Guns/Battery/ion_rifle.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: false
  - type: Gun
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
