  id: BaseMilitaryPowerCellSMG
  abstract: true
  parent: BaseMilitaryPowerCell
  components:
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: BatteryDrinkerSource
    maxAmount: 200
