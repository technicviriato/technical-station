- type: entity
  parent: [GrenadeBase, BaseSyndicateContraband, TimerGrenadeBase]
  id: BeeGrenade
  name: Beenade
  description: Not the bees!!!
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Weapons/Grenades/beenades.rsi
    layers:
    - state: icon
      map: ["enum.TriggerVisualLayers.Base"]
  - type: ScatteringGrenade
    fillPrototype: MobSyndieAngryBee
    capacity: 5
  - type: TimerTrigger
    beepSound:
      path: "/Audio/_Goobstation/Effects/Grenades/beenade_buzz.ogg"
      params:
        volume: 5
    initialBeepDelay: 0
    beepInterval: 0.5
  - type: EmitSoundOnTrigger
    sound:
      path: "/Audio/Machines/door_lock_off.ogg"
  - type: ContainerContainer
    containers:
      cluster-payload: !type:Container
  - type: Construction
    graph: BeeGrenadeGraph
    node: start
    deconstructionTarget: null
