- type: entity
  id: JetpackChrono
  parent: BaseJetpack
  name: futuristic jetpack
  description: Magnetically attached jetpack that holds extreme amount of gas. It is used as an oxygen cylinder.
  components:
  - type: Item
    sprite: _Goobstation/Objects/Tanks/chronojet.rsi
  - type: Sprite
    sprite: _Goobstation/Objects/Tanks/chronojet.rsi
  - type: Clothing
    sprite: _Goobstation/Objects/Tanks/chronojet.rsi
    slots:
      - suitStorage
  - type: GasTank
    releasePressure: 1
    air:
      volume: 1000
      temperature: 1
      moles:
        Oxygen: 10000
        Nitrogen: 10000
  - type: Jetpack
    moleUsage: 0.00002
  - type: MovementSpeedModifier
    weightlessAcceleration: 1.5
    weightlessFriction: 1
    weightlessModifier: 2.5

- type: entity
  id: JetpackChronoUnremoveable
  parent: JetpackChrono
  suffix: Unremoveable
  components:
  - type: Unremoveable

#Empty contractor
- type: entity
  id: JetpackContractor
  parent: BaseJetpack
  name: contractor's jetpack
  suffix: Empty
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Tanks/contractorpack.rsi
  - type: Clothing
    sprite: _Goobstation/Objects/Tanks/contractorpack.rsi
    slots:
      - Back
      - suitStorage
  - type: Item
    sprite: _Goobstation/Objects/Tanks/contractorpack.rsi
    size: Normal

# Filled contractor
- type: entity
  id: JetpackContractorFilled
  parent: JetpackContractor
  name: contractor's jetpack
  suffix: Filled
  components:
  - type: GasTank
    releasePressure: 18.2
    air:
      volume: 5
      temperature: 293.15
      moles:
        Oxygen: 2.05137905
