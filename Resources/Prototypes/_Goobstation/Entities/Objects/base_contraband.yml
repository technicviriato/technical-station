- type: entity
  id: BaseSecurityMedicalContraband
  parent: BaseRestrictedContraband
  abstract: true
  components:
  - type: Contraband
    allowedDepartments: [ Security, Medical ]

- type: entity
  id: BaseWardenContraband
  parent: BaseRestrictedContraband
  abstract: true
  components:
  - type: Contraband
    allowedJobs: [ Warden ]

- type: entity
  id: BaseSecurityEngineeringCargoContraband #exists for combat gloves
  parent: BaseRestrictedContraband
  abstract: true
  components:
  - type: Contraband
    allowedDepartments: [ Security, Engineering, Cargo ]

# non-stealth syndicate stuff that can't be scanned by the NTR
- type: entity
  id: BaseSyndicateAnchoredContraband
  abstract: true
  components:
  - type: Contraband
    severity: Syndicate
