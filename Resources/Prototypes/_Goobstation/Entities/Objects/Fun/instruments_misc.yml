    sprite: _Goobstation/Objects/Fun/crew_cassette_player.rsi
  - type: Item
    sprite: _Goobstation/Objects/Fun/crew_cassette_player.rsi
  - type: Clothing
    sprite: _Goobstation/Objects/Fun/crew_cassette_player.rsi

- type: entity
