   #Goobstation
- type: entity
  parent: [BaseHandheldInstrument, Clothing]
  id: BaseCassette
  abstract: true
  components:
  - type: Instrument
    program: 62
  - type: SwappableInstrument
    instrumentList:
      "Synth": { 62: 0 }
      "Friend": { 2: 0 }
      "Overdriven": { 29: 0 }
  - type: Sprite
    state: icon
  - type: Item
    size: Small
  - type: Clothing
    quickEquip: false
    slots:
    - neck
  - type: ActivatableUI
    inHandsOnly: false

- type: entity
  parent: [BaseCassette, BaseSyndicateContraband]
  id: BloodredCassette
  name: bloodred cassette player
  description: The least subtle way to enjoy your favorite tunes.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Fun/bloodred_cassette_player.rsi
  - type: Item
    sprite: _Goobstation/Objects/Fun/bloodred_cassette_player.rsi
  - type: Clothing
    sprite: _Goobstation/Objects/Fun/bloodred_cassette_player.rsi

- type: entity
