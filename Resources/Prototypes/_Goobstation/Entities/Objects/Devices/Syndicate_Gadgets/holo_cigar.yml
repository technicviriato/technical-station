- type: entity
  parent: [ BaseItem, BaseSyndicateContraband ]
  id: HoloCigar
  name: holo-cigar
  description: A sleek electronic cigar imported straight from Sol. You feel badass merely glimpsing it...
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Devices/holocigar.rsi
    state: icon
    scale: 0.8, 0.8
  - type: Clothing
    sprite: Objects/Consumable/Smokeables/Cigars/cigar.rsi
    slots: [ mask ]
    equippedPrefix: unlit
  - type: Item
    size: Tiny
    sprite: Objects/Consumable/Smokeables/Cigars/cigar.rsi
    heldPrefix: unlit
  - type: Appearance
  - type: BurnStateVisuals
  - type: HoloCigar
  - type: ClothingGrantComponent
    component:
    - type: TheManWhoSoldTheWorld
  # IF YOU GIVE IT ACTUAL FUNCTIONALITY, MAKE SURE TO NERF THE PRICE AND REMOVE FROM CIG VENDOR!!!

- type: entity
  parent: HoloCigar
  id: HoloCigarWestern
  name: western holo-cigar
  components:
  - type: HoloCigar
    music:
      path: /Audio/_Goobstation/Music/cowboy_western_background.ogg
      params:
        loop: true
  - type: ClothingGrantComponent
    component:
    - type: TheManWhoSoldTheWorld
      deathAudio: /Audio/_Goobstation/Items/TheManWhoSoldTheWorld/highnoon.ogg
