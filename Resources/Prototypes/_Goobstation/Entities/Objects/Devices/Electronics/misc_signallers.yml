- type: entity
  parent: BaseItem
  id: MiscSignallerBase
  name: "misc signaller base"
  abstract: true
  components:
  - type: SignalOnTrigger
    port: Triggered
  - type: UseDelayTriggerCondition
  - type: UseDelayOnTrigger
  - type: UseDelay
    delay: 3
  - type: StaticPrice
    price: 40
  - type: DeviceLinkSource
    ports:
    - Triggered
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: BasicDevice
  - type: WirelessNetworkConnection
    range: 40

# proximity signaller
- type: entity
  parent: MiscSignallerBase
  id: ProximitySignaller
  name: proximity signaller
  description: A device that transmits a signal when something is nearby. You may be able not to trigger it if you move slowly enough. Needs to be anchored.
  components:
    - type: Sprite
      sprite: _Goobstation/Objects/Devices/miscsignallers.rsi
      state: proxysignaller_on
    - type: TriggerOnProximity
      triggerSpeed: 1.5
      enabled: true
      cooldown: 3
      shape:
        !type:PhysShapeCircle
          radius: 2
      repeating: true
    - type: Anchorable
    - type: PhysicalComposition
      materialComposition:
        Steel: 25
        Plastic: 50
        Glass: 25
        Gold: 50
    - type: StaticPrice
      price: 55
