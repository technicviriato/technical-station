- type: entity
  name: anomaly pinpointer
  description: A handheld tracking device that locks onto any anomaly while off. Keep upright to retain accuracy.
  id: PinpointerAnomaly
  parent: PinpointerBase
  components:
  - type: Sprite
    layers:
    - state: pinpointer-science
      sprite: _Goobstation/Objects/Devices/pinpointer.rsi
      map: ["enum.PinpointerLayers.Base"]
    - state: pinonnull
      map: ["enum.PinpointerLayers.Screen"]
      shader: unshaded
      visible: false
  - type: Icon
    state: pinpointer-science
    sprite: _Goobstation/Objects/Devices/pinpointer.rsi
  - type: Pinpointer
    updateTargetName: true
    canRetarget: true
    retargetingWhitelist:
      components:
      - Anomaly

