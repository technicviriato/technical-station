# Command

- type: entity
  id: SpawnPointNanotrasenRepresentative
  parent: SpawnPointJobBase
  name: nanotrasenrepresentative
  components:
  - type: SpawnPoint
    job_id: NanotrasenRepresentative
  - type: Sprite
    layers:
      - state: green
      - state: centcom

- type: entity
  id: SpawnPointRoboticist
  parent: SpawnPointJobBase
  name: SpawnPointRoboticist
  components:
  - type: SpawnPoint
    job_id: Roboticist
  - type: Sprite
    layers:
      - state: green
      - state: scientist

- type: entity
  id: SpawnPointRadioHost
  parent: SpawnPointJobBase
  name: SpawnPointRadioHost
  components:
  - type: SpawnPoint
    job_id: RadioHost
  - type: Sprite
    layers:
    - state: green
    - state: radiohost
      sprite: _Goobstation/Markers/jobs.rsi

- type: entity
  id: SpawnPointVirologist
  parent: SpawnPointJobBase
  name: virologist
  components:
  - type: SpawnPoint
    job_id: Virologist
  - type: Sprite
    layers:
      - state: green
      - state: virologist
