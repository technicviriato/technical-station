- type: entity
  abstract: true
  parent: ClothingHeadsetAlt
  id: ClothingHeadsetAltLoudspeaker
  components:
  - type: Loudspeaker
    canToggle: true
    affectRadio: true

- type: entity
  parent: [ClothingHeadsetAltSyndicate, ClothingHeadsetAltLoudspeaker]
  id: ClothingHeadsetAltSyndicateCommander
  name: blood-red commander over-ear headset

- type: entity
  parent: ClothingHeadset
  id: ClothingHeadsetChronolegioneer
  name: futuristic over-ear headset
  description: A headset from the future that can pick up most station frequencies.
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyFuture
  - type: Sprite
    sprite: _Goobstation/Clothing/Ears/Headsets/chronolegioneer.rsi
  - type: Clothing
    sprite: _Goobstation/Clothing/Ears/Headsets/chronolegioneer.rsi

- type: entity
  parent: ClothingHeadsetChronolegioneer
  id: ClothingHeadsetChronolegioneerUnremoveable
  suffix: Unremoveable
  components:
  - type: Unremoveable

- type: entity
  parent: [ClothingHeadsetAlt, BaseSecurityContraband]
  id: ClothingHeadsetAltWarden
  name: warden's over-ear headset
  description: An updated, modular intercom, allowing for rapid communication with command personnel.
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeySecurity
      - EncryptionKeyCommand
      - EncryptionKeyCommon
  - type: Sprite
    sprite: _Goobstation/Clothing/Ears/Headsets/warden.rsi
  - type: Clothing
    sprite: _Goobstation/Clothing/Ears/Headsets/warden.rsi

- type: entity
  parent: [ClothingHeadsetAlt, BaseCentcommContraband]
  id: ClothingHeadsetDeathsquad
  name: deathsquad over-ear headset
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyCentCom
      - EncryptionKeyStationMaster
  - type: Sprite
    sprite: _Goobstation/Clothing/Ears/Headsets/deathsquad.rsi
  - type: Clothing
    sprite: _Goobstation/Clothing/Ears/Headsets/deathsquad.rsi
  - type: Tag
    tags: [] # ignore "WhitelistChameleon" tag

- type: entity
  parent: [ClothingHeadsetAlt, BaseSecurityContraband]
  id: ClothingHeadsetAltSecurityRegular
  name: security over-ear headset
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeySecurity
      - EncryptionKeyCommon
  - type: Sprite
    sprite: Clothing/Ears/Headsets/security.rsi
  - type: Clothing
    sprite: Clothing/Ears/Headsets/security.rsi

- type: entity
  parent: ClothingHeadsetCommand
  id: ClothingHeadsetCommandService
  name: command-service headset
  description: A headset with a command and service channels.
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyCommand
      - EncryptionKeyService
      - EncryptionKeyCommon

- type: entity
  parent: ClothingHeadsetAlt
  id: ClothingHeadsetAltRadioHost
  name: radio host's over-ear headset
  description: An over-ear headset with extra foam padding around the ears.
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyCommon
  - type: Sprite
    sprite: _Goobstation/Clothing/Ears/Headsets/radiohost.rsi
  - type: Clothing
    sprite: _Goobstation/Clothing/Ears/Headsets/radiohost.rsi
