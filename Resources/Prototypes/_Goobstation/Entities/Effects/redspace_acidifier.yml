- type: entity
  parent: Acidifier
  id: RedspaceLifeline
  name: redspace lifeline
  description: Teleports your body to save your life!
  components:
  - type: Transform
    anchored: True
  - type: Sprite
    sprite: /Textures/_Goobstation/Effects/redspace_lifeline.rsi
    noRot: true
    layers:
    - state: redspace_lifeline
      shader: unshaded
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/_Goobstation/Weapons/ChronoLegionnaire/stasisgun_reload.ogg
  - type: PointLight
    color: Red
    radius: 3
    energy: 1
    netsync: false

- type: entity
  parent: RedspaceLifeline
  id: RedspaceLifelineSpawnCore
  name: redspace lifeline
  description: Teleports your body to save your life!
  components:
  - type: Transform
    anchored: True
  - type: Sprite
    sprite: /Textures/_Goobstation/Effects/redspace_lifeline.rsi
    noRot: true
    layers:
    - state: redspace_lifeline
      shader: unshaded
  - type: SpawnOnDespawn
    prototype: Telecrystal1
  - type: EmitSoundOnSpawn
    sound:
      path: /Audio/_Goobstation/Weapons/ChronoLegionnaire/stasisgun_reload.ogg
  - type: PointLight
    color: Red
    radius: 3
    energy: 1
    netsync: false
