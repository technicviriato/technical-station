- type: entity
  parent: [BaseItem, BaseSyndicateContraband, BaseBookSounds]
  id: CQCManual
  name: old manual
  description: A small, black manual. There are drawn instructions of tactical hand-to-hand combat.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Misc/cqc_manual.rsi
    layers:
    - state: icon
  - type: Item
    size: Small
  - type: StaticPrice
    price: 3000
  - type: UseRequiresSight
  - type: KnowledgeGrantOnUse
    skills:
      MartialArtCQC: 70
    doAfter: 2
  - type: GuideHelp
    guides:
    - CQC

- type: entity
  parent: [ BaseItem, BaseSyndicateContraband ]
  id: SleepingCarpScroll
  name: mysterious scroll
  description: A scroll filled with strange markings. It seems to be drawings of some sort of martial art.
  components:
  - type: Sprite
    sprite: _Goobstation/Wizard/Objects/scroll.rsi
    layers:
    - state: scroll2
  - type: Item
    sprite: _Goobstation/Wizard/Objects/scroll.rsi
    size: Small
  - type: StaticPrice
    price: 3000
  - type: UseRequiresSight
  - type: KnowledgeGrantOnUse
    skills:
      MartialArtSleepingCarp: 70
    doAfter: 2
  - type: GuideHelp
    guides:
    - SleepingCarp

- type: entity
  parent: [BaseItem, BaseSyndicateContraband, BaseBookSounds]
  id: CapoeiraManual
  name: choreography manual
  description: Choreography manual — or so it claims. Every second page ends with someone on the floor, not dancing.
  components:
  - type: Sprite
    sprite: _Goobstation/Objects/Misc/martial_arts.rsi
    layers:
    - state: capoeira
  - type: Item
    size: Small
  - type: StaticPrice
    price: 3000
  - type: UseRequiresSight
  - type: KnowledgeGrantOnUse
    skills:
      MartialArtCapoeira: 26 # Starts you with all moves, +12.5% movespeed, +50% attack speed, +50% damage
    doAfter: 2
  - type: GuideHelp
    guides:
    - Capoeira
