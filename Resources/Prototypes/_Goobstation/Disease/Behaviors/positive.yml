- type: entity
  id: DiseaseBehaviorHyperactive
  parent: DiseaseBehaviorBase
  name: Feeling hyper
  description: Makes you feel hyper.
  components:
  - type: DiseaseEffect
    complexity: -30
  - type: DiseaseEntityEffect
    timeScale: false
    effects:
    - !type:ModifyStatusEffect
      effectProto: HyperStatusEffect
    - !type:GenericStatusEffect
      key: Stutter
      component: StutteringAccent
    - !type:Jitter

- type: entity
  id: DiseaseBehaviorHealing
  parent: DiseaseBehaviorBase
  name: Healing factor
  description: Accelerates natural regeneration.
  components:
  - type: DiseaseEffect
    complexity: -20
  - type: DiseaseEntityEffect
    effects:
    # weaker trico
    - !type:HealthChange
      useTargeting: false
      damage:
        types:
          Blunt: -0.13
          Slash: -0.13
          Piercing: -0.13
          Poison: -0.2
          Heat: -0.2
          Shock: -0.2
          Cold: -0.2
