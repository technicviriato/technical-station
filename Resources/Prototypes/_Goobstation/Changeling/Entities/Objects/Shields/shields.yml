- type: entity
  parent: BaseShield
  id: ChangelingShield
  name: organic shield
  description: A large, fleshy shield.
  suffix: Unremoveable
  components:
    - type: Unremoveable
    - type: Sprite
      sprite: _Goobstation/Changeling/shields.rsi
      state: ling-icon
    - type: Item
      sprite: _Goobstation/Changeling/shields.rsi
      heldPrefix: ling
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 60
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
        - trigger:
            !type:DamageTrigger
            damage: 50
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
            - !type:PlaySoundBehavior
              sound:
                collection: MetalBreak
    - type: Parry
      maxParries: 3
      maxReflects: 0
      parryMinSkill: 30
      soundOnParry:
        path: /Audio/Weapons/pierce.ogg
        params:
          variation: 0.2
          volume: -11
    - type: HeldSpeedModifier
      walkModifier: 0.9
      sprintModifier: 0.9
    - type: MeleeWeapon
      wideAnimationRotation: -135
      attackRate: 0.5
      damage:
        types:
          Blunt: 10
      soundHit:
        collection: MetalThud
      animation: WeaponArcFist
      heavyStaminaCost: 10
    - type: StaminaDamageOnHit
      damage: 15
    - type: FlashSoundSuppression
      protectionRange: 2
    - type: MeleeThrowOnHit
      distance: 1
      speed: 2
