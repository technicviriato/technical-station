- type: antag
  id: Slasher
  name: roles-antag-slasher-name
  antagonist: true
  setPreference: false
  objective: roles-antag-slasher-objectives
  guides: [ Slasher ]

- type: antagSpecifier
  id: Slasher
  spawnerPrototype: SpawnPointGhostSlasher
  startingGear: SlasherGear
  briefing:
    text: slasher-role-greeting
    color: Red
    sound: /Audio/_Goobstation/Effects/Slasher/SlasherIntro.ogg
  mindRoles: [ MindRoleSlasher ]
  components:
  - type: Slasher
  - type: SlasherSummonMachete
  - type: SlasherStaggerArea
  - type: SlasherRegenerate
  - type: SlasherPossession
  - type: SlasherBloodTrail
  - type: SlasherIncorporeal
  - type: SlasherSoulSteal
  - type: SlasherSummonMeatSpike
  - type: BreathingImmunity
  - type: GunBlocked
    popupText: slasher-cannot-use-guns
  - type: WeakToHoly
  - type: NightVision
    activateSound: null
    deactivateSound: null
  - type: Hunger
    baseDecayRate: 0
  - type: Thirst
    baseDecayRate: 0
  - type: MobThresholds
    thresholds:
      0: Alive
      150: Dead
  - type: RandomMetadata
    nameSegments:
    - NamesSlasherTitle
    - NamesSlasher
    nameFormat: name-format-slasher

- type: entity
  categories: [ HideSpawnMenu, Spawner ]
  parent: BaseAntagSpawner
  id: SpawnPointGhostSlasher
  components:
  - type: GhostRole
    name: ghost-role-information-slasher-name
    description: ghost-role-information-slasher-description
    rules: ghost-role-information-antagonist-rules
    mindRoles:
    - MindRoleGhostRoleSoloAntagonist
    raffle:
      settings: default
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
    - state: green
    - sprite: _Goobstation/Objects/Specific/Slasher/machete.rsi
      state: icon

- type: startingGear
  id: SlasherGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitColorGrey
    back: ClothingBackpackSatchel
    head: ClothingHeadHatSlasherMask
    gloves: ClothingHandsSlasherGloves
    outerClothing: ClothingOuterSlasherApron
    shoes: ClothingShoesSlasher
    id: AgentIDCard
