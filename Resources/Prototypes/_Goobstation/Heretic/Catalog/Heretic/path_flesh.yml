- type: listing
  id: KnowledgePathStartFlesh
  name: knowledge-path-flesh-s1-name
  description: knowledge-path-flesh-s1-desc
  icon: { sprite: _Goobstation/Heretic/Blades/blade_flesh.rsi, state: icon }
  raiseProductEventOnMind: true
  productEvent: !type:EventHereticAddKnowledge
    knowledge:
    - PrincipleOfHunger
  cost:
    KnowledgePoint: 0
  categories:
  - HereticPathFlesh
  conditions:
  - !type:ListingLimitedStockCondition
    stock: 1
  - !type:HereticPathCondition
    stage: 0
    # add every path here because you shouldn't be able to buy more starter knowledge
    blacklist:
    - Ash
    - Blade
    - Flesh
    - Lock
    - Void
    - Rust
    - Cosmos

