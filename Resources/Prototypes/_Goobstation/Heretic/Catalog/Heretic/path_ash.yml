- type: listing
  id: HereticAshPath1
  name: knowledge-path-ash-s1-name
  description: knowledge-path-ash-s1-desc
  icon: { sprite: _Goobstation/Heretic/Blades/blade_ash.rsi, state: icon }
  raiseProductEventOnMind: true
  productEvent: !type:EventHereticAddKnowledge
    knowledge:
    - NightwatcherSecret
  cost:
    KnowledgePoint: 0
  categories:
  - HereticPathAsh
  conditions:
  - !type:ListingLimitedStockCondition
    stock: 1
  - !type:HereticPathCondition
    stage: 0
    # add every path here because you shouldn't be able to buy more starter knowledge
    blacklist:
    - Ash
    - Blade
    - Flesh
    - Lock
    - Void
    - Rust
    - Cosmos

