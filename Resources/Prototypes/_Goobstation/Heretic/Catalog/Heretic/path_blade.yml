    stock: 1
  - !type:HereticPathCondition
    stage: 0
    # add every path here because you shouldn't be able to buy more starter knowledge
    blacklist:
    - Ash
    - Blade
    - Flesh
    - Lock
    - Void
    - Rust
    - Cosmos

