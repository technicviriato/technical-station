- type: listing
  id: HereticVoidPath1
  name: knowledge-path-void-s1-name
  description: knowledge-path-void-s1-desc
  icon: { sprite: _Goobstation/Heretic/Blades/blade_void.rsi, state: icon }
  raiseProductEventOnMind: true
  productEvent: !type:EventHereticAddKnowledge
    knowledge:
    - GlimmerOfWinter
  cost:
    KnowledgePoint: 0
  categories:
  - HereticPathVoid
  conditions:
  - !type:ListingLimitedStockCondition
    stock: 1
  - !type:HereticPathCondition
    stage: 0
    # add every path here because you shouldn't be able to buy more starter knowledge
    blacklist:
    - Ash
    - Blade
    - Flesh
    - Lock
    - Void
    - Rust
    - Cosmos

