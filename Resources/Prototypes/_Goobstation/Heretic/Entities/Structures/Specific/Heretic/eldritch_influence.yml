- type: entity
  id: EldritchInfluence
  name: reality shift
  description: Your eyes start to burn just from a single look. Should you delve deeper?
  placement:
    mode: SnapgridCenter
  components:
  - type: InteractionOutline
  - type: EldritchInfluence
    possibleExamineEffects:
    # Ash
    - - !type:Flammable
        multiplier: 5
        multiplierOnExisting: 5
      - !type:Ignite
    # Rust
    - - !type:Vomit
        thirstAmount: -50
        hungerAmount: -50
      - !type:ModifyKnockdown
        time: 20
        type: Add
      - !type:HealthChange
        damage:
          types:
            Ion: 40
    # Void
    - - !type:VoidCurse
        stacks: 5
    # Blade
    - - !type:HealthChange
        damage:
          types:
            Slash: 30
    # Moon
    - - !type:GenericStatusEffect
        key: Pacified
        component: Pacified
        time: 60
        type: Add
    # Cosmos
    - - !type:ModifyStatusEffect
        effectProto: StatusEffectForcedSleeping
        time: 20
        type: Add
    # Flesh
    - - !type:SpillBlood
        amount: 100
    # Lock
    - - !type:ModifyStatusEffect
        effectProto: StatusEffectBlindness
        time: 20
        type: Add
      - !type:RemoveAccess
  - type: Sprite
    sprite: _Goobstation/Heretic/reality_fracture.rsi
    state: icon
  - type: Clickable
  - type: Visibility
    layer: 64 # keep in sync with VisibilityFlags.EldritchInfluence for upstream merges
  - type: StepTrigger
    requiredTriggeredSpeed: 0
    intersectRatio: 0.1
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 5
        layer:
          - WallLayer
        mask:
          - HighImpassable
          - MidImpassable
          - LowImpassable
        hard: false
  - type: TileEntityEffect
    effects:
    - !type:ModifyStatusEffect
      effectProto: StatusEffectInfluenceXray
      time: 10
      conditions:
      - !type:WhitelistCondition
        checkMind: true
        whitelist:
          components:
          - Heretic

- type: entity
  id: EldritchInfluenceIntermediate
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 600
  - type: SpawnOnDespawn
    prototype: EldritchInfluenceSpent

- type: entity
  parent: EldritchInfluence
  id: EldritchInfluenceSpent
  name: reality fracture
  description: A reality fracture. Something keeps leaking out of it, should you really be near this thing?
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    sprite: _Goobstation/Heretic/reality_fracture.rsi
    state: icon_harvested
  - type: Visibility
    layer: 1
  - type: EldritchInfluence
    spent: true
  - type: TileEntityEffect
    effects: []
