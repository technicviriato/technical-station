- type: entity
  parent: [ ClothingNeckBase, BaseMagicalContraband ]
  id: ClothingNeckAmberFocus
  name: amber focus
  description: An amber focusing glass that provides a link to the world beyond. The necklace seems to twitch, but only when you look at it from the corner of your eye.
  suffix: MagicItem
  components:
  - type: UnholyItem
  - type: HereticMagicItem
  - type: Sprite
    sprite: _Goobstation/Heretic/amber_focus.rsi
    state: icon
  - type: Clothing
    sprite: _Goobstation/Heretic/amber_focus.rsi

- type: entity
  parent: ClothingNeckAmberFocus
  id: ClothingEldritchMedalion
  name: warm eldritch medallion
  description: A strange medallion. Peering through the crystalline surface, the world around you melts away. You see your own beating heart, and the pulsing of a thousand others.
  components:
  - type: Sprite
    sprite: _Goobstation/Heretic/eldritch_medalion.rsi
    state: icon
  - type: Clothing
    sprite: _Goobstation/Heretic/eldritch_medalion.rsi
  - type: ThermalVision
    thermalShader: null
    isEquipment: true
    isActive: true
    color: white
    drawOverlay: false
    lightRadius: 0
    toggleAction: null
    userWhitelist:
      components:
      - Heretic
      - Ghoul
    whitelistCheckMind: true
