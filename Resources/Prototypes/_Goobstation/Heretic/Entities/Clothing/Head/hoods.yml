- type: entity
  parent: [ ArmorHeretic, ClothingHeadBase, BaseMagicalContraband ]
  id: ClothingHeadHatHoodHeretic
  name: ominous hood
  description: A torn, dust-caked hood. Strange eyes line the inside.
  components:
  - type: HereticMagicItem
  - type: Sprite
    sprite: _Goobstation/Heretic/Clothing/Head/eldritch_hood.rsi
    state: icon
  - type: Clothing
    sprite: _Goobstation/Heretic/Clothing/Head/eldritch_hood.rsi
  - type: Tag
    tags:
    - WhitelistChameleon
  - type: HideLayerClothing
    slots:
    - Hair
  - type: FlashImmunity
  - type: FlashSoundSuppression
  - type: Armor
    coverage:
    - Head
  - type: FaceHuggerBlocker
  - type: PressureProtection
    highPressureMultiplier: 0.1
    lowPressureMultiplier: 1000
  - type: IdentityBlocker

- type: entity
  parent: [ ArmorHereticRust, ClothingHeadHatHoodHeretic ]
  id: ClothingHeadHatHoodHereticRust
  components:
  - type: Sprite
    sprite: _Goobstation/Heretic/Clothing/Head/rust_hood.rsi
    state: icon
  - type: Clothing
    sprite: _Goobstation/Heretic/Clothing/Head/rust_hood.rsi
  - type: Appearance
  - type: ItemToggle
    onActivate: false
    onUse: false
    wieldToggle: false
  - type: ToggleAnimation
    continueReverseAnimation: true
    toggleOnTime: 2.3
    toggleOffTime: 1.4
  - type: ClothingToggleAnimationVisuals
    state:
    - TogglingOn
    - On
    - TogglingOff
  - type: ComponentToggler
    components:
    - type: Armor
      coverage:
      - Head
      modifiers:
        coefficients:
          Blunt: 0.4
          Slash: 0.4
          Piercing: 0.4
          Heat: 0.4
          Caustic: 0.4
      traumaDeductions:
        Dismemberment: 0.4
        OrganDamage: 0.4
        BoneDamage: 0.4
        VeinsDamage: 0.0
    - type: ExplosionResistance
      damageCoefficient: 0
    - type: FireProtection
      reduction: 0.6
    deactivateComponents:
    - type: Armor
      coverage:
      - Head
      modifiers:
        coefficients:
          Blunt: 0.7
          Slash: 0.7
          Piercing: 0.7
          Heat: 0.7
          Caustic: 0.7
      traumaDeductions:
        Dismemberment: 0.2
        OrganDamage: 0.2
        BoneDamage: 0.2
        VeinsDamage: 0.0
    - type: ExplosionResistance
      damageCoefficient: 0.50
    - type: FireProtection
      reduction: 0.3

