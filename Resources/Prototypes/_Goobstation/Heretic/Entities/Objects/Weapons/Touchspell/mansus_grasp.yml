- type: entity
  id: TouchSpellMansus
  name: mansus grasp
  description: The power of the Old Gods, channeled through your grip.
  categories: [ HideSpawnMenu ]
  components:
  - type: Unremoveable
  - type: Item
  - type: UnholyItem
  - type: TouchSpell
    cooldown: 10
    speech: heretic-speech-mansusgrasp
    sound:
      path: /Audio/Items/welder.ogg
    targetBlacklist:
      components:
      - Puddle # Ruins rust path tile rusting and is annoying in general.
      - HereticRitualRune # This is handled by HereticRitualSystem, blacklisting rune makes it so grasp doesn't disappear when interacting with it.
      - MawedCrucible # Requires for anchoring/unanchoring of the crucible with a grasp
  - type: MansusGrasp
  - type: BlockContextMenu
    whitelist:
      components:
      - MobState
  - type: MeleeWeapon
    clickAttackWhitelist:
      components:
      - MobState
    resetOnHandSelected: false
    altClickAttack: true
    canMiss: false
    canParryLight: false
    canParryWide: false
    damage:
      types:
        Heat: 0
  - type: Sprite
    sprite: _Goobstation/Heretic/mansus_grasp.rsi
    state: icon
  - type: Appearance
  - type: PointLight
    enabled: true
    radius: 2
    energy: 1
    color: "#329a00"
  - type: SurgeryTool # For organ removal
    startSound:
      path: /Audio/_Goobstation/Heretic/crack2.ogg
    endSound:
      path: /Audio/Items/welder.ogg
  - type: Tag
    tags:
    - AnchorHereticStructure
  - type: UseDelayBlockMelee
  # Used for extracting organs
  - type: Hemostat
    speed: 1.5
  - type: Retractor
    speed: 1.5
  - type: Tweezers
    speed: 1.5
  # Not used for extracting organs
  - type: Drill
    speed: 0.75
  - type: BoneSetter
    speed: 0.75
  - type: Cautery
    speed: 0.75
  - type: BoneGel
    speed: 0.75
  - type: Tending
    speed: 0.75
  - type: Stitches
    speed: 0.75
  # Saw and scalpel surgery qualities are on heretic blades

- type: entity
  id: TouchSpellMansusAsh
  parent: TouchSpellMansus
  categories: [ HideSpawnMenu ]
  components:
  - type: MansusGrasp
    effects:
    - !type:GenericStatusEffect
      key: TemporaryBlindness
      component: TemporaryBlindness
      type: Update
      time: 5

- type: entity
  id: TouchSpellMansusVoid
  parent: TouchSpellMansus
  categories: [ HideSpawnMenu ]
  components:
  - type: MansusGrasp
    effects:
    - !type:VoidCurse
      stacks: 2

- type: entity
  id: TouchSpellMansusBlade
  parent: TouchSpellMansus
  categories: [ HideSpawnMenu ]
  components:
  - type: MansusGrasp
    effects:
    - !type:NestedRitualEffect
      proto: HereticBladeGraspEffect
    - !type:AddComponents
      conditions:
      - !type:HereticMinStageCondition
        minStage: 7
      - !type:WhitelistCondition
        whitelist:
          tags:
          - HereticBladeBlade
      components:
      - type: MansusInfused

- type: entity
  id: TouchSpellMansusCosmos
  parent: TouchSpellMansus
  categories: [ HideSpawnMenu ]
  components:
  - type: MansusGrasp
    effects:
    - !type:StarMark
    - !type:EffectsRitualEffect
      applyOn: Performer
      effects:
      - !type:SpawnCosmicField

- type: entity
  id: TouchSpellMansusRust
  parent: TouchSpellMansus
  categories: [ HideSpawnMenu ]
  components:
  - type: RustGrasp # Used for tile rusting
  - type: UseDelay
    delays:
      rust:
        length: 3
  - type: MansusGrasp
    effects:
    - !type:KillAi
    - !type:NestedRitualEffect
      proto: HereticRustGraspCatwalkEffect
    - !type:NestedRitualEffect
      proto: HereticRustGraspWallEffect
    - !type:HealthChange
      conditions:
      - !type:WhitelistCondition
        whitelist:
          components:
          - Silicon
          - BorgChassis
          - CosmicColossus
          tags:
          - Bot
      damage:
        types:
          Blunt: 167
          Slash: 167
          Piercing: 167
      splitDamage: SplitEnsureAll
      targetPart: Chest
    - !type:HealthChange
      conditions:
      - !type:WhitelistCondition
        inverted: true
        whitelist:
          components:
          - MobState
      - !type:WhitelistCondition
        blacklist:
          components:
          - Edible
          - ShadowCloakEntity
          tags:
          - Wall # HereticRustGraspWallEffect handles walls
      damage:
        types:
          Blunt: 167
          Slash: 167
          Piercing: 167
      splitDamage: SplitEnsureAll
      targetPart: Chest

- type: entity
  id: TouchSpellMansusFlesh
  parent: TouchSpellMansus
  categories: [ HideSpawnMenu ]
  components:
  - type: FleshGrasp # Used for summoning ghouls on the rune
  - type: UseDelay
    delay: 1.5
  - type: MansusGrasp
    effects:
    - !type:NestedRitualEffect
      proto: HereticFleshGraspEffect

- type: entity
  id: TouchSpellMansusLock
  parent: TouchSpellMansus
  categories: [ HideSpawnMenu ]
  components:
  - type: TouchSpell
    # Silent grasp
    sound: null
    speech: null
  - type: MansusGrasp
    effects:
    - !type:NestedRitualEffect
      proto: HereticLockGraspMechEffect
    - !type:NestedRitualEffect
      proto: HereticLockGraspDoorEffect
    - !type:NestedRitualEffect
      proto: HereticLockGraspAccessReaderEffect
