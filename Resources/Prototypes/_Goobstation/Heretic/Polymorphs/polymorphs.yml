- type: polymorph
  id: AshJaunt
  configuration:
    entity: PolymorphAshJaunt
    forced: true
    duration: 4 # 3 seconds + 1 for out animation
    attachToGridOrMap: true
    showPopup: false
    allowRepeatedMorphs: true

- type: polymorph
  id: AshJauntLong
  configuration:
    entity: PolymorphAshJaunt
    forced: true
    duration: 7
    attachToGridOrMap: true
    allowRepeatedMorphs: true

- type: polymorph
  id: SpaceJaunt
  configuration:
    entity: PolymorphSpaceJaunt
    forced: true
    attachToGridOrMap: true
    showPopup: false
    allowRepeatedMorphs: true
    polymorphSound:
      path: /Audio/_Goobstation/Heretic/cosmic_energy.ogg
    exitPolymorphSound:
      path: /Audio/_Goobstation/Heretic/cosmic_energy.ogg

- type: polymorph
  id: MirrorJaunt
  configuration:
    entity: PolymorphMirrorJaunt
    forced: true
    attachToGridOrMap: true
    showPopup: false
    allowRepeatedMorphs: true
    polymorphSound:
      path: /Audio/_Goobstation/Heretic/glass_reverse.ogg
    exitPolymorphSound:
      path: /Audio/_Goobstation/Heretic/glass_reverse.ogg

- type: polymorph
  id: ShatteredRisen
  configuration:
    entity: MobShattered
    forced: true
    transferName: true
    transferDamage: false
    revertOnCrit: false
    revertOnDeath: false
    transferHumanoidAppearance: false
    inventory: Drop
    allowRepeatedMorphs: true

- type: polymorph
  id: EldritchHorror
  configuration:
    entity: MobHereticFleshAscend
    transferDamage: false
    revertOnCrit: false
    revertOnDeath: false
    allowRepeatedMorphs: false
    skipRevertConfirmation: true
    componentsToTransfer:
    - component: LanguageKnowledge
    - component: LanguageSpeaker
    - component: Grammar

- type: polymorph
  id: VoidPrison
  configuration:
    entity: VoidPrison
    forced: true
    inventory: None
    transferName: false
    transferDamage: false
    duration: 10
    polymorphSound: /Audio/_Goobstation/Heretic/voidblink.ogg
    showPopup: false
    attachToGridOrMap: true
    allowRepeatedMorphs: true
    allowMovement: false

