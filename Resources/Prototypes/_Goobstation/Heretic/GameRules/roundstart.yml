- type: entity
  abstract: true
  parent: BaseGameRule
  id: BaseHereticRule
  components:
  - type: HereticRule
  - type: GameRule
    minPlayers: 15
  - type: AntagObjectives
    objectives:
    - HereticKnowledgeObjective
    - HereticSacrificeObjective
    - HereticSacrificeHeadObjective
  - type: AntagSelection
    agentName: heretic-roundend-name
  - type: AntagPlayerEffects
    effects:
    - !type:NestedEffect
      proto: HereticSkills

- type: entity
  parent: [ BaseRoundstartAntagRule, BaseHereticRule ]
  id: HereticRoundstart
  components:
  - type: AntagSelection
    lateJoinAdditional: true
    antags:
    - !type:LinearAntagCount
      proto: Heretic
      range:
       min: 1
       max: 6
      playerRatio: 10

- type: entity
  parent: HereticRoundstart
  id: CalmHeretic
  components:
  - type: AntagSelection
    antags:
    - !type:LinearAntagCount
      proto: Heretic
      range:
        min: 1
        max: 2
      playerRatio: 20
