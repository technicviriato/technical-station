## Mob

- type: entity
  abstract: true
  parent: BaseMobBody
  id: AppearanceRatKing
  name: rat king appearance
  components:
  - type: InitialBody
    organs:
      # Parts
      Torso: OrganAnimalTorso
      # Organs
      Lungs: OrganRatLungs
      Stomach: OrganRatKingStomach
      Liver: OrganAnimalLiver
      Heart: OrganAnimalHeart
      Kidneys: OrganAnimalKidneys

## Organs

- type: entity
  parent: OrganAnimalStomach
  id: OrganRatKingStomach
  suffix: "ratking"
  description: "How hungry?"
