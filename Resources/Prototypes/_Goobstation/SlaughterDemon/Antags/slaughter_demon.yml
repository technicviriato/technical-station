- type: antag
  id: SlaughterDemon
  name: roles-antag-slaughter-demon-name
  antagonist: true
  objective: roles-antag-slaughter-demon-objective

- type: antagSpecifier
  id: SlaughterDemon
  spawnerPrototype: SpawnPointGhostSlaughterDemon
  briefing:
    text: slaughter-role-greeting
    color: Red
    sound: /Audio/_Goobstation/SlaughterDemon/briefing.ogg
  components:
  - type: RandomMetadata
    nameSegments:
    - NamesSlaughterTitle
    - NamesSlaughter
    nameFormat: name-format-slaughter
  mindRoles: [ MindRoleSlaughterDemon ]

- type: antagSpecifier
  parent: SlaughterDemon
  id: SlaughterDemonMidround
  briefing:
    text: slaughter-role-greeting
    color: Red
    sound: /Audio/Misc/narsie_rises.ogg

- type: antagSpecifier
  id: LaughterDemon
  spawnerPrototype: SpawnPointGhostLaughterDemon
  briefing:
    text: laughter-role-greeting
    color: Pink
    sound: /Audio/_Goobstation/Vehicle/Clowncar/clowncar_fart.ogg
  components:
  - type: RandomMetadata
    nameSegments:
    - NamesLaughterTitle
    - NamesSlaughter
    nameFormat: name-format-slaughter
  mindRoles: [ MindRoleSlaughterDemon ]
