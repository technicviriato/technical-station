- type: entity
  parent: BaseAntagGhostRoleRule
  id: ApprenticeRule
  components:
  - type: GameRule
  - type: AntagSelection
    useCharacterNames: true
    agentName: apprentice-roundend-name
    antags:
    - !type:FixedAntagCount
      proto: WizardApprentice
  - type: AntagPlayerEffects
    effects:
    - !type:NestedEffect
      proto: WizardSkills

- type: entity
  parent: BaseGameRule
  id: SleepersOnWizardDeath
  components:
  - type: RuleOnWizardDeathRule
    rule: SleeperAgentsWizard

- type: entity
  parent: BaseTraitorRule
  id: SleeperAgentsWizard
  components:
  - type: StationEvent
  - type: AntagSelection
    antags:
    - !type:LinearAntagCount
      proto: TraitorSleeper
      range:
        min: 4
        max: 6
      playerRatio: 10

- type: entity
  parent: BaseGameRule
  id: GhostsVisible
  components:
  - type: GhostsVisibleRule

- type: entity
  parent: BaseGameRule
  id: GlobalTileMovement
  components:
  - type: GlobalTileMovementRule
    components:
    - type: HierophantBeat

- type: gamePreset
  id: Wizard
  alias:
  - wiz
  name: wizard-title
  description: wizard-description
  showInVote: false
  rules:
  - BasicRoundstartVariation
  - BasicStationEventScheduler
  - BasicAntagEventScheduler
  - ModerateAntagEventScheduler
  - MeteorSwarmScheduler
  - SpaceTrafficControlEventScheduler
  - SubGamemodesRuleNoWizard
  - Wizard
  - SleepersOnWizardDeath
