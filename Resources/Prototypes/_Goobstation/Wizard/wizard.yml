- type: entity
  parent: BaseMindRoleAntag
  id: MindRoleWizard
  name: Wizard Role
  components:
  - type: MindRole
    antagPrototype: Wizard
    exclusiveAntag: true
    subtype: role-subtype-wizard
  - type: WizardRole

- type: entity
  parent: BaseMindRoleAntag
  id: MindRoleApprentice
  name: Apprentice Role
  components:
  - type: MindRole
    antagPrototype: Apprentice
    exclusiveAntag: true
    roleType: Familiar
  - type: ApprenticeRole

- type: entity
  id: SpawnPointMarkerWizard
  parent: MarkerBase
  name: wizard
  components:
  - type: SpawnPoint
  - type: Sprite
    layers:
    - state: green
    - sprite: Objects/Fun/figurines.rsi
      state: wizard

- type: factionIcon
  id: WizardFaction
  isShaded: false
  priority: 11
  showTo:
    components:
      - ShowAntagIcons
      - Wizard
      - Apprentice
    tags:
      - ShowWizardIcons
  icon:
    sprite: /Textures/_Goobstation/Wizard/StatusIcons/10x10.rsi
    state: wizard

- type: factionIcon
  id: ApprenticeFaction
  isShaded: false
  priority: 11
  showTo:
    components:
      - ShowAntagIcons
      - Wizard
      - Apprentice
    tags:
      - ShowWizardIcons
  icon:
    sprite: /Textures/_Goobstation/Wizard/StatusIcons/10x10.rsi
    state: apprentice

- type: entity
  id: BaseStationWizardTarget
  abstract: true
  components:
    - type: StationWizardTarget
