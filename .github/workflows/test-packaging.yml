name: Test Packaging

on:
  push:
    branches: [ master, staging, stable ]
    paths:
    - '**.cs'
    - '**.csproj'
    - '**.sln'
    - '**.git**'
    - '**.yml'
    # no docs on which one of these is supposed to work, so
    # why not just do both
    - 'RobustToolbox'
    - 'RobustToolbox/**'
  merge_group:
  pull_request:
    types: [ opened, reopened, synchronize, ready_for_review ]
    branches: [ master, staging, stable ]
    paths:
    - '**.cs'
    - '**.csproj'
    - '**.sln'
    - '**.git**'
    - '**.yml'
    - 'RobustToolbox'
    - 'RobustToolbox/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test Packaging
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Master
      uses: actions/checkout@v4.2.2

    - name: Setup Submodule
      run: |
        git submodule update --init --recursive

    - name: Pull engine updates
      uses: Trauma-Station/submodule-dependency@v0.2.1
      with:
        map: |
          {
            "QuietToolbox": "RobustToolbox"
          }

    - name: Update Engine Submodules
      run: |
        cd RobustToolbox/
        git submodule update --init --recursive

    - name: Install dependencies
      run: dotnet restore

    - name: Build Packaging
      run: dotnet build Content.Packaging --configuration Release --no-restore /m

    - name: Package server
      run: dotnet run --project Content.Packaging server --log-build --platform win-x64 --platform win-arm64 --platform linux-x64 --platform linux-arm64 --platform osx-x64 --platform osx-arm64

    - name: Package client
      run: dotnet run --project Content.Packaging client --log-build --no-wipe-release

    - uses: actions/upload-artifact@v4
      with:
        name: binlogs
        path: release/*.binlog
        retention-days: 7
