name: Build & Test Debug

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ master, staging, stable ]
  merge_group:
  pull_request:
    types: [ opened, reopened, synchronize, ready_for_review ]
    branches: [ master, staging, stable ]

jobs:
  build:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
    - &checkout
      name: Checkout Master
      uses: actions/checkout@v4.2.2

    - &submodule
      name: Setup Submodule
      run: git submodule update --init --recursive

    - &submodule_pull
      name: Pull engine updates
      uses: Trauma-Station/submodule-dependency@v0.2.1
      with:
        map: |
          {
            "QuietToolbox": "RobustToolbox"
          }

    - &submodule_update
      name: Update Engine Submodules
      run: |
        cd RobustToolbox/
        git submodule update --init --recursive

    - name: Install dependencies
      run: dotnet restore

    - name: Build Project
      run: dotnet build --configuration DebugOpt --no-restore /m

    - name: Save build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: |
          bin/Content.*/*.json
          bin/Content.IntegrationTests/*.dll
          bin/Content.IntegrationTests/*.pdb
          bin/Content.IntegrationTests/runtimes/linux-x64/**
          bin/Content.MapRenderer/*.dll
          bin/Content.MapRenderer/*.pdb
          bin/Content.Tests/*.dll
        retention-days: 1

  # Run Content.Tests unit tests separately, nothing depends on them so it's quick (~2 mins total)
  test-unit:
    needs: build
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
    - *checkout
    - *submodule
    - *submodule_pull
    - *submodule_update
    - &download_build
      name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-output
        path: bin/

    - name: Link runtimes
      run: ln -s $(pwd)/bin/Content.IntegrationTests/runtimes bin/Content.Tests/

    - name: Run Content.Tests
      run: dotnet test bin/Content.Tests/Content.Tests.dll -- NUnit.ConsoleOut=0 NUnit.TestOutputXml="logs" NUnit.WorkDirectory="$(pwd)/test_results"

    # never seen it fail once IDC about archiving it

  # Run every test that doesnt have a [Category] set
  test-main:
    needs: build
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
    - *checkout
    - *submodule
    - *submodule_pull
    - *submodule_update
    - *download_build

    - name: Run main Content.IntegrationTests
      run: |
        DOTNET_gcServer=1 dotnet test bin/Content.IntegrationTests/Content.IntegrationTests.dll -- \
          NUnit.Where="cat != MapTests && cat != GameRuleTests" \
          NUnit.ConsoleOut=0 NUnit.MapWarningTo=Failed NUnit.TestOutputXml="logs" NUnit.WorkDirectory="$(pwd)/test_results"

    - name: Archive NUnit3 test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nunit3-results-main-${{ github.run_attempt }}
        path: test_results/*
        retention-days: 7
        compression-level: 9

  # Test all the map tests seperately
  # Any test with Category("MapTests") is used
  test-maps:
    needs: build
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
    - *checkout
    - *submodule
    - *submodule_pull
    - *submodule_update
    - *download_build

    - name: Run MapTests
      run: |
        DOTNET_gcServer=1 dotnet test bin/Content.IntegrationTests/Content.IntegrationTests.dll -- \
          NUnit.Where="cat == MapTests" \
          NUnit.ConsoleOut=0 NUnit.MapWarningTo=Failed NUnit.TestOutputXml="logs" NUnit.WorkDirectory="$(pwd)/test_results"

    - name: Archive NUnit3 test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nunit3-results-maps-${{ github.run_attempt }}
        path: test_results/*
        retention-days: 7
        compression-level: 9

  # Test all the gamerule tests seperately
  # Any test with Category("GameRuleTests") is used
  test-gamerules:
    needs: build
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
    - *checkout
    - *submodule
    - *submodule_pull
    - *submodule_update
    - *download_build

    - name: Run GameRuleTests
      run: |
        DOTNET_gcServer=1 dotnet test bin/Content.IntegrationTests/Content.IntegrationTests.dll -- \
          NUnit.Where="cat == GameRuleTests" \
          NUnit.ConsoleOut=0 NUnit.MapWarningTo=Failed NUnit.TestOutputXml="logs" NUnit.WorkDirectory="$(pwd)/test_results"

    - name: Archive NUnit3 test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nunit3-results-gamerules-${{ github.run_attempt }}
        path: test_results/*
        retention-days: 7
        compression-level: 9

  test-map-render:
    needs: build
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
    - *checkout
    - *submodule
    - *submodule_pull
    - *submodule_update
    - *download_build

    - name: Link runtimes
      run: ln -s $(pwd)/bin/Content.IntegrationTests/runtimes bin/Content.MapRenderer/

    - name: Run Map Renderer
      run: dotnet exec bin/Content.MapRenderer/Content.MapRenderer.dll Dev

  ci-success:
    name: Build & Test Debug
    needs: [build, test-unit, test-main, test-maps, test-gamerules, test-map-render]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: CI succeeded
        run: |
          if [[ "${{ needs.build.result }}" != "success" ||
                "${{ needs.test-unit.result }}" != "success" ||
                "${{ needs.test-main.result }}" != "success" ||
                "${{ needs.test-maps.result }}" != "success" ||
                "${{ needs.test-gamerules.result }}" != "success" ||
                "${{ needs.test-map-render.result }}" != "success" ]]; then
            echo "Not all tests succeeded!"
            exit 1
          fi
          exit 0
